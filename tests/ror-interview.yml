slug: ror-interview
title: "Rails: Вопросы с собеседований"
description: "Типичные вопросы с реальных технических интервью на позицию Ruby on Rails разработчика."
tags: [ruby, rails, interview, backend, claude-gen]
difficulty: intermediate
estimated_time: 30

questions:
  - id: q1
    text: "Что такое Rack и какова его роль в Rails?"
    type: single
    options:
      - id: a
        text: "Система управления gem-зависимостями"
        correct: false
      - id: b
        text: "Минималистичный интерфейс между веб-сервером и Ruby-приложением; Rails — Rack-приложение"
        correct: true
      - id: c
        text: "Инструмент для фоновых задач"
        correct: false
      - id: d
        text: "Библиотека маршрутизации"
        correct: false
    explanation: "Rack — стандартный интерфейс: app.call(env) → [status, headers, body]. Rails, Sinatra, Hanami — все Rack-приложения. Middleware stack в Rails — это Rack middleware."
    difficulty: medium
    topics: [mvc]

  - id: q2
    text: "Объясните жизненный цикл HTTP-запроса в Rails."
    type: single
    options:
      - id: a
        text: "Запрос → Router → Controller → Model → View → Response"
        correct: true
      - id: b
        text: "Запрос → View → Controller → Model → Response"
        correct: false
      - id: c
        text: "Запрос → Model → Controller → View → Response"
        correct: false
      - id: d
        text: "Запрос → Middleware → View → Response"
        correct: false
    explanation: "Полный путь: Nginx/Puma → Rack middleware stack → Router → before_filters → Controller action → Model queries → View rendering → Response. Middleware обрабатывается до/после Router."
    difficulty: medium
    topics: [mvc, controllers]

  - id: q3
    text: "Что такое мемоизация и как её реализовать в Ruby?"
    type: single
    options:
      - id: a
        text: "Кэширование в Redis"
        correct: false
      - id: b
        text: "`def expensive_method; @result ||= compute_something; end` — вычисляет один раз, кэширует в переменную"
        correct: true
      - id: c
        text: "Паттерн только для AR-запросов"
        correct: false
      - id: d
        text: "Thread-local хранилище"
        correct: false
    explanation: "`||=` — memoize через instance variable. При nil/false: @result = fetch_data. При повторном вызове — возвращает @result. Для false-значений используйте defined?(@result)."
    difficulty: medium
    topics: [performance]

  - id: q4
    text: "В чём разница между `render` и `redirect_to` в контроллере?"
    type: single
    options:
      - id: a
        text: "Они выполняют одно и то же"
        correct: false
      - id: b
        text: "render рендерит шаблон в рамках текущего запроса; redirect_to отправляет 302 и браузер делает новый GET"
        correct: true
      - id: c
        text: "render быстрее, redirect_to безопаснее"
        correct: false
      - id: d
        text: "redirect_to работает только в production"
        correct: false
    explanation: "render: один HTTP-цикл, @переменные доступны. redirect_to: два цикла, переменные сбрасываются (используйте flash). После POST → redirect_to предотвращает двойную отправку (PRG pattern)."
    difficulty: medium
    topics: [controllers]

  - id: q5
    text: "Что такое CSRF и как Rails защищается от него?"
    type: single
    options:
      - id: a
        text: "Cross-Site Request Forgery; Rails использует authenticity_token в формах"
        correct: true
      - id: b
        text: "Content Security Request Filter; Rails использует cookies"
        correct: false
      - id: c
        text: "Cross-Site Rendering Framework; защита через headers"
        correct: false
      - id: d
        text: "Rails не защищается от CSRF по умолчанию"
        correct: false
    explanation: "CSRF — атака через форму стороннего сайта. Rails включает protect_from_forgery by default: каждая форма содержит hidden authenticity_token, проверяемый при POST/PUT/DELETE."
    difficulty: medium
    topics: [security]

  - id: q6
    text: "Что такое метапрограммирование в Ruby и какие его примеры в Rails?"
    type: single
    options:
      - id: a
        text: "Написание кода во время компиляции"
        correct: false
      - id: b
        text: "Код, который пишет/модифицирует код во время выполнения; например, has_many генерирует методы"
        correct: true
      - id: c
        text: "Только method_missing"
        correct: false
      - id: d
        text: "Инструмент рефлексии только для дебага"
        correct: false
    explanation: "Метапрограммирование в Rails: has_many → define_method генерирует posts, post_ids. validates → динамические методы. attr_accessor. scope — class_eval. Мощь Ruby: код описывает другой код."
    difficulty: hard
    topics: [models, architecture]

  - id: q7
    text: "Как работает кэширование в Rails? Назовите виды."
    type: single
    options:
      - id: a
        text: "Только через Redis"
        correct: false
      - id: b
        text: "Page cache, Action cache, Fragment cache, Low-level cache через Rails.cache"
        correct: true
      - id: c
        text: "Только через Memcached"
        correct: false
      - id: d
        text: "Автоматически для всех запросов"
        correct: false
    explanation: "Fragment cache: cache(@post) в вьюхе. Low-level: Rails.cache.fetch('key') { compute }. HTTP caching: stale?/fresh_when. Хранилища: memory_store, redis_cache_store, solid_cache_store."
    difficulty: hard
    topics: [caching]

  - id: q8
    text: "Что такое background jobs и зачем они нужны?"
    type: single
    options:
      - id: a
        text: "Задачи, выполняемые в основном потоке"
        correct: false
      - id: b
        text: "Асинхронные задачи вне HTTP-цикла для длинных операций (email, resize, API calls)"
        correct: true
      - id: c
        text: "Cron-задачи на сервере"
        correct: false
      - id: d
        text: "Фоновые HTTP-запросы"
        correct: false
    explanation: "Background jobs через Active Job (Sidekiq, Delayed Job, Good Job): UserMailer.welcome.deliver_later, ResizeImageJob.perform_later(id). Освобождает HTTP-поток, улучшает UX."
    difficulty: medium
    topics: [background-jobs]

  - id: q9
    text: "Объясните разницу между optimistic и pessimistic locking."
    type: single
    options:
      - id: a
        text: "Optimistic — блокирует строку через FOR UPDATE; pessimistic — через версию"
        correct: false
      - id: b
        text: "Pessimistic — SELECT FOR UPDATE (блокировка в БД); optimistic — версия (lock_version), конфликт при save"
        correct: true
      - id: c
        text: "Они решают разные задачи и не сравниваются"
        correct: false
      - id: d
        text: "Оба используют lock_version"
        correct: false
    explanation: "Pessimistic: Post.lock.find(id) → SELECT FOR UPDATE — строка заблокирована. Optimistic: обновляет lock_version, при несовпадении бросает StaleObjectError. Pessimistic — для high-contention, optimistic — для low-contention."
    difficulty: hard
    topics: [concurrency, transactions]

  - id: q10
    text: "Как Rails обеспечивает безопасность от SQL-инъекций?"
    type: single
    options:
      - id: a
        text: "Через firewall"
        correct: false
      - id: b
        text: "Через параметризованные запросы (prepared statements) и экранирование в where с плейсхолдерами"
        correct: true
      - id: c
        text: "Автоматически для всего кода"
        correct: false
      - id: d
        text: "Только через validations"
        correct: false
    explanation: "AR автоматически экранирует значения в хэш-форме where(name: params[:name]). При строковой интерполяции where(\"name = '#{params[:name]}'\") — SQL-инъекция! Используйте ? или именованные placeholders."
    difficulty: medium
    topics: [security, queries]

  - id: q11
    text: "Что такое `before_action` callback и как ограничить его для определённых actions?"
    type: single
    options:
      - id: a
        text: "Только: `before_action :method, actions: [:show]`"
        correct: false
      - id: b
        text: "`before_action :method, only: [:show, :edit]` или `except: [:index]`"
        correct: true
      - id: c
        text: "Нельзя ограничить, применяется ко всем"
        correct: false
      - id: d
        text: "`before_action :method if: :show?`"
        correct: false
    explanation: "only: и except: ограничивают применение фильтра. Также можно skip_before_action в наследниках. Логика условий: if: :method? or unless: :condition?."
    difficulty: easy
    topics: [controllers]

  - id: q12
    text: "Как реализовать soft delete (мягкое удаление) в Rails?"
    type: single
    options:
      - id: a
        text: "Через стандартный метод destroy"
        correct: false
      - id: b
        text: "Добавить колонку deleted_at, переопределить destroy, добавить default_scope где deleted_at IS NULL"
        correct: true
      - id: c
        text: "Через paranoia или discard gem"
        correct: false
      - id: d
        text: "B и C — оба верны"
        correct: true
    explanation: "Soft delete: запись не удаляется из БД, устанавливается deleted_at timestamp. Gem paranoia/discard автоматизируют. Плюс: восстановление данных. Минус: усложняет запросы, нужен default_scope."
    difficulty: medium
    topics: [models, queries]

  - id: q13
    text: "Объясните паттерн PRG (Post-Redirect-Get)."
    type: single
    options:
      - id: a
        text: "POST запрос всегда перенаправляется к GET для обновления страницы без дублирования"
        correct: true
      - id: b
        text: "Метод кэширования POST-запросов"
        correct: false
      - id: c
        text: "Тип авторизации"
        correct: false
      - id: d
        text: "Способ передачи данных в URL"
        correct: false
    explanation: "После успешного POST (create/update) делается redirect_to → браузер делает GET. Предотвращает двойную отправку формы при F5. Стандарт в Rails CRUD."
    difficulty: medium
    topics: [controllers, routing]

  - id: q14
    text: "Что такое `polymorphic routes` в Rails?"
    type: single
    options:
      - id: a
        text: "Маршруты для polymorphic ассоциаций"
        correct: false
      - id: b
        text: "url_for, link_to, redirect_to принимают AR-объект и сами генерируют URL"
        correct: true
      - id: c
        text: "Динамические маршруты с несколькими параметрами"
        correct: false
      - id: d
        text: "Маршруты для нескольких контроллеров"
        correct: false
    explanation: "link_to 'Edit', @post → Rails вызывает polymorphic_url(@post) → /posts/1. Работает с массивами: url_for([:admin, @post]) → /admin/posts/1. Упрощает вьюхи."
    difficulty: hard
    topics: [routing]

  - id: q15
    text: "Как Rails обрабатывает ошибки и исключения в production?"
    type: single
    options:
      - id: a
        text: "Показывает полный stack trace"
        correct: false
      - id: b
        text: "rescue_from в ApplicationController или специальные страницы ошибок в public/"
        correct: true
      - id: c
        text: "Перезапускает сервер"
        correct: false
      - id: d
        text: "Логирует и игнорирует"
        correct: false
    explanation: "rescue_from RecordNotFound, with: :not_found — перехватывает исключения в контроллере. public/404.html, 500.html — статические страницы для ошибок. Мониторинг: Sentry, Honeybadger."
    difficulty: medium
    topics: [controllers]

  - id: q16
    text: "Что такое Content Security Policy (CSP) и как его настроить в Rails?"
    type: single
    options:
      - id: a
        text: "Система прав доступа к БД"
        correct: false
      - id: b
        text: "HTTP-заголовок ограничивающий источники скриптов/стилей; настраивается в config/initializers/content_security_policy.rb"
        correct: true
      - id: c
        text: "Шифрование cookies"
        correct: false
      - id: d
        text: "Антиспам для форм"
        correct: false
    explanation: "CSP защищает от XSS — браузер запрещает загружать ресурсы из недоверенных источников. Rails генерирует config/initializers/content_security_policy.rb. Важно для безопасных приложений."
    difficulty: hard
    topics: [security]

  - id: q17
    text: "Как оптимизировать загрузку большого числа записей в Rails?"
    type: single
    options:
      - id: a
        text: "Через find_each, find_in_batches или in_batches"
        correct: true
      - id: b
        text: "Через all.each"
        correct: false
      - id: c
        text: "Через limit(10000)"
        correct: false
      - id: d
        text: "Только через raw SQL"
        correct: false
    explanation: "User.find_each(batch_size: 1000) { |u| ... } — загружает по 1000 записей, не держит все в памяти. find_in_batches — даёт массив. in_batches — даёт Relation. Обязательно для больших таблиц."
    difficulty: medium
    topics: [performance, queries]

  - id: q18
    text: "Объясните разницу между `session` и `cookies` в Rails."
    type: single
    options:
      - id: a
        text: "Они идентичны"
        correct: false
      - id: b
        text: "session — хранится серверно или подписанный cookie, удаляется при закрытии браузера; cookies — в браузере, с expiration"
        correct: true
      - id: c
        text: "cookies безопаснее session"
        correct: false
      - id: d
        text: "session хранится только в Redis"
        correct: false
    explanation: "По умолчанию Rails session — подписанный cookie (CookieStore). cookies[:key] — обычный cookie. cookies.signed — подписанный. cookies.encrypted — зашифрованный. Session не уязвим к подделке благодаря подписи."
    difficulty: medium
    topics: [security, controllers]

  - id: q19
    text: "Как работает `accepts_nested_attributes_for`?"
    type: single
    options:
      - id: a
        text: "Позволяет принимать атрибуты дочерних моделей через форму родителя"
        correct: true
      - id: b
        text: "Автоматически создаёт nested routes"
        correct: false
      - id: c
        text: "Включает массовое присваивание для вложенных хэшей"
        correct: false
      - id: d
        text: "Deprecated в Rails 7"
        correct: false
    explanation: "has_many :addresses; accepts_nested_attributes_for :addresses — форма с fields_for :addresses создаёт/обновляет адреса вместе с пользователем. _destroy: true для удаления. Альтернатива: Form Objects."
    difficulty: medium
    topics: [associations, controllers]

  - id: q20
    text: "Что проверяют при code review Rails-приложения?"
    type: multiple
    options:
      - id: a
        text: "N+1 запросы (includes/joins)"
        correct: true
      - id: b
        text: "SQL-инъекции и XSS"
        correct: true
      - id: c
        text: "Толстые контроллеры / God Objects"
        correct: true
      - id: d
        text: "Количество строк в файле"
        correct: false
    explanation: "На code review: N+1 (includes), безопасность (strong params, экранирование), архитектура (thin controllers), тесты, индексы на FK, null: false в миграциях, отсутствие секретов в коде."
    difficulty: medium
    topics: [security, performance]
