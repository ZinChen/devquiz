- id: q1
  text: Вы управляете несколькими контейнерами, но вместо использования отдельных Dockerfile для каждого сервиса вы используете монолитный Dockerfile для большого приложения. Каждый раз при сборке образа теряется кэш в CI/CD пайплайне, а общая сборка занимает более 30 минут. Базовый образ обновляется раз в неделю, а слои приложения меняются ежедневно. Выберите верный подход к решению проблемы.
  type: single
  options:
  - id: a
    text: Увеличение частоты обновления базового образа сократит время сборки и решит проблему потери кэша из-за ежедневных изменений в слоях приложения
    correct: false
    explanation: Более частое обновление базового образа только увеличит частоту инвалидации кэша, так как базовый образ — это первый слой.
  - id: b
    text: Уменьшение размера базового образа ускорит загрузку и установку всех пакетов, даст решение проблем потери кэша при ежедневных изменениях в слоях
    correct: false
    explanation: Размер образа влияет на время загрузки, но не решает проблему инвалидации кэша при изменениях в слоях приложения.
  - id: c
    text: Использование флага --no-cache для принудительной пересборки всех слоев и устранит проблемы с кэшем, так как все слои будут пересобраны, что ускорит сборку
    correct: false
    explanation: "--no-cache приводит к полной пересборке каждый раз, что только замедлит процесс."
  - id: d
    text: Использование одного общего слоя для всех сервисов уменьшит количество слоев и ускорит сборку, решит проблему потери кэша при ежедневных изменениях
    correct: false
    explanation: Технически некорректно — слои определяются инструкциями Dockerfile, и это не решит проблему инвалидации.
  - id: e
    text: Разделение Dockerfile на несколько многоступенчатых сборок позволит изолировать изменения в слоях приложения и базового образа, сохраняя кэш для неизмененных частей
    correct: true
    explanation: Многоступенчатая сборка позволяет отделить установку зависимостей (редко меняется) от сборки приложения (часто меняется), сохраняя кэш для стабильных слоев.
  difficulty: medium
  topics: [docker]
  explanation: Разделение на многоступенчатую сборку позволяет изолировать часто меняющиеся слои от редко меняющихся, сохраняя кэш для неизмененных частей.
  extended_explanation: |-
    При монолитной структуре Dockerfile:
    - Любое изменение в коде или зависимостях вызывает инвалидацию кэша для последующих слоев
    - Базовый образ обновляется редко (раз в неделю), но слои приложения меняются ежедневно

    Многоступенчатая сборка позволяет:
    1. Отделить установку зависимостей (редко меняется) от сборки приложения (часто меняется)
    2. Зафиксировать стабильные слои (базовый образ, системные пакеты, зависимости) — они будут браться из кэша
    3. Изменяемые части пересобирать без потери всего кэша
  recommendation: |-
    Повторить принципы кэширования слоев в Docker и использование многоступенчатых сборок.
    Справка: https://docs.docker.com/build/building/multi-stage/
- id: q2
  text: |-
    В вашем Dockerfile используется инструкция ADD для копирования файлов и извлечения архива:

    ```
    FROM nginx:latest
    ADD /app.tar.gz /usr/share/nginx/html
    ADD /config/nginx.conf /etc/nginx/nginx.conf
    CMD ["nginx", "-g", "daemon off;"]
    ```
  type: single
  options:
  - id: a
    text: Установка минимальной версии Nginx для уменьшения размера базового образа
    correct: false
    explanation: Могла бы уменьшить размер, но не объясняет ускорение сборки и удаление ненужных файлов именно из архива.
  - id: b
    text: Перемещение CMD перед инструкцией ADD для ускорения сборки
    correct: false
    explanation: Порядок инструкций не влияет на скорость или размер в данном контексте.
  - id: c
    text: Замена ADD на COPY для копирования файлов и распаковка архива заранее
    correct: true
    explanation: COPY не распаковывает архивы, поэтому архив распаковывается заранее на хосте и копируются только нужные файлы, что уменьшает размер и ускоряет сборку.
  - id: d
    text: Использование ADD для всех операций, так как это универсальная инструкция
    correct: false
    explanation: Не решает проблему, так как ADD всё так же распаковывает архивы.
  - id: e
    text: Уменьшение размера образа, удаление архива после его извлечения в Dockerfile
    correct: false
    explanation: В рамках одного слоя это не работает (архив уже сохранён в слое до удаления).
  difficulty: medium
  topics: [docker]
  explanation: ADD автоматически распаковывает архивы, но оставляет исходный архив в промежуточном кэше. COPY не распаковывает, поэтому лучше распаковать архив заранее и копировать только нужные файлы.
  extended_explanation: |-
    Особенности ADD:
    - Если источник — сжатый архив (.tar.gz), Docker автоматически распаковывает его
    - При этом исходный архив остаётся в промежуточном кэше сборки
    - Размер образа увеличивается (архив и его распакованное содержимое могут задваиваться)

    После замены на COPY:
    - Архив распаковывается заранее на хосте
    - Копируются только нужные файлы (инструкцией COPY)
    - Сборка быстрее (нет распаковки внутри Docker)
    - Размер меньше (архив не переносится в образ)
  recommendation: |-
    Повторить разницу между инструкциями ADD и COPY, особенности распаковки архивов.
    Справка: https://docs.docker.com/reference/dockerfile/#add
    Справка: https://docs.docker.com/reference/dockerfile/#copy
- id: q3
  text: Вы внесли изменения в Docker Compose файл для многоконтейнерного приложения, добавив новые тома для одного из сервисов. Однако при попытке запуска сервис возвращает ошибку, связанную с отсутствием тома. В процессе анализа вы обнаружили, что тома не созданы на хосте, а секция volumes указана некорректно. Какое нарушение в методике работы могло привести к этой проблеме?
  type: single
  options:
  - id: a
    text: Относительные пути в секции volumes запрещены в Docker Compose
    correct: false
    explanation: Относительные пути разрешены (например, ./data:/app/data).
  - id: b
    text: Неправильный тег образа, указанный для сервиса
    correct: false
    explanation: Ошибка про том, не про образ.
  - id: c
    text: Указание параметра build вместо image
    correct: false
    explanation: Это другая конструкция, не связана с ошибкой отсутствия тома.
  - id: d
    text: Некорректное указание пути к томам в секции volumes
    correct: true
    explanation: Если путь указан неправильно (неверный синтаксис, не та структура), Docker не создаст том или смонтирует его некорректно.
  - id: e
    text: Неправильный порядок инструкций в Docker Compose файле
    correct: false
    explanation: В Compose-файле порядок ключей не важен, он читается целиком.
  difficulty: medium
  topics: [docker]
  explanation: Некорректное указание пути к томам (например, неверный синтаксис host_path:container_path) приводит к тому, что Docker не создает том или монтирует его неправильно.
  extended_explanation: |-
    В Docker Compose тома описываются в секции volumes для сервиса:
    ```yaml
    services:
      app:
        volumes:
          - host_path:container_path
    ```

    Если путь указан неправильно:
    - Неверный синтаксис (например, пропущено двоеточие)
    - Не та структура (host_path:container_path вместо правильного формата)
    - Несуществующий путь на хосте

    То Docker либо не создаст том, либо смонтирует его некорректно, что приведет к ошибке запуска.
  recommendation: |-
    Повторить синтаксис описания томов в Docker Compose.
    Справка: https://docs.docker.com/compose/compose-file/#volumes
- id: q4
  text: Вы разрабатываете приложение с несколькими контейнерами, где некоторые из них должны быть доступны из внешней сети, а другие — только внутри кластера. После настройки сети вы заметили, что внутренние контейнеры по-прежнему могут выходить в интернет, нарушая требования безопасности. Какую ошибку вы могли допустить при настройке сети?
  type: single
  options:
  - id: a
    text: Перепутали IP-адреса контейнеров, из-за чего внутренние сервисы стали доступны извне
    correct: false
    explanation: Не объясняет доступ в интернет.
  - id: b
    text: Для внутренних контейнеров не настроили изоляцию с помощью пользовательской сети с ограничениями доступа
    correct: true
    explanation: Нужно создать пользовательскую сеть с опцией --internal, тогда контейнеры не будут иметь доступа во внешнюю сеть.
  - id: c
    text: Для контейнеров использовали параметр --network=host, что автоматически даёт доступ во внешнюю сеть
    correct: false
    explanation: Это редкий вариант и не соответствует 'внутренним контейнерам'.
  - id: d
    text: Отсутствие настройки volumes приводит к тому, что контейнеры используют одну сеть без ограничения доступа
    correct: false
    explanation: Тома не влияют на сетевую изоляцию.
  - id: e
    text: Все контейнеры настроены с доступом в bridge-сеть, что делает их доступными из интернета
    correct: false
    explanation: bridge-сеть по умолчанию изолирована от внешнего мира, но имеет NAT для выхода в интернет, что и является причиной.
  difficulty: medium
  topics: [docker]
  explanation: Для изоляции внутренних контейнеров от внешней сети нужно использовать пользовательскую сеть с опцией --internal или явно ограничивать доступ через сетевые политики.
  extended_explanation: |-
    Стандартная bridge-сеть:
    - Обеспечивает NAT и доступ в интернет для контейнеров
    - Контейнеры в bridge-сети могут выходить в интернет (это проблема)

    Для изоляции нужно:
    1. Создать пользовательскую сеть: `docker network create --internal isolated_network`
    2. Подключить внутренние контейнеры к этой сети
    3. Тогда они не будут иметь доступа во внешнюю сеть

    Или использовать сетевые политики (в swarm/kubernetes).
  recommendation: |-
    Повторить типы сетей в Docker и параметры изоляции.
    Справка: https://docs.docker.com/network/network-tutorial-standalone/
- id: q5
  text: Контейнер data-worker работает в режиме постоянной обработки данных, но внезапно стал завершаться с кодом 137 (выход по сигналу SIGKILL). Обновлений контейнера не было. Логи показывают успешный старт, но не содержат причин завершения. Остановка контейнера и интерактивный вход запрещены. Что может быть основной причиной проблемы и как её диагностировать?
  type: single
  options:
  - id: a
    text: Сбой в коде приложения, приводящий к аварийному завершению — требуется изменение кода, проверяем через docker logs и docker stats
    correct: false
    explanation: Код ошибки был бы другим, и логи содержали бы информацию.
  - id: b
    text: Превышение лимита памяти, проверяем через docker stats и docker inspect на предмет ограничений по памяти
    correct: true
    explanation: 'Код 137 = 128+9 (SIGKILL), чаще всего при превышении лимита памяти. Диагностика: docker stats, docker inspect.'
  - id: c
    text: Проблема в настройках ядра Linux, вызывающая принудительное завершение контейнера, проверяем настройки через docker inspect и проводим анализ Dockerfile
    correct: false
    explanation: Слишком общее объяснение, код 137 прямо указывает на SIGKILL из-за памяти.
  - id: d
    text: Нехватка свободного места на диске хоста, необходимо освободить пространство. Проверить можно с помощью docker exec du -h
    correct: false
    explanation: Нехватка диска обычно приводит к ошибкам записи, но не к SIGKILL.
  - id: e
    text: Ошибка в файловой системе контейнера, требующая пересоздания образа. Для диагностики используем docker stats
    correct: false
    explanation: SIGKILL не типичный признак ошибки ФС.
  difficulty: medium
  topics: [docker]
  explanation: Код 137 = 128 + 9, где 9 — сигнал SIGKILL. Чаще всего это происходит при превышении лимита памяти, установленного для контейнера. Диагностика через docker stats и docker inspect.
  extended_explanation: |-
    Код 137 (exit code 137):
    - 128 + 9 (сигнал SIGKILL)
    - Ядро Linux принудительно завершает процесс
    - Чаще всего при превышении лимита памяти контейнера

    Диагностика:
    - `docker stats` — показывает текущее потребление памяти
    - `docker inspect` — показывает лимиты, установленные для контейнера

    Контейнер не обновлялся → проблема в изменении нагрузки или приближении к ранее установленному лимиту.
  recommendation: |-
    Повторить коды завершения контейнеров и механизмы ограничения ресурсов.
    Справка: https://docs.docker.com/config/containers/resource_constraints/
- id: q6
  text: Вы обнаружили, что один из контейнеров может напрямую взаимодействовать с дисками хостовой системы, включая чтение и запись на них. Это серьезное нарушение безопасности. При этом контейнер запущен без флага --privileged, но всё равно имеет доступ к устройствам /dev/sd*. Какова причина такого поведения?
  type: single
  options:
  - id: a
    text: Установлено значение --cap-add=SYS_RAWIO, которое разрешает прямой доступ к аппаратным ресурсам
    correct: false
    explanation: SYS_RAWIO дает доступ к низкоуровневым операциям, но не дает доступа к блочным устройствам, не смонтированным в контейнер.
  - id: b
    text: Использование --network host позволило контейнеру увидеть устройства хоста через сетевой стек
    correct: false
    explanation: "--network host открывает сетевой стек, но не дает доступа к /dev/sd*."
  - id: c
    text: Контейнер использует volume, смонтированный в /dev, и получает доступ к файлам устройств
    correct: false
    explanation: Нельзя смонтировать /dev как обычный volume, это специальная файловая система.
  - id: d
    text: Включен параметр --security-opt=no-new-privileges=false, что позволило повысить привилегии
    correct: false
    explanation: Отключает защиту от повышения привилегий, но сам по себе не дает доступа к устройствам.
  - id: e
    text: Контейнер запущен с опцией --device для добавления конкретных устройств, что позволяет получить прямой доступ к ним
    correct: true
    explanation: Флаг --device=/dev/sda:/dev/sda пробрасывает конкретное устройство в контейнер, давая прямой доступ.
  difficulty: medium
  topics: [docker]
  explanation: Доступ к блочным устройствам хоста предоставляется через опцию --device, которая пробрасывает конкретные устройства в контейнер.
  extended_explanation: |-
    По умолчанию Docker:
    - Не дает доступа к блочным устройствам (/dev/sda, /dev/sdb и т.д.)
    - Доступны только стандартные устройства (/dev/null, /dev/random)

    Если контейнер может читать/писать на /dev/sd*, значит устройства были явно проброшены:
    ```
    docker run --device=/dev/sda:/dev/sda ...
    ```

    Это представляет серьезную угрозу безопасности, так как контейнер получает прямой доступ к физическому диску хоста.
  recommendation: |-
    Повторить параметры доступа к устройствам хоста из контейнера.
    Справка: https://docs.docker.com/reference/cli/docker/container/run/#device
- id: q7
  text: 'В вашей системе используются общие тома Docker для хранения данных базы данных и логов. Недавно вы столкнулись с проблемами: 1. Несколько томов были повреждены после неожиданного завершения работы контейнеров. 2. Данные базы данных оказались частично утерянными, а логи не обновлялись. 3. Резервное копирование настроено, но занимает слишком много времени. Что вызвало эти проблемы?'
  type: single
  options:
  - id: a
    text: Неоптимальная конфигурация политики резервного копирования
    correct: false
    explanation: Медленное резервирование не вызывает повреждение томов.
  - id: b
    text: Использование томов без проверки доступности при запуске контейнеров
    correct: false
    explanation: Не причина повреждения, скорее следствие.
  - id: c
    text: Отсутствие регулярного тестирования восстановления из резервных копий
    correct: false
    explanation: Может привести к невозможности восстановить данные, но не к их потере при сбое.
  - id: d
    text: Отсутствие настроек автоматического создания снапшотов томов
    correct: false
    explanation: Полезно, но не предотвращает повреждение.
  - id: e
    text: Использование локальных томов без отказоустойчивого хранилища
    correct: true
    explanation: Локальные тома на одном хосте могут быть повреждены при неожиданном выключении. Отказоустойчивое хранилище защитило бы от таких проблем.
  difficulty: medium
  topics: [docker]
  explanation: Локальные тома (по умолчанию) хранятся на том же хосте, где запущен контейнер. При неожиданном выключении хоста файловая система томов может быть повреждена. Отказоустойчивое хранилище (распределенное, сетевое, с репликацией) предотвратило бы такие проблемы.
  extended_explanation: |-
    Признаки:
    - Тома повреждены после неожиданного завершения работы
    - Данные частично утеряны
    - Резервное копирование медленное

    Это классические признаки использования локальных томов:
    - Хранятся на локальном диске хоста
    - При аварийном выключении файловая система может повреждаться
    - База данных не успевает завершить транзакции

    Решение: использовать отказоустойчивое хранилище (распределенное, сетевое, с репликацией).
    Для production обычно используют:
    - сетевые/распределённые хранилища,
    - или настраивают репликацию/backup.
  recommendation: |-
    Повторить типы томов в Docker и варианты отказоустойчивого хранения.
    Справка: https://docs.docker.com/storage/volumes/
- id: q8
  text: Вы настраивали систему мониторинга для контейнерных приложений, но столкнулись с проблемой, что уведомления о повышенной нагрузке (например, превышение предела CPU или памяти) не всегда приходят своевременно. Почему это происходит?
  type: single
  options:
  - id: a
    text: Grafana используется для постоянного мониторинга, но не настроена система для отправки уведомлений, а используется только визуализацию данных
    correct: false
    explanation: Grafana может отправлять уведомления, но это не основная причина.
  - id: b
    text: Используется Docker cli для логирования и анализа, но логи ежедневно просматриваются вручную
    correct: false
    explanation: Не про своевременность уведомлений.
  - id: c
    text: Настроен Prometheus Alertmanager, но не учтено, что правила уведомлений могут быть некорректно настроены для контейнерных ресурсов
    correct: false
    explanation: Могло бы объяснить 'не всегда своевременно', но не основную причину.
  - id: d
    text: Используется Cadvisor, но не настроены автоматические уведомления на основе собранных метрик, что приводит к отсутствию мгновенных оповещений
    correct: true
    explanation: Cadvisor собирает метрики, но не отправляет уведомления. Нужен Alertmanager с правилами оповещений.
  - id: e
    text: Используется команда docker logs для мониторинга контейнеров, но при этом уведомления не настроены, так как система мониторинга настроена только для ручного анализа логов
    correct: false
    explanation: Логи не дают метрики CPU/памяти.
  difficulty: medium
  topics: [docker]
  explanation: Cadvisor собирает метрики контейнеров (CPU, память), но не отправляет уведомления. Для оповещений нужно настроить Prometheus Alertmanager с правилами на основе метрик Cadvisor.
  extended_explanation: |-
    Cadvisor:
    - Собирает метрики контейнеров (CPU, память, сеть, диск)
    - Экспортирует метрики (например, в Prometheus)
    - НЕ отправляет уведомления

    Для получения оповещений нужно:
    1. Настроить Prometheus для сбора метрик из Cadvisor
    2. Настроить Alertmanager с правилами оповещений
    3. Определить правила (например, CPU > 80% для 5 минут)

    Если используется только Cadvisor без Alertmanager, уведомлений не будет.
  recommendation: |-
    Повторить стэк мониторинга контейнеров: Cadvisor, Prometheus, Alertmanager.
    Справка: https://github.com/google/cadvisor
    Справка: https://prometheus.io/docs/alerting/latest/alertmanager/
- id: q9
  text: Вы хотите интегрировать Docker в пайплайн CI/CD для повышения стабильности развертывания. Какой аспект контейнеризации Docker помогает минимизировать ошибки в процессе доставки приложений?
  type: single
  options:
  - id: a
    text: Заменяет инструменты оркестрации для управления пайплайном
    correct: false
    explanation: Docker не заменяет оркестрацию, они работают вместе.
  - id: b
    text: Позволяет обновлять контейнеры без перезапуска пайплайна
    correct: false
    explanation: Не совсем точно, контейнеры перезапускаются при обновлении.
  - id: c
    text: Исключает необходимость настройки сетей между контейнерами
    correct: false
    explanation: Сети всё равно нужно настраивать.
  - id: d
    text: Автоматически исправляет ошибки конфигурации в приложениях
    correct: false
    explanation: Не функция Docker.
  - id: e
    text: Стандартизирует среду на всех этапах пайплайна, исключая расхождения
    correct: true
    explanation: Docker упаковывает приложение со всем окружением, обеспечивая идентичность среды на всех этапах.
  difficulty: medium
  topics: [docker]
  explanation: 'Docker стандартизирует среду выполнения: приложение упаковывается вместе со всеми зависимостями в образ, который проходит через все этапы CI/CD без изменений, исключая расхождения в окружении.'
  extended_explanation: |-
    Проблема доставки приложений:
    - Различия в окружении (dev, staging, production)
    - Разные версии библиотек, ОС, зависимостей
    - Ошибки, проявляющиеся только на определенных этапах

    Решение Docker:
    - Приложение упаковывается со всем окружением в образ
    - Образ проходит через все этапы CI/CD без изменений
    - Гарантируется идентичность среды выполнения
  recommendation: |-
    Повторить преимущества контейнеризации в CI/CD.
    Справка: https://docs.docker.com/ci-cd/
- id: q10
  text: Как сканеры уязвимостей помогают в CI/CD?
  type: single
  options:
  - id: a
    text: Интегрируются в CI/CD для мониторинга безопасности
    correct: false
    explanation: Слишком обще, суть не только в мониторинге, а в активном предотвращении.
  - id: b
    text: Обнаруживают только уязвимости, связанные с сетевыми атаками
    correct: false
    explanation: Ищут любые известные уязвимости (CVE).
  - id: c
    text: Автоматически исправляют уязвимости
    correct: false
    explanation: Только выявляют, исправление требует обновления зависимостей.
  - id: d
    text: Интегрируются в пайплайн и могут блокировать публикацию образов
    correct: true
    explanation: Сканеры проверяют образы на уязвимости и могут остановить пайплайн при обнаружении критических проблем.
  - id: e
    text: Ускоряют процесс деплоя, уменьшая количество проверок
    correct: false
    explanation: Наоборот, добавляют проверку, что может замедлить, но повысить безопасность.
  difficulty: medium
  topics: [docker]
  explanation: Сканеры уязвимостей интегрируются в CI/CD как этап проверки. При обнаружении критических уязвимостей они могут блокировать публикацию образа в registry или развертывание в production.
  extended_explanation: |-
    Сканеры уязвимостей (Trivy, Snyk, Clair):
    - Интегрируются в пайплайн после сборки образа
    - Проверяют образ на известные уязвимости (CVE) в зависимостях и ОС
    - Если найдены уязвимости выше заданного порога, пайплайн останавливается
    - Образ не публикуется в registry или не развертывается

    Это механизм безопасности "сдвиг влево" (shift left).
  recommendation: |-
    Повторить принципы работы сканеров уязвимостей (Trivy, Snyk, Clair).
    Справка: https://docs.docker.com/security/scanning/
- id: q11
  text: На сервере с 10 развернутыми Docker-контейнерами вы замечаете резкое увеличение входящего трафика на нестандартные порты и одновременно несколько контейнеров начинают потреблять в 3 раза больше CPU и памяти. Что могло привести к этой ситуации, и какие могут возникнуть дополнительные сложности, если ее не устранить?
  type: single
  options:
  - id: a
    text: Использование скомпрометированных образов Docker могло привести к запуску вредоносного кода. Это может привести к утечке данных или использованию контейнеров для майнинга
    correct: true
    explanation: Рост CPU/памяти + подозрительный трафик характерны для криптомайнеров или ботнета в скомпрометированных образах.
  - id: b
    text: Игнорирование обновлений Docker Engine и связанных библиотек могло оставить сервер уязвимым. Если это не исправить, сервер может быть взломан через известные уязвимости
    correct: false
    explanation: Увеличивает уязвимость, но не вызывает синхронный рост нагрузки на нескольких контейнерах.
  - id: c
    text: Неправильная настройка сетевых политик Docker позволила злоумышленникам отправлять подозрительный трафик через нестандартные порты. Это может привести к использованию контейнеров для выполнения DDoS-атак
    correct: false
    explanation: Объясняет сетевую часть, но не рост CPU/памяти.
  - id: d
    text: Отсутствие ограничений на доступ к системным ресурсам контейнеров могло вызвать резкий рост нагрузки. Это приведет к снижению производительности других приложений на сервере
    correct: false
    explanation: Позволяет зловреду потреблять ресурсы, но не объясняет источник проблемы.
  - id: e
    text: Неправильное распределение прав доступа к контейнерам позволило неавторизованным пользователям вносить изменения. Это может привести к полной потере контроля над системой, если уязвимость не будет устранена
    correct: false
    explanation: Слишком общее объяснение, не специфично для сценария.
  difficulty: medium
  topics: [docker]
  explanation: 'Симптомы (резкий рост CPU/памяти + подозрительный трафик) характерны для криптомайнеров, внедренных в контейнеры через скомпрометированные образы. Последствия: утечка данных, использование ресурсов для майнинга, нарушение работы сервисов.'
  extended_explanation: |-
    Симптомы:
    - Резкий рост входящего трафика на нестандартные порты
    - Одновременный скачок CPU и памяти в нескольких контейнерах

    Это характерно для:
    - Криптомайнеров (рост CPU/RAM)
    - C2-связи ботнета (подозрительный трафик)

    Причина:
    - Скомпрометированные образы из ненадежных реестров
    - Подмена популярных образов
    - Уязвимости, позволяющие внедрить майнер

    Последствия:
    - Утечка данных
    - Использование ресурсов для майнинга
    - Нарушение работы сервисов
  recommendation: |-
    Повторить практики безопасной работы с образами и мониторинга аномалий.
    Справка: https://docs.docker.com/security/
- id: q12
  text: Как Docker тома помогают ускорить работу приложения в контейнере, если оно активно использует файловую систему?
  type: single
  options:
  - id: a
    text: Размещают данные на нескольких дисках хоста, сильно увеличивая скорость доступа к ним
    correct: false
    explanation: Тома не делают это автоматически.
  - id: b
    text: Шифруют выбранные файлы, что сильно снижает накладные расходы при операциях чтения и записи
    correct: false
    explanation: Тома не шифруют данные.
  - id: c
    text: Позволяют обходить слоистую файловую систему контейнера, обеспечивая быстрый доступ к данным
    correct: true
    explanation: Тома монтируются напрямую к хостовой ФС, не используя слоистую систему с Copy-on-Write, что повышает производительность I/O.
  - id: d
    text: Автоматически кэшируют файлы внутри контейнера, сокращая время доступа к необходимым данным
    correct: false
    explanation: Не основное назначение томов.
  - id: e
    text: Используют оперативную память контейнера для хранения данных, минимизируя задержки
    correct: false
    explanation: Это tmpfs, а не тома.
  difficulty: medium
  topics: [docker]
  explanation: Файловая система контейнера использует слои (overlayFS) с механизмом Copy-on-Write, что добавляет накладные расходы. Тома монтируются напрямую к хостовой ФС, минуя слоистую систему, обеспечивая более высокую производительность ввода-вывода.
  extended_explanation: |-
    Файловая система контейнера:
    - Использует механизм слоев (overlayFS)
    - При записи работает Copy-on-Write (дополнительные расходы)

    Тома (volumes):
    - Специально смонтированные директории на хосте
    - Не используют слоистую файловую систему
    - Подключаются напрямую к хостовой ФС
    - Обеспечивают более высокую производительность I/O
    - Данные сохраняются при пересоздании контейнера
  recommendation: |-
    Повторить особенности слоистой файловой системы и преимущества томов.
    Справка: https://docs.docker.com/storage/volumes/
- id: q13
  text: Ваше приложение в Docker работает стабильно, но потребление дискового пространства растет из-за большого количества временных файлов, которые не удаляются автоматически. В результате хранилище хостовой системы быстро заполняется, создавая риск остановки работы приложения. Вы хотите автоматизировать процесс очистки временных файлов, чтобы избежать их накопления. Как это сделать, не нарушая работу приложения?
  type: single
  options:
  - id: a
    text: Настроить периодическую очистку томов Docker
    correct: false
    explanation: Очистка томов удалит данные, которые могут быть нужны приложению, включая временные файлы, если они хранятся в томах. Это может нарушить работу приложения.
  - id: b
    text: Удалить временные файлы вручную после каждого запуска контейнера
    correct: false
    explanation: Ручное удаление не автоматизирует процесс, а только создает дополнительную работу.
  - id: c
    text: Использовать cron-задачу для удаления временных файлов
    correct: true
    explanation: Cron-задача может запускать скрипт очистки, который удаляет только те временные файлы, которые уже не используются приложением (например, старше определенного времени). Это автоматизирует очистку без риска удалить нужные файлы.
  - id: d
    text: Переместить временные файлы в удаленное хранилище
    correct: false
    explanation: Перемещение не решает проблему накопления, а только переносит ее в другое место.
  - id: e
    text: Добавить лимиты на использование дискового пространства для контейнера
    correct: false
    explanation: Лимиты предотвратят бесконтрольный рост, но не очистят уже накопившиеся файлы. При достижении лимита контейнер может остановиться, что нарушит работу приложения.
  difficulty: medium
  topics: [docker]
  explanation: Cron-задача позволяет регулярно запускать скрипт очистки, который удаляет только те временные файлы, которые уже не нужны приложению (например, старше N дней), не затрагивая активные файлы.
  extended_explanation: |-
    Проблема:
    - Приложение создает временные файлы
    - Они накапливаются, заполняя диск
    - Нужна автоматическая очистка без риска для работающего приложения

    Решение: cron-задача
    - Можно настроить внутри контейнера (если есть cron)
    - Или на хосте, выполняющую docker exec с командой очистки
    - Скрипт очистки должен удалять только файлы старше определенного времени (например, find /tmp -type f -mtime +1 -delete)

    Преимущества:
    - Полная автоматизация
    - Удаляются только действительно старые файлы
    - Не нарушает работу приложения

    Почему не лимиты:
    - Лимиты только ограничивают рост, но не очищают
    - При достижении лимита контейнер может остановиться
    - Это нарушит работу приложения, а не решит проблему
  recommendation: |-
    Для автоматической очистки временных файлов можно использовать cron-задачи внутри контейнера или на хосте, настроенные на удаление файлов старше определенного возраста.
    Справка: https://docs.docker.com/config/containers/start-containers-automatically/
- id: q14
  text: Какая функция секции secrets в Docker Compose обеспечивает безопасность конфиденциальных данных?
  type: single
  options:
  - id: a
    text: Шифрование данных на уровне файловой системы хоста
    correct: false
    explanation: Секреты могут шифроваться при передаче, но это не основная функция секции secrets.
  - id: b
    text: Синхронизация секретов между всеми контейнерами в сети
    correct: false
    explanation: Каждый контейнер получает свои секреты, они не синхронизируются автоматически.
  - id: c
    text: Автоматическое удаление секретов после остановки контейнера
    correct: false
    explanation: Секреты удаляются только при удалении сервиса, но это не главная функция.
  - id: d
    text: Монтирование секретов как файлов с правами только для чтения
    correct: true
    explanation: Секреты монтируются в контейнер как файлы (в /run/secrets/) с правами только для чтения, предотвращая случайное изменение.
  - id: e
    text: Генерация случайных паролей при каждом запуске сервиса
    correct: false
    explanation: Docker не генерирует секреты автоматически.
  difficulty: medium
  topics: [docker]
  explanation: Секреты в Docker монтируются как файлы (обычно в /run/secrets/) с правами только для чтения. Это предотвращает случайное изменение процессов внутри контейнера и не копирует секреты в образ.
  extended_explanation: |-
    Механизм secrets в Docker:
    - Конфиденциальные данные (пароли, ключи)
    - Передаются в контейнер безопасным способом
    - Монтируются как файлы в /run/secrets/
    - Права только для чтения (read-only)
    - Не копируются в образ
    - Не видны в списке процессов (как переменные окружения)

    В Swarm дополнительно шифруются при передаче и хранении.
  recommendation: |-
    Повторить работу с секретами в Docker Swarm и Compose.
    Справка: https://docs.docker.com/compose/compose-file/#secrets
- id: q15
  text: Вы настраиваете Docker Swarm для приложения, которое использует несколько секретов, таких как ключи API и пароли. После развертывания несколько сервисов не могут получить доступ к своим секретам, а логи указывают на отсутствие необходимых данных. Сервисы продолжают работать нестабильно, что приводит к сбоям в приложении и возможным нарушениям безопасности. Как правильно настроить доступ к секретам, чтобы устранить затруднение?
  type: single
  options:
  - id: a
    text: Настроить автоматическую синхронизацию секретов через общий реестр
    correct: false
    explanation: Не нужно, секреты уже управляются Swarm.
  - id: b
    text: Сохранить секреты в переменных окружения для каждого сервиса
    correct: false
    explanation: Менее безопасно, секреты видны в процессах.
  - id: c
    text: Привязать секреты к конкретным сервисам, которые их используют
    correct: true
    explanation: Секреты нужно явно указывать в секции secrets для каждого сервиса, иначе они не будут доступны.
  - id: d
    text: Использовать общий том для передачи секретов между контейнерами
    correct: false
    explanation: Неправильно с точки зрения безопасности.
  - id: e
    text: Добавить секреты в сам файл Docker Compose
    correct: false
    explanation: Опасно, секреты будут видны в открытом виде.
  difficulty: medium
  topics: [docker]
  explanation: В Docker Swarm секреты определяются на уровне стека, но доступны только тем сервисам, которым они явно назначены в секции secrets сервиса. Без этого сервис не получит доступ к секрету.
  extended_explanation: |-
    Проблема:
    - Секреты объявлены в секции secrets
    - Но не указаны в разделе secrets внутри описания сервиса
    - Сервис запускается, но не может прочитать секрет из /run/secrets/

    Решение:
    ```yaml
    services:
      app:
        image: myapp
        secrets:
          - db_password
          - api_key
    ```

    Для каждого сервиса нужно явно перечислить, какие секреты ему нужны.
  recommendation: |-
    Повторить привязку секретов к сервисам в Docker Swarm.
    Справка: https://docs.docker.com/engine/swarm/secrets/
