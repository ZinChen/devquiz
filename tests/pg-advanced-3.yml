- id: q4
  text: |-
    Вы создаете временную таблицу temp_data, объединяя результаты двух запросов с несовместимыми типами данных (например, integer и text). Требования: Автоматически принимать структуру первого запроса, Сохранять дублирующиеся строки. Какой подход использовать?

    ```
    Create temporary table temp_data as
    <operator>
    select id, data from source1
    <operator>
    select id, into from source2;
    ```
  type: single
  options:
  - id: a
    text: Использовать UNION ALL, чтобы сохранить дубликаты и автоматически привести типы данных
    correct: true
  - id: b
    text: Использовать UNION, потому что он сохраняет все дубликаты без изменений
    correct: false
  - id: c
    text: Использовать JOIN, чтобы просто поставить результаты двух SELECT друг под другом
    correct: false
  - id: d
    text: Использовать EXCEPT, чтобы объединить оба набора строк и сохранить все дубликаты
    correct: false
  difficulty: medium
  explanation: "`UNION ALL` объединяет результаты двух `SELECT` без удаления дублей. `UNION` удаляет дубли, а `JOIN` и `EXCEPT` решают другие задачи."
  extended_explanation: |-
    `UNION ALL` объединяет результаты двух `SELECT` без удаления дублей. `UNION` удаляет дубли, а `JOIN` и `EXCEPT` решают другие задачи.

