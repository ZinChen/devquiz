- id: q12
  text: |-
    В таблице orders содержится 1 миллион записей. На колонке customer_id есть индекс B-Tree. Вы выполняете запрос с фильтрацией по customer_id и выбираете 90% строк. Какой тип сканирования таблицы будет использован планировщиком PostgreSQL?

    ```
    Create table orders(
      Order_id serial primary key,
      Customer_id integer not null,
      Order_date date,
      Total_amount numeric
    );
    -- index
    Create index idx_orders_customer_id on orders(customer_id);
    -- query
    Explain
    select * from orders where customer_id < 900000;
    ```
  type: single
  options:
  - id: a
    text: Seq Scan
    correct: true
  - id: b
    text: Index Scan, потому что PostgreSQL всегда предпочитает индекс при наличии условия по индексируемой колонке
    correct: false
  - id: c
    text: Index Only Scan, потому что SELECT * никогда не требует чтения heap
    correct: false
  - id: d
    text: Bitmap Index Scan, потому что он обязательно дешевле Seq Scan при выборке около 90% таблицы
    correct: false
  difficulty: medium
  explanation: Если условие выбирает большой процент строк (~90%), последовательное сканирование (Seq Scan) оказывается дешевле, чем чтение через индекс.
  extended_explanation: |-
    Если условие выбирает большой процент строк (~90%), последовательное сканирование (Seq Scan) оказывается дешевле, чем чтение через индекс.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: планировщик, seq scan, selectivity, индексы.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить как селективность условия влияет на выбор между `Seq Scan`, `Index Scan` и bitmap-сканированием.
    Справка: https://postgrespro.ru/docs/postgresql/current/using-explain.html
    Справка: https://postgrespro.ru/docs/postgresql/current/planner-optimizer.html
- id: q13
  text: |-
    В таблицу action_log сохраняются данные, журналирующие некоторые действия. После релиза частота вставки записей с action='login' возросла в десять раз. Решено временно не вставлять данные с action='login', сохранив уже существующие записи. Как это сделать?

    ```
    Create table action_log(
      Id serial,
      Action varchar,
      Description text
    );
    ```
  type: single
  options:
  - id: a
    text: Создать before insert trigger, запрещающий 'login'
    correct: true
  - id: b
    text: Удалить все записи с action='login' из таблицы, чтобы прекратить будущие вставки
    correct: false
  - id: c
    text: Создать RULE, потому что это единственный безопасный способ запретить только новые INSERT с action='login'
    correct: false
  - id: d
    text: Изменить тип колонки action, и это автоматически запретит только новые значения 'login' без других изменений
    correct: false
  difficulty: medium
  explanation: Самый безопасный способ временно запретить вставку определенных строк — создать триггер `BEFORE INSERT`, проверяющий значение NEW.action.
  extended_explanation: |-
    Самый безопасный способ временно запретить вставку определенных строк — создать триггер `BEFORE INSERT`, проверяющий значение NEW.action.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
