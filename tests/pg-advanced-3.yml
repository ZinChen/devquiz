- id: q11
  text: У вас есть рабочая база данных с высокой нагрузкой и ее копия. Вы хотите проанализировать производительность запроса, чтобы исключить влияние нагрузки на результаты анализа. Какую команду следует использовать для тестирования на копии базы данных.
