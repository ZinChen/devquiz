- id: q3
  text: |-
    Имеется следующая структура. Было решено во все существующие записи в таблице role добавить пермиссию 'read' так, чтобы не было дубликатов. Как этого достичь?

    ```
    Create type permission as enum ('read','write','execute','transfer','download');
    Create table role(
      ...
      Permissions permission[],
      ...
    );
    ```
  type: single
  options:
  - id: a
    text: Update role set permissions = array_append(permissions,'read') where array_position(permissions, 'read') is null
    correct: true
  - id: b
    text: Update role set permissions = permissions || permissions
    correct: false
  - id: c
    text: Update role set permissions = array_cat(permissions, permissions)
    correct: false
  - id: d
    text: Update role set permissions = array_remove(permissions, 'read')
    correct: false
  difficulty: medium
  explanation: Ключевое условие — избежать дубликатов. Вариант с `array_append` внутри UPDATE, дополненный условием `WHERE array_position(...) IS NULL`, гарантирует добавление только при отсутствии элемента.
  extended_explanation: |-
    Ключевое условие — избежать дубликатов. Вариант с `array_append` внутри UPDATE, дополненный условием `WHERE array_position(...) IS NULL`, гарантирует добавление только при отсутствии элемента.

