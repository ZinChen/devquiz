- id: q8
  text: |-
    Существует таблица some_table. Запускаются две транзакции — t1 и t2. Какой уровень изоляции транзакций НЕ позволит выполнить commit?

    ```
    -- source data
    Class | Value
    1     | 10
    1     | 20
    1     | 100
    2     | 200
    -- t1
    Select SUM(value) from mytab where class = 1;
    Insert into some_table(class, value) values (2, 30);
    Commit;
    -- t2
    Select SUM(value) from mytab where class = 2;
    Insert into some_table(class, value) values (1, 300);
    Commit;
    ```
  type: single
  options:
  - id: a
    text: Serializable
    correct: true
  - id: b
    text: Repeatable Read, потому что в PostgreSQL он всегда отклоняет такие циклические зависимости на COMMIT
    correct: false
  - id: c
    text: Read Committed, потому что любой конфликт чтения и записи обязательно приводит к ошибке сериализации
    correct: false
  - id: d
    text: Read Uncommitted, потому что в PostgreSQL он строже, чем Serializable
    correct: false
  difficulty: medium
  explanation: В PostgreSQL уровень `SERIALIZABLE` обнаруживает конфликты на основе зависимостей между транзакциями. Здесь создается циклическая зависимость, которая приведет к ошибке сериализации.
  extended_explanation: |-
    В PostgreSQL уровень `SERIALIZABLE` обнаруживает конфликты на основе зависимостей между транзакциями. Здесь создается циклическая зависимость, которая приведет к ошибке сериализации.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
