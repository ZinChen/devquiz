- id: q5
  text: |-
    У вас есть две связанные таблицы, где t2 использует значение из последовательности по умолчанию при обновлении ссылочной записи. Какие проблемы могут возникнуть при удалении записей из t1?

    ```
    Create sequence seq start with 1 increment by 1;
    Create table t1(
      Id serial primary key
    );
    Create table t2(
      Id integer default nextval('seq') references t1(id) on delete set default
    );
    ```
  type: single
  options:
  - id: a
    text: Удаление записи из t1 приведет к изменению ссылающихся записей в t2 на значение по умолчанию из последовательности, что может нарушать логику приложения
    correct: true
  - id: b
    text: Удаление записи из t1 всегда безопасно, потому что ON DELETE SET DEFAULT не проверяет внешний ключ повторно
    correct: false
  - id: c
    text: Удаление записи из t1 автоматически создаст недостающую строку в t1 для нового значения по умолчанию
    correct: false
  - id: d
    text: Удаление записи из t1 всегда заменяет внешний ключ в t2 на NULL даже при ON DELETE SET DEFAULT
    correct: false
  difficulty: medium
  explanation: При `ON DELETE SET DEFAULT` PostgreSQL подставляет в дочерние строки значение по умолчанию. В этой схеме это значение берётся из последовательности, поэтому ссылка в `t2` может измениться на новый `id`, что действительно способно ломать логику приложения; при этом такое значение ещё должно удовлетворять внешнему ключу.
  extended_explanation: |-
    При `ON DELETE SET DEFAULT` PostgreSQL подставляет в дочерние строки значение по умолчанию. В этой схеме это значение берётся из последовательности, поэтому ссылка в `t2` может измениться на новый `id`, что действительно способно ломать логику приложения; при этом такое значение ещё должно удовлетворять внешнему ключу.

