- id: q5
  text: |-
    Найдите модуль разницы между средней и максимальной заработной платой сотрудников в таблице Employees.

    ```
    Employees
    | employee_id | Integer |
    | first_name  | String  |
    | last_name   | String  |
    | department  | String  |
    | job_title   | String  |
    | salary      | Integer |
    ```
  type: single
  options:
  - id: a
    text: SELECT ABS(AVG(salary) - MAX(salary)) FROM Employees;
    correct: true
  - id: b
    text: SELECT AVG(salary) - MAX(salary) FROM Employees;
    correct: false
  - id: c
    text: SELECT MEDIAN(salary) - MAX(salary) FROM Employees;
    correct: false
  - id: d
    text: SELECT ABS(SUM(*)/COUNT(*) - MAX(salary)) FROM Employees;
    correct: false
  - id: e
    text: SELECT ABS(MEDIAN(salary) - MAX(salary)) FROM Employees;
    correct: false
  difficulty: medium
  topics: [queries]
  explanation: Для вычисления модуля разницы используется функция ABS(). AVG(salary) вычисляет среднюю зарплату, MAX(salary) — максимальную. Функции MEDIAN в PostgreSQL нет (есть PERCENTILE_CONT).
  extended_explanation: |-
    Для вычисления модуля разницы используется функция ABS(). AVG(salary) вычисляет среднюю зарплату, MAX(salary) — максимальную. Функции MEDIAN в PostgreSQL нет (есть PERCENTILE_CONT).

