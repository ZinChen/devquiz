- id: q1
  text: |-
    Получите список имен и фамилий сотрудников с зарплатой до 50 000 рублей из таблицы Employees.

    ```
    Employees
    employee_id    Integer
    first_name     String
    last_name      String
    department     String
    job_title      String
    salary         Integer
    ```
  type: single
  options:
  - id: a
    text: SELECT first_name, last_name FROM Employees WHERE salary < 50000;
    correct: true
  - id: b
    text: SELECT first_name, last_name WHERE salary < 50000;
    correct: false
  - id: c
    text: FROM Employees SELECT first_name, last_name WHERE salary < 50000;
    correct: false
  - id: d
    text: CHOOSE first_name, last_name FROM Employees HAVING salary < 50000;
    correct: false
  - id: e
    text: SELECT first_name, last_name WHERE salary < 50000 FROM Employees;
    correct: false
  difficulty: medium
  topics: [queries]
  explanation: 'Правильный синтаксис SELECT в SQL: сначала указываются выбираемые колонки, затем FROM с таблицей, затем WHERE с условием фильтрации.'
  extended_explanation: |-
    Правильный синтаксис SELECT в SQL: сначала указываются выбираемые колонки, затем FROM с таблицей, затем WHERE с условием фильтрации.

