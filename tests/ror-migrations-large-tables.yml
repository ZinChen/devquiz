slug: ror-migrations-large-tables
title: "Rails: Миграции на больших таблицах"
description: "Безопасные миграции в продакшне: нулевое время простоя, DDL-локи, CONCURRENTLY, бэкфилл и PostgreSQL-специфика."
tags: [rails, migrations, postgresql, locking, zero-downtime, advanced]
difficulty: advanced
estimated_time: 25
default_challenge_mode: highlight

questions:
  - id: q1
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [migrations, indexes, locking]
    text: "Индекс на большой таблице без простоя требует два условия. Найди строку с проблемой."
    modes:
      highlight:
        code: |
          class AddReportingIndexesToOrders < ActiveRecord::Migration[7.0]
            def up
              safety_assured do
                execute "SET lock_timeout = '5s'"

                add_index :orders, :created_at, algorithm: :concurrently
                add_index :orders, [:account_id, :status], algorithm: :concurrently
                add_index :orders, :user_id, algorithm: :concurrently
              end
            end

            def down
              remove_index :orders, :user_id, if_exists: true
              remove_index :orders, [:account_id, :status], if_exists: true
              remove_index :orders, :created_at, if_exists: true
            end
          end
        correct_lines: [4]
        hint: "Строка про таймаут лока выглядит полезной, но она не решает главное ограничение PostgreSQL для concurrent index."

      fill:
