    explanation: "`algorithm: :concurrently` заставляет Rails использовать `CREATE INDEX CONCURRENTLY`, но PostgreSQL запрещает выполнять такую команду внутри транзакционного блока. Rails по умолчанию оборачивает миграции в транзакцию, поэтому рядом с concurrent index нужен `disable_ddl_transaction!`. `statement_timeout` ограничивает время выполнения запроса, но не отключает транзакцию миграции. Источники: https://www.postgresql.org/docs/current/sql-createindex.html#SQL-CREATEINDEX-CONCURRENTLY, https://guides.rubyonrails.org/active_record_migrations.html#using-the-disable-ddl-transaction-method"
