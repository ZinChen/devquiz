    explanation: "`validate: false` добавляет CHECK constraint как `NOT VALID`: новые и изменяемые строки уже должны соответствовать constraint, но существующие строки не проверяются сразу во время `ALTER TABLE`. Потом constraint валидируют отдельным шагом через `validate_check_constraint`. В этом примере опасный параметр — `validate: true`, потому что он включает немедленную проверку существующих строк. Источники: https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/SchemaStatements.html#method-i-add_check_constraint, https://www.postgresql.org/docs/current/sql-altertable.html#SQL-ALTERTABLE-DESC-NOT-VALID"

