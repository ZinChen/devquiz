    text: "Финальная проверка: индекс на таблицу с 20 млн строк должен добавляться без простоя. Не сделано главное ограничение."
    modes:
      highlight:
        code: |
          class AddIndexToPostsPublishedAt < ActiveRecord::Migration[7.0]
            def up
              execute "SET statement_timeout = '10min'"

              add_index :posts, :published_at, algorithm: :concurrently
            end
          end
        correct_lines: ["after:1"]
        insert_text: "  disable_ddl_transaction!"
        hint: "algorithm: :concurrently есть. Посмотри на объявление класса — чего не хватает в классе рядом с def up?"

