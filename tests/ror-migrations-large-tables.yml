    explanation: "Для большой таблицы FK лучше добавлять в два шага. `validate: false` создаёт constraint как `NOT VALID`: новые строки уже проверяются, но существующие строки не сканируются сразу во время добавления ограничения. Затем отдельной миграцией выполняют `validate_foreign_key`. В этом примере опасный параметр — `validate: true`, потому что он заставляет PostgreSQL сразу валидировать существующие строки. Источники: https://www.postgresql.org/docs/current/sql-altertable.html#SQL-ALTERTABLE-DESC-NOT-VALID, https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/SchemaStatements.html#method-i-add_foreign_key"

