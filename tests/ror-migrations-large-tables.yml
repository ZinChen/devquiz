    explanation: "`lock_timeout` ограничивает ожидание блокировки, но не отключает транзакцию миграции. Поэтому для неблокирующего индекса нужны оба условия: algorithm: :concurrently (PostgreSQL строит индекс в фоне без ACCESS EXCLUSIVE лока) и disable_ddl_transaction! (CONCURRENTLY нельзя запускать внутри транзакции, которую Rails добавляет по умолчанию). Источники: https://www.postgresql.org/docs/current/sql-createindex.html#SQL-CREATEINDEX-CONCURRENTLY, https://api.rubyonrails.org/classes/ActiveRecord/Migration.html"

  - id: q2
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [locking, schema]
    text: "Миграция ждёт DDL-лок бесконечно, блокируя новые запросы. Найди строку, которая выглядит как защита от долгой операции, но не решает проблему ожидания лока."
    modes:
      highlight:
        code: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              execute "SET statement_timeout = '2s'"

              add_column :orders, :status, :string, default: 'pending'
            end

            def down
              remove_column :orders, :status
            end
          end
        correct_lines: [3]
        hint: "Эта настройка ограничивает длительность выполнения запроса, но проблема здесь в ожидании DDL-лока перед ALTER TABLE."

      fill:
        code: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              ___

              add_column :orders, :status, :string, default: 'pending'
            end

            def down
              remove_column :orders, :status
            end
          end
        answer: "execute \"SET lock_timeout = '2s'\""

      fix:
        code: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              execute "SET statement_timeout = '2s'"

              add_column :orders, :status, :string, default: 'pending'
            end

            def down
              remove_column :orders, :status
            end
          end
        answer: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              execute "SET lock_timeout = '2s'"

              add_column :orders, :status, :string, default: 'pending'
            end

            def down
              remove_column :orders, :status
            end
          end
    explanation: "`statement_timeout` ограничивает общее время выполнения SQL-выражения, но здесь главная опасность — долгое ожидание DDL-лока перед `ALTER TABLE`. Для этого нужен `lock_timeout`: если миграция не смогла быстро получить lock, она упадёт, а не будет висеть и блокировать новые запросы. Источник: https://www.postgresql.org/docs/current/runtime-config-client.html#GUC-LOCK-TIMEOUT"

  - id: q3
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, locking]
    text: "Добавление нового столбца на 50 млн строк может надолго заблокировать таблицу. Найди проблемный параметр."
    modes:
      highlight:
        code: |
          class AddRiskReviewStateToAccounts < ActiveRecord::Migration[7.0]
            def change
              add_column :accounts, :risk_review_state, :string,
                        default: "not_required",
                        comment: "Current AML/KYC review state",
                        null: false
            end
          end
        correct_lines: [6]
        hint: "Кликни на параметр, который превращает добавление столбца в обязательную проверку всех существующих строк."

      fill:
        code: |
          # Шаг 1: добавить столбец со значением по умолчанию "not_required"
          class AddRiskReviewStateToAccounts < ActiveRecord::Migration[7.0]
            def up
              add_column :accounts, :risk_review_state, :string,
                        ___,
                        comment: "Current AML/KYC review state"
            end
          end
        answer: "default: \"not_required\""

      fix:
        code: |
          class AddRiskReviewStateToAccounts < ActiveRecord::Migration[7.0]
            def change
              add_column :accounts, :risk_review_state, :string,
                        default: "not_required",
                        comment: "Current AML/KYC review state",
                        null: false
            end
          end
        answer: |
          class AddRiskReviewStateToAccounts < ActiveRecord::Migration[7.0]
            def up
              add_column :accounts, :risk_review_state, :string,
                        default: "not_required",
                        comment: "Current AML/KYC review state"
            end
          end

    explanation: "В старых версиях PostgreSQL добавление столбца с `DEFAULT` и `NOT NULL` на большой таблице могло приводить к тяжёлой операции: базе нужно было заполнить или проверить существующие строки, пока таблица находится под DDL-локом. Более безопасный путь — сначала добавить столбец с `default`, но без `null: false`, затем отдельно сделать бэкфилл существующих строк и только после этого добавить `NOT NULL` отдельной миграцией. В этом примере проблемный параметр — `null: false`. Источник: https://www.postgresql.org/docs/11/sql-altertable.html"

  - id: q4
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [migrations, performance]
    text: "Бэкфилл 10 млн строк одним UPDATE заблокирует таблицу. Найди строку с неправильным методом."
    modes:
      highlight:
        code: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.update_all(verified: true)
            end
          end
        correct_lines: [5]
        hint: "Кликни на строку, которая создаст одну огромную транзакцию"
      fill:
        code: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.___(of: 1000) do |batch|
                batch.update_all(verified: true)
              end
            end
          end
        answer: "in_batches"
      fix:
        code: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.update_all(verified: true)
            end
          end
        answer: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.in_batches(of: 1000) do |batch|
                batch.update_all(verified: true)
              end
            end
          end
    explanation: "in_batches разбивает UPDATE на транзакции по N строк. Каждая партия держит лок только на своё время. find_each не подходит — загружает объекты в память и делает UPDATE по одной. Источник: https://api.rubyonrails.org/classes/ActiveRecord/Batches.html#method-i-in_batches"

  - id: q5
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, locking]
    text: "Добавление FK сканирует всю таблицу. Найди строку без нужного параметра."
    modes:
      highlight:
        code: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users
            end
          end
        correct_lines: [3]
        hint: "Кликни на строку, которая заблокирует таблицу на время сканирования всех строк"
      fill:
        code: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users, ___
            end
          end
        answer: "validate: false"
      fix:
        code: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users
            end
          end
        answer: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users, validate: false
            end
          end
    explanation: "validate: false добавляет FK как NOT VALID: новые строки валидируются, существующие — нет. Затем validate_foreign_key с мягким локом. Источник: https://www.postgresql.org/docs/current/sql-altertable.html#SQL-ALTERTABLE-DESC-VALIDATE-CONSTRAINT"

