    explanation: "В старых версиях PostgreSQL добавление столбца с `DEFAULT` и `NOT NULL` на большой таблице могло приводить к тяжёлой операции: базе нужно было заполнить или проверить существующие строки, пока таблица находится под DDL-локом. Более безопасный путь — сначала добавить столбец с `default`, но без `null: false`, затем отдельно сделать бэкфилл существующих строк и только после этого добавить `NOT NULL` отдельной миграцией. В этом примере проблемный параметр — `null: false`. Источник: https://www.postgresql.org/docs/11/sql-altertable.html"

  - id: q4
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [migrations, performance]
    text: "Бэкфилл 10 млн строк должен идти батчами без загрузки моделей. Неправильный метод."
    modes:
      highlight:
        code: |
          class BackfillNotificationPreferences < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.where(notification_channel: nil).find_each(batch_size: 1000) do |user|
                user.update!(notification_channel: "email")
              end
            end
          end
        correct_lines: [5]
        hint: "Как этот метод отдаёт данные в блок — по одной записи или целым набором?"

      fill:
        code: |
          class BackfillNotificationPreferences < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.where(notification_channel: nil).___(of: 1000) do |batch|
                batch.update_all(notification_channel: "email")
              end
            end
          end
        answer: "in_batches"

      fix:
        code: |
          class BackfillNotificationPreferences < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.where(notification_channel: nil).find_each(batch_size: 1000) do |user|
                user.update!(notification_channel: "email")
              end
            end
          end
        answer: |
          class BackfillNotificationPreferences < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.where(notification_channel: nil).in_batches(of: 1000) do |batch|
                batch.update_all(notification_channel: "email")
              end
            end
          end

    explanation: "`find_each` действительно читает записи батчами, но отдаёт отдельные ActiveRecord-объекты. В бэкфилле на миллионах строк это приведёт к загрузке моделей, колбэкам/валидациям при `update!` и множеству отдельных `UPDATE`. Для такого бэкфилла лучше использовать `in_batches`: он отдаёт relation на партию строк, после чего можно выполнить один `update_all` на каждую партию. Так работа делится на небольшие SQL-операции, а не превращается в один огромный `UPDATE` или миллионы обновлений по одной записи. Источник: https://api.rubyonrails.org/classes/ActiveRecord/Batches.html#method-i-in_batches"

