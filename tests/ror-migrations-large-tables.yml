slug: ror-migrations-large-tables
title: "Rails: Миграции на больших таблицах"
description: "Безопасные миграции в продакшне: нулевое время простоя, DDL-локи, CONCURRENTLY, бэкфилл и PostgreSQL-специфика."
tags: [rails, migrations, postgresql, locking, zero-downtime, advanced]
difficulty: advanced
estimated_time: 25
default_challenge_mode: highlight

questions:
  - id: q1
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [migrations, indexes, locking]
    text: "Индекс на большой таблице без простоя требует два условия. Найди строку с проблемой."
    modes:
      highlight:
        code: |
          class AddIndexToOrdersUserId < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              add_index :orders, :user_id
            end
          end
        correct_lines: [5]
        hint: "disable_ddl_transaction! есть, но этого недостаточно — кликни на строку, которая всё равно заблокирует таблицу"
      fill:
        code: |
          class AddIndexToOrdersUserId < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              add_index :orders, :user_id, ___
            end
          end
        answer: "algorithm: :concurrently"
      fix:
        code: |
          class AddIndexToOrdersUserId < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              add_index :orders, :user_id
            end
          end
        answer: |
          class AddIndexToOrdersUserId < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              add_index :orders, :user_id, algorithm: :concurrently
            end
          end
    explanation: "Для неблокирующего индекса нужны оба условия: algorithm: :concurrently (PostgreSQL строит индекс в фоне без ACCESS EXCLUSIVE лока) и disable_ddl_transaction! (CONCURRENTLY нельзя запускать внутри транзакции, которую Rails добавляет по умолчанию). Источники: https://www.postgresql.org/docs/current/sql-createindex.html#SQL-CREATEINDEX-CONCURRENTLY, https://api.rubyonrails.org/classes/ActiveRecord/Migration.html"

  - id: q3
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [locking, schema]
    text: "Миграция ждёт DDL-лок бесконечно, блокируя новые запросы. Найди строку, которую нужно добавить перед ALTER TABLE."
    modes:
      highlight:
        code: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              add_column :orders, :status, :string, default: 'pending'
            end
          end
        correct_lines: [3]
        hint: "Кликни на строку, перед которой нужно установить lock_timeout"
      fill:
        code: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              ___
              add_column :orders, :status, :string, default: 'pending'
            end
          end
        answer: "execute \"SET lock_timeout = '2s'\""
      fix:
        code: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              add_column :orders, :status, :string, default: 'pending'
            end
          end
        answer: |
          class AddStatusToOrders < ActiveRecord::Migration[7.0]
            def up
              execute "SET lock_timeout = '2s'"
              add_column :orders, :status, :string, default: 'pending'
            end
          end
    explanation: "lock_timeout прерывает попытку захвата лока если она длится дольше указанного времени. Лучше упасть быстро и повторить, чем блокировать все запросы. Источник: https://www.postgresql.org/docs/current/runtime-config-client.html#GUC-LOCK-TIMEOUT"

  - id: q4
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, locking]
    text: "Добавление NOT NULL столбца на 50 млн строк перезапишет каждую строку. Найди проблемный параметр."
    modes:
      highlight:
        code: |
          class AddVerifiedToUsers < ActiveRecord::Migration[7.0]
            def change
              add_column :users, :verified, :boolean,
                         default: false, null: false
            end
          end
        correct_lines: [4]
        hint: "Кликни на параметр, который вызовет полную перезапись таблицы в старых версиях PG"
      fill:
        code: |
          # Шаг 1: добавить без NOT NULL
          class AddVerifiedToUsers < ActiveRecord::Migration[7.0]
            def up
              ___
            end
          end
        answer: "add_column :users, :verified, :boolean, default: false"
      fix:
        code: |
          class AddVerifiedToUsers < ActiveRecord::Migration[7.0]
            def change
              add_column :users, :verified, :boolean,
                         default: false, null: false
            end
          end
        answer: |
          class AddVerifiedToUsers < ActiveRecord::Migration[7.0]
            def up
              add_column :users, :verified, :boolean, default: false
            end
          end
    explanation: "До PG 11: добавление DEFAULT + NOT NULL переписывало всю таблицу. PG 11+ хранит DEFAULT в метаданных. Безопасный путь: добавить без NOT NULL → бэкфилл → добавить NOT NULL отдельно. Источник: https://www.postgresql.org/docs/11/sql-altertable.html"

  - id: q5
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [migrations, performance]
    text: "Бэкфилл 10 млн строк одним UPDATE заблокирует таблицу. Найди строку с неправильным методом."
    modes:
      highlight:
        code: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.update_all(verified: true)
            end
          end
        correct_lines: [5]
        hint: "Кликни на строку, которая создаст одну огромную транзакцию"
      fill:
        code: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.___(of: 1000) do |batch|
                batch.update_all(verified: true)
              end
            end
          end
        answer: "in_batches"
      fix:
        code: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.update_all(verified: true)
            end
          end
        answer: |
          class BackfillUserVerified < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def up
              User.in_batches(of: 1000) do |batch|
                batch.update_all(verified: true)
              end
            end
          end
    explanation: "in_batches разбивает UPDATE на транзакции по N строк. Каждая партия держит лок только на своё время. find_each не подходит — загружает объекты в память и делает UPDATE по одной. Источник: https://api.rubyonrails.org/classes/ActiveRecord/Batches.html#method-i-in_batches"

  - id: q6
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, locking]
    text: "Добавление FK сканирует всю таблицу. Найди строку без нужного параметра."
    modes:
      highlight:
        code: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users
            end
          end
        correct_lines: [3]
        hint: "Кликни на строку, которая заблокирует таблицу на время сканирования всех строк"
      fill:
        code: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users, ___
            end
          end
        answer: "validate: false"
      fix:
        code: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users
            end
          end
        answer: |
          class AddFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users, validate: false
            end
          end
    explanation: "validate: false добавляет FK как NOT VALID: новые строки валидируются, существующие — нет. Затем validate_foreign_key с мягким локом. Источник: https://www.postgresql.org/docs/current/sql-altertable.html#SQL-ALTERTABLE-DESC-VALIDATE-CONSTRAINT"

  - id: q7
    type: code_challenge
    default_mode: highlight
    difficulty: medium
    topics: [schema, locking]
    text: "Второй шаг добавления FK — валидация существующих строк. Найди неправильный метод."
    modes:
      highlight:
        code: |
          class ValidateFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users
            end
          end
        correct_lines: [3]
        hint: "Кликни на строку, которая добавит FK заново вместо валидации существующего"
      fill:
        code: |
          class ValidateFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              ___
            end
          end
        answer: "validate_foreign_key :orders, :users"
      fix:
        code: |
          class ValidateFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              add_foreign_key :orders, :users
            end
          end
        answer: |
          class ValidateFkOrdersToUsers < ActiveRecord::Migration[7.0]
            def change
              validate_foreign_key :orders, :users
            end
          end
    explanation: "validate_foreign_key выполняет VALIDATE CONSTRAINT с SHARE UPDATE EXCLUSIVE локом — не блокирует чтение и запись. Источник: https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/SchemaStatements.html#method-i-validate_foreign_key"

  - id: q8
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, migrations]
    text: "change_column переписывает все строки таблицы. Найди опасный вызов."
    modes:
      highlight:
        code: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              change_column :products, :status, :string, default: 'active'
            end
          end
        correct_lines: [3]
        hint: "Кликни на строку, которая заблокирует таблицу при изменении только DEFAULT"
      fill:
        code: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              ___ :products, :status, "active"
            end
          end
        answer: "change_column_default"
      fix:
        code: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              change_column :products, :status, :string, default: 'active'
            end
          end
        answer: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              change_column_default :products, :status, "active"
            end
          end
    explanation: "change_column_default выполняет ALTER COLUMN SET DEFAULT — моментально, без перезаписи строк. change_column переписывает всю таблицу. Источник: https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/SchemaStatements.html#method-i-change_column_default"

  - id: q9
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [indexes, locking]
    text: "Удаление индекса тоже берёт лок. Найди строку без нужного флага."
    modes:
      highlight:
        code: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email
            end
          end
        correct_lines: [5]
        hint: "Кликни на строку, которая заблокирует таблицу при удалении индекса"
      fill:
        code: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email, ___
            end
          end
        answer: "algorithm: :concurrently"
      fix:
        code: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email
            end
          end
        answer: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email, algorithm: :concurrently
            end
          end
    explanation: "DROP INDEX CONCURRENTLY удаляет индекс без блокировки DML. Rails поддерживает через algorithm: :concurrently в remove_index. Требует disable_ddl_transaction!. Источник: https://www.postgresql.org/docs/current/sql-dropindex.html"

  - id: q10
    type: code_challenge
    default_mode: highlight
    difficulty: medium
    topics: [migrations, schema]
    text: "Миграция делает необратимое действие — удаляет столбец. Найди неправильный метод."
    modes:
      highlight:
        code: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def change
              remove_column :users, :legacy_token
            end
          end
        correct_lines: [2]
        hint: "Кликни на метод, который не позволит откатить миграцию корректно"
      fill:
        code: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def ___(dir)
              dir.up   { remove_column :users, :legacy_token }
              dir.down { add_column    :users, :legacy_token, :string }
            end
          end
        answer: "reversible"
      fix:
        code: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def change
              remove_column :users, :legacy_token
            end
          end
        answer: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def reversible(dir)
              dir.up   { remove_column :users, :legacy_token }
              dir.down { add_column    :users, :legacy_token, :string }
            end
          end
    explanation: "reversible позволяет описать оба направления. Rails бросит ActiveRecord::IrreversibleMigration при откате если не описать down. Источник: https://guides.rubyonrails.org/active_record_migrations.html#using-reversible"

  - id: q11
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, locking]
    text: "CHECK NOT VALID добавляет ограничение без полного сканирования таблицы. Найди пропущенный параметр."
    modes:
      highlight:
        code: |
          class AddNotNullCheckToUsersEmail < ActiveRecord::Migration[7.0]
            def up
              add_check_constraint :users,
                "email IS NOT NULL",
                name: "users_email_not_null"
            end
          end
        correct_lines: [5]
        hint: "Кликни на строку после которой нужен параметр, отключающий немедленную валидацию"
      fill:
        code: |
          class AddNotNullCheckToUsersEmail < ActiveRecord::Migration[7.0]
            def up
              add_check_constraint :users,
                "email IS NOT NULL",
                name: "users_email_not_null",
                ___
            end
          end
        answer: "validate: false"
      fix:
        code: |
          class AddNotNullCheckToUsersEmail < ActiveRecord::Migration[7.0]
            def up
              add_check_constraint :users,
                "email IS NOT NULL",
                name: "users_email_not_null"
            end
          end
        answer: |
          class AddNotNullCheckToUsersEmail < ActiveRecord::Migration[7.0]
            def up
              add_check_constraint :users,
                "email IS NOT NULL",
                name: "users_email_not_null",
                validate: false
            end
          end
    explanation: "validate: false (Rails 6.1+) добавляет CHECK NOT VALID мгновенно. Затем validate_check_constraint с SHARE UPDATE EXCLUSIVE локом. Источник: https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/SchemaStatements.html#method-i-add_check_constraint"

  - id: q12
    type: code_challenge
    default_mode: highlight
    difficulty: medium
    topics: [migrations, performance]
    text: "В бэкфилле нужно вывести прогресс. Найди строку с неправильным методом вывода."
    modes:
      highlight:
        code: |
          class BackfillUserSlugs < ActiveRecord::Migration[7.0]
            def up
              User.find_each.with_index do |user, i|
                user.update_column(:slug, user.name.parameterize)
                puts "Processed #{i}" if (i % 1000).zero?
              end
            end
          end
        correct_lines: [5]
        hint: "Кликни на строку с методом вывода, который не предназначен для контекста миграций"
      fill:
        code: |
          class BackfillUserSlugs < ActiveRecord::Migration[7.0]
            def up
              User.find_each.with_index do |user, i|
                user.update_column(:slug, user.name.parameterize)
                ___ "Processed #{i}" if (i % 1000).zero?
              end
            end
          end
        answer: "say"
      fix:
        code: |
          class BackfillUserSlugs < ActiveRecord::Migration[7.0]
            def up
              User.find_each.with_index do |user, i|
                user.update_column(:slug, user.name.parameterize)
                puts "Processed #{i}" if (i % 1000).zero?
              end
            end
          end
        answer: |
          class BackfillUserSlugs < ActiveRecord::Migration[7.0]
            def up
              User.find_each.with_index do |user, i|
                user.update_column(:slug, user.name.parameterize)
                say "Processed #{i}" if (i % 1000).zero?
              end
            end
          end
    explanation: "say — встроенный метод ActiveRecord::Migration для вывода в лог миграций. say_with_time замеряет время блока. puts работает, но обходит стандартный формат лога миграций. Источник: https://api.rubyonrails.org/classes/ActiveRecord/Migration.html#method-i-say"

  - id: q13
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [migrations, locking]
    text: "Финальная проверка: добавление индекса на таблицу с 20 млн строк без простоя. Найди пропущенную строку."
    modes:
      highlight:
        code: |
          class AddIndexToPostsPublishedAt < ActiveRecord::Migration[7.0]
            def change
              add_index :posts, :published_at, algorithm: :concurrently
            end
          end
        correct_lines: [1]
        hint: "Кликни на строку после которой нужно объявление, без которого миграция упадёт с ошибкой"
      fill:
        code: |
          class AddIndexToPostsPublishedAt < ActiveRecord::Migration[7.0]
            ___

            def change
              add_index :posts, :published_at, algorithm: :concurrently
            end
          end
        answer: "disable_ddl_transaction!"
      fix:
        code: |
          class AddIndexToPostsPublishedAt < ActiveRecord::Migration[7.0]
            def change
              add_index :posts, :published_at, algorithm: :concurrently
            end
          end
        answer: |
          class AddIndexToPostsPublishedAt < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              add_index :posts, :published_at, algorithm: :concurrently
            end
          end
    explanation: "CONCURRENTLY всегда требует disable_ddl_transaction!. Без него Rails бросит ошибку 'index cannot be created concurrently within a transaction'. Источник: https://guides.rubyonrails.org/active_record_migrations.html#using-the-disable-ddl-transaction-method"
