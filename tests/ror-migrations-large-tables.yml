  - id: q7
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [schema, migrations]
    text: "change_column переписывает все строки таблицы. Найди опасный вызов."
    modes:
      highlight:
        code: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              change_column :products, :status, :string, default: 'active'
            end
          end
        correct_lines: [3]
        hint: "Кликни на строку, которая заблокирует таблицу при изменении только DEFAULT"
      fill:
        code: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              ___ :products, :status, "active"
            end
          end
        answer: "change_column_default"
      fix:
        code: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              change_column :products, :status, :string, default: 'active'
            end
          end
        answer: |
          class ChangeProductStatusDefault < ActiveRecord::Migration[7.0]
            def change
              change_column_default :products, :status, "active"
            end
          end
    explanation: "change_column_default выполняет ALTER COLUMN SET DEFAULT — моментально, без перезаписи строк. change_column переписывает всю таблицу. Источник: https://api.rubyonrails.org/classes/ActiveRecord/ConnectionAdapters/SchemaStatements.html#method-i-change_column_default"

  - id: q8
    type: code_challenge
    default_mode: highlight
    difficulty: hard
    topics: [indexes, locking]
    text: "Удаление индекса тоже берёт лок. Найди строку без нужного флага."
    modes:
      highlight:
        code: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email
            end
          end
        correct_lines: [5]
        hint: "Кликни на строку, которая заблокирует таблицу при удалении индекса"
      fill:
        code: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email, ___
            end
          end
        answer: "algorithm: :concurrently"
      fix:
        code: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email
            end
          end
        answer: |
          class RemoveOldIndexFromUsers < ActiveRecord::Migration[7.0]
            disable_ddl_transaction!

            def change
              remove_index :users, :email, algorithm: :concurrently
            end
          end
    explanation: "DROP INDEX CONCURRENTLY удаляет индекс без блокировки DML. Rails поддерживает через algorithm: :concurrently в remove_index. Требует disable_ddl_transaction!. Источник: https://www.postgresql.org/docs/current/sql-dropindex.html"

  - id: q9
    type: code_challenge
    default_mode: highlight
    difficulty: medium
    topics: [migrations, schema]
    text: "Миграция делает необратимое действие — удаляет столбец. Найди неправильный метод."
    modes:
      highlight:
        code: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def change
              remove_column :users, :legacy_token
            end
          end
        correct_lines: [2]
        hint: "Кликни на метод, который не позволит откатить миграцию корректно"
      fill:
        code: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def ___(dir)
              dir.up   { remove_column :users, :legacy_token }
              dir.down { add_column    :users, :legacy_token, :string }
            end
          end
        answer: "reversible"
      fix:
        code: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def change
              remove_column :users, :legacy_token
            end
          end
        answer: |
          class RemoveOldTokenFromUsers < ActiveRecord::Migration[7.0]
            def reversible(dir)
              dir.up   { remove_column :users, :legacy_token }
              dir.down { add_column    :users, :legacy_token, :string }
            end
          end
    explanation: "reversible позволяет описать оба направления. Rails бросит ActiveRecord::IrreversibleMigration при откате если не описать down. Источник: https://guides.rubyonrails.org/active_record_migrations.html#using-reversible"

