- id: q1
  text: Как выполнить слияние ветки hotfix в текущую ветку, чтобы избежать fast-forward?
  type: single
  options:
  - id: a
    text: git merge hotfix --ff-only
    correct: false
    explanation: "--ff-only требует только fast-forward слияния, что противоположно условию."
  - id: b
    text: git cherry-pick hotfix
    correct: false
    explanation: cherry-pick применяет отдельные коммиты, а не сливает ветку целиком.
  - id: c
    text: git rebase hotfix
    correct: false
    explanation: rebase переписывает историю, но не создает коммит слияния.
  - id: d
    text: git merge --squash hotfix
    correct: false
    explanation: "--squash объединяет все коммиты в один, но не создает коммит слияния."
  - id: e
    text: git merge hotfix --no-ff
    correct: true
    explanation: "--no-ff гарантирует создание отдельного коммита слияния даже при возможности fast-forward."
  difficulty: medium
  topics: [git]
  explanation: Флаг --no-ff гарантирует создание отдельного коммита слияния, сохраняя информацию о ветке hotfix.
  extended_explanation: |-
    При обычном слиянии Git выполняет fast-forward, если целевая ветка не имеет новых коммитов:
    - История становится линейной
    - Информация о существовании отдельной ветки теряется

    Флаг `--no-ff` (no fast-forward) гарантирует создание коммита слияния, даже если технически возможно fast-forward. Это сохраняет в истории факт существования ветки hotfix.
  recommendation: |-
    Повторить типы слияний в Git: fast-forward, no-fast-forward, squash.
    Справка: https://git-scm.com/docs/git-merge
- id: q2
  text: Какой способ выбрать, чтобы восстановить удалённую директорию (с файлами), если вы уже зафиксировали её удаление коммитом назад?
  type: single
  options:
  - id: a
    text: Использовать git stash pop
    correct: false
    explanation: stash работает с временно сохраненными изменениями, не с удаленными файлами в истории.
  - id: b
    text: Использовать git restore <директория>
    correct: false
    explanation: restore восстанавливает файлы из индекса или рабочей директории, но удаленный коммит уже в истории.
  - id: c
    text: Использовать git checkout <коммит> -- <директория>
    correct: true
    explanation: checkout из указанного коммита восстанавливает файлы/директории в рабочую директорию и индекс.
  - id: d
    text: Применить git clean
    correct: false
    explanation: clean удаляет неотслеживаемые файлы, не восстанавливает удаленные.
  - id: e
    text: Выполнить git revert HEAD
    correct: false
    explanation: revert отменяет изменения коммита, но создает новый коммит, что сложнее простого восстановления файлов.
  difficulty: medium
  topics: [git]
  explanation: git checkout <коммит> -- <директория> восстанавливает файлы из указанного коммита, перезаписывая текущее состояние.
  extended_explanation: |-
    Если удаление уже закоммичено:
    1. Нужен коммит, где директория еще существовала (например, HEAD~1)
    2. `git checkout HEAD~1 -- директория/` восстановит файлы из того коммита
    3. После этого можно сделать новый коммит с восстановленными файлами
  recommendation: |-
    Повторить команды для работы с историей: checkout из коммита, revert, restore.
    Справка: https://git-scm.com/docs/git-checkout
- id: q3
  text: |-
    Вы работаете в ветке feature/import-module. В процессе вы добавили новый модуль импорта данных, но при попытке откатить один из коммитов случайно потеряли все последние изменения.

    Вы выполняете git log и видите следующее:

    1 commit 5f12b2a
    2 Author: Some Developer
    3 Date: Tue Apr 23 17:15:00 2025
    4 Initial import module setup
    5 commit 3a67d2c
    6 Author: Some Developer
    7 Date: Tue Apr 23 16:20:00 2025
    8 Fixed validation logic
    9 Затем вы смотрите git reflog:
    10 3a67d2c HEAD@{0}: reset: moving to HEAD~1
    11 9b1e104 HEAD@{1}: commit: Initial import module setup
    12 3a67d2c HEAD@{2}: commit: Fixed validation logic

    Какая команда была выполнена и как восстановить утраченные изменения?
  type: single
  options:
  - id: a
    text: Выполнена `git reset --hard HEAD~1`, для восстановления нужно выполнить `git cherry-pick 9b1e104`
    correct: true
    explanation: Из reflog видно reset --hard, и потерянный коммит 9b1e104 можно применить через cherry-pick.
  - id: b
    text: Выполнена `git reset --soft`, изменения остались в staging, нужно сделать `git commit`
    correct: false
    explanation: 'reflog показывает reset: moving to HEAD~1, что указывает на --hard (потеря коммита).'
  - id: c
    text: Выполнена `git rebase -i`, и нужный коммит был удален, восстановление — `git reflog && git reset --hard HEAD@{2}`
    correct: false
    explanation: В reflog нет указаний на rebase, только на reset.
  - id: d
    text: Выполнена `git revert`, удалившая фиксы, для восстановления надо выполнить `git reset --hard 9b1e104`
    correct: false
    explanation: revert создает новый коммит, в reflog нет упоминания revert.
  - id: e
    text: Выполнена `reset --mixed`, изменения остались в рабочей директории, и нужно снова их закоммитить
    correct: false
    explanation: mixed не теряет изменения в рабочей директории, но в логе видна потеря коммита.
  difficulty: medium
  topics: [git]
  explanation: Из reflog видно, что был выполнен `git reset --hard HEAD~1`. Коммит 9b1e104 можно восстановить через `git cherry-pick 9b1e104`.
  extended_explanation: |-
    Анализ reflog:
    - `3a67d2c HEAD@{0}: reset: moving to HEAD~1` — явное указание на reset --hard
    - `9b1e104 HEAD@{1}: commit: Initial import module setup` — потерянный коммит
    - `3a67d2c HEAD@{2}: commit: Fixed validation logic` — предыдущий коммит

    После `reset --hard` коммит 9b1e104 стал недостижим, но не удален. Его можно применить через cherry-pick.
  recommendation: |-
    Повторить работу с reflog и восстановление потерянных коммитов.
    Справка: https://git-scm.com/docs/git-reflog
