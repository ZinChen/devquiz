slug: api-advanced-1
title: "API и веб-технологии — продвинутый уровень"
description: "Продвинутые вопросы по API-дизайну, протоколам, безопасности и тестированию: REST, SOAP, JWT, WebSocket, GraphQL."
tags: [api, web, hh]
difficulty: advanced
estimated_time: 20

questions:
  - id: q1
    text: "В системе обработки медицинских данных требуется: 1. Поддержка транзакционности операций. 2. Гарантированная доставка сообщений. 3. Соответствие HIPAA требованиям безопасности. 4. Интеграция с legacy-системами на IBM Mainframe. Какой протокол предпочтительнее: REST или SOAP?"
    type: single
    options:
      - id: a
        text: "SOAP, так как WS-AtomicTransaction и WS-ReliableMessaging обеспечивают требования, а WS-Security с XML-Encryption соответствует HIPAA"
        correct: true
        explanation: "WS-* стандарты закрывают все требования: транзакции, надёжную доставку, безопасность на уровне сообщений, а WSDL обеспечивает строгую интеграцию с Mainframe."
      - id: b
        text: "SOAP, потому что WSDL позволяет типизированную интеграцию с IBM Mainframe-системами"
        correct: false
        explanation: "Это верно, но не покрывает требования по транзакционности и гарантированной доставке."
      - id: c
        text: "REST, потому что HIPAA допускает защиту данных на уровне TLS, и можно избежать сложности WS-Security"
        correct: false
        explanation: "TLS защищает канал, но не обеспечивает сквозное шифрование при промежуточных узлах, что требуется для HIPAA."
      - id: d
        text: "REST, так как OAuth 2.0 и JWT позволяют реализовать гибкую авторизацию, соответствующую требованиям HIPAA"
        correct: false
        explanation: "OAuth2 и JWT решают авторизацию, но не гарантируют доставку и транзакционность."
      - id: e
        text: "REST с gRPC, так как HTTP/2 снижает задержки, а interceptors можно использовать для имитации транзакций"
        correct: false
        explanation: "gRPC не стандартизирован для mainframe и не даёт встроенных гарантий доставки."
    explanation: "Только SOAP с его расширениями (WS-*) закрывает все четыре требования: транзакционность, гарантированную доставку, безопасность на уровне сообщений и строгую типизацию для mainframe."
    recommendation: |
      Повторить особенности SOAP (WS-AtomicTransaction, WS-ReliableMessaging, WS-Security) и требования медицинских стандартов безопасности.

  - id: q2
    text: "Вы тестируете API и хотите проверить, возвращает ли сервер статус 401 Unauthorized при отсутствии токена авторизации. Какую последовательность действий нужно выполнить в Postman?"
    type: single
    options:
      - id: a
        text: "Вручную удалить токен перед каждым запросом и анализировать ответы"
        correct: false
        explanation: "Неэффективно, нет автоматизации."
      - id: b
        text: "Настроить токен в вкладке 'Authorization' и протестировать все возможные сценарии"
        correct: false
        explanation: "Это для успешных сценариев, а не для отсутствия токена."
      - id: c
        text: "Добавить неверный токен в заголовок и проверить статус ответа"
        correct: false
        explanation: "Проверяет другой случай (неверный токен), а не отсутствие."
      - id: d
        text: "Использовать Mock-сервер для симуляции запросов с отсутствующими заголовками"
        correct: false
        explanation: "Избыточно, не тестирует реальный сервер."
      - id: e
        text: "Удалить токен авторизации из заголовков, отправить запрос и написать тест в 'Tests' для проверки статуса ответа"
        correct: true
        explanation: "Имитирует именно отсутствие токена и автоматизирует проверку статуса 401."
    explanation: "Нужно удалить токен (имитация отсутствия), отправить запрос и в Tests проверить статус 401."
    recommendation: |
      Повторить основы тестирования API в Postman, написание тестов вкладки Tests.

  - id: q3
    text: "Почему JWT может быть предпочтительным выбором для распределенной системы с большим количеством пользователей для мобильного приложения?"
    type: single
    options:
      - id: a
        text: "Поддерживает многофакторную аутентификацию и шифрование, что делает его идеальным для всех типов приложений"
        correct: false
        explanation: "JWT сам по себе не реализует MFA."
      - id: b
        text: "Позволяет хранить состояние сессий на сервере, что упрощает управление пользователями"
        correct: false
        explanation: "JWT как раз позволяет не хранить сессии на сервере."
      - id: c
        text: "Требует больше ресурсов для обработки токенов, но обеспечивает максимальную безопасность данных"
        correct: false
        explanation: "Проверка подписи JWT быстрее запроса к БД за сессией."
      - id: d
        text: "Не требует хранения состояния сессий на сервере, что облегчает масштабирование системы"
        correct: true
        explanation: "Сервер проверяет подпись токена, не обращаясь к общему хранилищу сессий."
      - id: e
        text: "Автоматически обновляет токены после каждого запроса, что повышает безопасность"
        correct: false
        explanation: "Автообновление не является свойством JWT, это отдельный механизм."
    explanation: "JWT — самодостаточный токен. Серверу не нужно хранить сессию, что критично для горизонтального масштабирования."
    recommendation: |
      Повторить принципы JWT: структура токена, отсутствие состояния на сервере, механизм подписи.

  - id: q4
    text: "Ваш API использует Basic Authentication. В логах выявлено, что учетные данные передаются в открытом виде при небезопасном соединении. Какое свойство Basic Authentication приводит к этой проблеме?"
    type: single
    options:
      - id: a
        text: "Метод поддерживает возможность передачи учетных данных только через одноразовые токены"
        correct: false
        explanation: "Basic Auth всегда передаёт пару логин:пароль."
      - id: b
        text: "Учетные данные хранятся в токенах, которые сложно отозвать"
        correct: false
        explanation: "Это про JWT, не про Basic Auth."
      - id: c
        text: "Метод автоматически обновляет учетные данные для каждого из полученных запросов"
        correct: false
        explanation: "Basic Auth не обновляет данные."
      - id: d
        text: "Учетные данные передаются в каждом запросе без шифрования, если соединение небезопасное"
        correct: true
        explanation: "Basic Auth передаёт base64(login:password) — это кодирование, не шифрование. Без HTTPS данные в открытом виде."
      - id: e
        text: "Метод требует использования сложных механизмов подписи для защиты данных"
        correct: false
        explanation: "Basic Auth не требует подписи."
    explanation: "Basic Auth передаёт учётные данные в каждом запросе в кодировке Base64. Без HTTPS они легко декодируются."
    recommendation: |
      Повторить схему работы Basic Auth и роль TLS/HTTPS.

  - id: q5
    text: "Почему сервер должен использовать код 422 для ситуации, когда запрос на регистрацию содержит данные, не соответствующие правилам валидации (например, неверный формат email)?"
    type: single
    options:
      - id: a
        text: "Несоответствие данных требованиям требует от клиента корректировки, а не изменения структуры запроса"
        correct: false
        explanation: "Верно по сути, но это описание, а не формальное определение."
      - id: b
        text: "Сервер не может обработать запрос из-за неверных данных, а не из-за ошибок в синтаксисе"
        correct: false
        explanation: "Тоже верно, но менее точно."
      - id: c
        text: "Он ясно указывает, что данные запроса не соответствуют требованиям, даже если синтаксис корректен"
        correct: true
        explanation: "422 Unprocessable Entity означает: синтаксис верен, но семантически данные не проходят валидацию."
      - id: d
        text: "Он выделяет ошибки валидации данных, делая их понятными для клиента"
        correct: false
        explanation: "Это следствие, а не причина выбора кода."
      - id: e
        text: "Он информирует клиента о необходимости пересмотреть содержимое данных для успешной обработки запроса"
        correct: false
        explanation: "Тоже следствие."
    explanation: "422 означает, что сервер понял запрос (синтаксис верен), но не может обработать из-за логической ошибки в данных."
    recommendation: |
      Повторить коды 4xx: 400 (плохой синтаксис) vs 422 (семантическая ошибка).

  - id: q6
    text: "Как обеспечить идемпотентность PUT-запроса при повторной отправке тех же данных, чтобы избежать дублирования записей в истории изменений?"
    type: single
    options:
      - id: a
        text: "Переключиться на метод PATCH для частичного обновления данных и уменьшения вероятности дублирования"
        correct: false
        explanation: "PATCH не обязан быть идемпотентным."
      - id: b
        text: "Обновить логику сервера, чтобы при получении повторного PUT-запроса с теми же данными ресурс оставался неизменным"
        correct: true
        explanation: "PUT должен быть идемпотентным: повторный запрос с теми же данными не должен менять состояние."
      - id: c
        text: "Использовать метод POST для создания новой записи при каждом обновлении"
        correct: false
        explanation: "POST не идемпотентен, это усугубит проблему."
      - id: d
        text: "Включить проверку на стороне клиента, чтобы блокировать отправку повторных запросов"
        correct: false
        explanation: "Ненадёжно, клиент может не реализовать это."
      - id: e
        text: "Установить ограничение на частоту запросов, чтобы избежать частых обновлений"
        correct: false
        explanation: "Rate-limiting не решает проблему идемпотентности."
    explanation: "Идемпотентность PUT означает, что несколько одинаковых запросов приводят к тому же результату, что и один."
    recommendation: |
      Повторить свойства HTTP методов: PUT идемпотентен, POST — нет.

  - id: q7
    text: "Какое свойство настройки каскадного удаления может привести к нарушению целостности зависимых данных при удалении записей в базе данных?"
    type: single
    options:
      - id: a
        text: "Превышение размера запроса при удалении большого объёма данных"
        correct: false
        explanation: "Не связано с каскадным удалением."
      - id: b
        text: "Неправильная обработка заголовков ETag при каскадном удалении"
        correct: false
        explanation: "ETag не связан с каскадным удалением БД."
      - id: c
        text: "Ограничения прав доступа, из-за которых некоторые связанные записи не удаляются"
        correct: false
        explanation: "Это проблема авторизации, не каскадного удаления."
      - id: d
        text: "Отсутствие проверки существования зависимых ресурсов перед удалением"
        correct: true
        explanation: "Если не проверить наличие зависимых записей, можно удалить главную, а зависимые останутся (если нет каскада) или наоборот."
      - id: e
        text: "Конфликт версий записей, нарушающий транзакционность операции"
        correct: false
        explanation: "Конфликт версий — проблема конкурентного доступа, не каскадного удаления."
    explanation: "Целостность нарушается, если при удалении не учитываются связанные записи — они могут остаться 'сиротами'."
    recommendation: |
      Повторить понятие внешних ключей и каскадных операций в БД.

  - id: q8
    text: "Какой подход лучше всего подходит для массовой загрузки больших объёмов данных с учётом высокой конкурентности, требований к целостности и устойчивости системы?"
    type: single
    options:
      - id: a
        text: "Уменьшить размер данных, исключив необязательные поля из ответа и запроса, чтобы сократить нагрузку"
        correct: false
        explanation: "Оптимизация, но не решает проблему больших объёмов."
      - id: b
        text: "Применить кэширование для часто запрашиваемых данных (например, Redis), чтобы ускорить повторные операции чтения"
        correct: false
        explanation: "Кэширование помогает при чтении, а не при загрузке (записи)."
      - id: c
        text: "Реализовать стратегию частичных запросов с использованием пагинации или чанков, позволяющую обрабатывать данные порциями и поддерживать согласованность"
        correct: true
        explanation: "Чанкование снижает нагрузку, позволяет контролировать целостность и не роняет систему при ошибке в одном чанке."
      - id: d
        text: "Использовать серверное сжатие данных для уменьшения объемов передаваемой информации"
        correct: false
        explanation: "Сжатие уменьшает трафик, но не нагрузку на обработку."
      - id: e
        text: "Переключиться на отправку данных в реальном времени через WebSocket для мгновенного отклика при загрузке крупных пакетов"
        correct: false
        explanation: "WebSocket не предназначен для массовой загрузки и усложняет контроль целостности."
    explanation: "Разбиение на чанки позволяет обрабатывать данные порциями, что снижает нагрузку и повышает отказоустойчивость."
    recommendation: |
      Повторить паттерны обработки больших данных: чанкование, пагинация, bulk-операции.

  - id: q9
    text: "Как обеспечить восстановление WebSocket-соединения и надёжную доставку уведомлений, пропущенных из-за сетевых сбоев?"
    type: single
    options:
      - id: a
        text: "Использовать механизм повторного подключения WebSocket с проверкой состояния"
        correct: false
        explanation: "Восстанавливает канал, но не решает доставку потерянных сообщений."
      - id: b
        text: "Сохранять все уведомления на стороне клиента до восстановления соединения"
        correct: false
        explanation: "Клиент не может сохранить то, что не получил."
      - id: c
        text: "Переключиться на HTTP Polling, чтобы гарантировать доставку данных"
        correct: false
        explanation: "Polling не гарантирует доставку без хранения на сервере."
      - id: d
        text: "Использовать брокер сообщений для хранения событий до их доставки клиенту"
        correct: true
        explanation: "Брокер хранит сообщения, пока клиент не подтвердит получение. После переподключения клиент получает пропущенные."
      - id: e
        text: "Установить ограничение на определенное количество попыток повторного подключения"
        correct: false
        explanation: "Это ограничивает попытки, но не гарантирует доставку."
    explanation: "Брокер сообщений сохраняет события до подтверждения клиентом, что гарантирует доставку при временных отключениях."
    recommendation: |
      Повторить паттерны надёжной доставки: очереди, подтверждения, persistent storage.

  - id: q10
    text: "Какой фактор связан с ошибкой, при которой изменения в коде API не отображаются в автоматически генерируемой документации?"
    type: single
    options:
      - id: a
        text: "Фактор 1 (аннотации в коде для OpenAPI)"
        correct: true
        explanation: "Если аннотации устарели или неполны, документация не отражает реальные изменения."
      - id: b
        text: "Фактор 3 (версионирование спецификаций)"
        correct: false
        explanation: "Версионирование отвечает за поддержку разных версий, а не за актуальность конкретной версии."
      - id: c
        text: "Фактор 2 (автоматическая генерация UI)"
        correct: false
        explanation: "UI строится на основе спецификации; проблема не в UI."
      - id: d
        text: "Факторы 2 и 3"
        correct: false
        explanation: "Ошибка связана только с аннотациями."
      - id: e
        text: "Факторы 1 и 3"
        correct: false
        explanation: "Версионирование не влияет на актуальность внутри версии."
    explanation: "Аннотации — прямой источник данных для генерации спецификации. Их неактуальность приводит к расхождению кода и документации."
    recommendation: |
      Повторить процесс генерации документации из аннотаций кода.

  - id: q11
    text: "Какой подход улучшит работу с XML, если XML-ответы занимают много ресурсов на сервере?"
    type: single
    options:
      - id: a
        text: "Ограничив размер XML через серверные фильтры"
        correct: false
        explanation: "Может обрезать данные, нарушая функциональность."
      - id: b
        text: "Переключившись на использование только JSON, уменьшив нагрузку на сервер"
        correct: false
        explanation: "Не всегда возможно, если XML требуется клиентам."
      - id: c
        text: "Конвертируя все XML-ответы в текстовые файлы для уменьшения нагрузки"
        correct: false
        explanation: "XML и так текст, нагрузка не уменьшится."
      - id: d
        text: "Используя кэширование XML-ответов для часто запрашиваемых данных"
        correct: true
        explanation: "Кэширование позволяет избежать повторной дорогой сериализации."
      - id: e
        text: "Передавая XML-ответы в сжатом формате (gzip)"
        correct: false
        explanation: "Сжатие уменьшает трафик, но не нагрузку на сериализацию."
    explanation: "Кэширование готовых XML-ответов снижает нагрузку на CPU и память, так как исключает повторную сериализацию."
    recommendation: |
      Повторить стратегии оптимизации: кэширование, сжатие, выбор формата.

  - id: q12
    text: "Какой метод хранения и передачи токенов лучше всего подходит для обеспечения безопасности JWT при использовании как браузерами, так и мобильными приложениями?"
    type: single
    options:
      - id: a
        text: "Использовать куки с атрибутами HttpOnly и Secure для хранения токенов"
        correct: true
        explanation: "HttpOnly защищает от XSS, Secure требует HTTPS. Это наиболее безопасный вариант для браузеров. Для мобильных приложений также можно использовать куки."
      - id: b
        text: "Передавать JWT-токен в URL-параметрах при каждом полученном запросе"
        correct: false
        explanation: "Небезопасно: токен в истории браузера, логах, реферере."
      - id: c
        text: "Хранить JWT у клиента и добавлять его в запрос через URL-параметры"
        correct: false
        explanation: "Та же проблема — URL небезопасен."
      - id: d
        text: "Хранить JWT в Local Storage и передавать его в запросах через HTTP-заголовок Authorization"
        correct: false
        explanation: "Local Storage уязвим для XSS-атак, что менее безопасно, чем HttpOnly куки."
      - id: e
        text: "Сохранять JWT на сервере и передавать его в теле каждого ответа"
        correct: false
        explanation: "Противоречит идее JWT (сервер не хранит состояние)."
    explanation: "HttpOnly и Secure куки защищают от XSS и перехвата, обеспечивая максимальную безопасность как в браузерах, так и в мобильных приложениях (при поддержке кук)."
    recommendation: |
      Повторить best practices хранения токенов: HttpOnly куки для браузеров, заголовок Authorization для мобильных приложений, но куки также могут использоваться в мобильных.

  - id: q13
    text: "Какой подход при реализации GraphQL Subscriptions позволит масштабировать потоки событий и обеспечит авторизацию пользователей на уровне отдельных подписок, не дублируя логику в основном коде?"
    type: single
    options:
      - id: a
        text: "Использовать логику проверки авторизации внутри resolver для подписок, чтобы фильтровать данные перед их передачей"
        correct: false
        explanation: "Хорошо для фильтрации, но не решает масштабирование потоков событий."
      - id: b
        text: "Настроить использование middleware, которое выполняет проверку прав пользователя перед установлением соединения для подписки"
        correct: false
        explanation: "Проверяет только при соединении, не фильтрует события динамически."
      - id: c
        text: "Реализовать директивы GraphQL, которые ограничивают доступ к данным подписки на основе пользовательских ролей"
        correct: false
        explanation: "Директивы обычно для запросов, не для фильтрации событий в подписках."
      - id: d
        text: "Включить брокер сообщений, такой как Kafka, для обработки подписок и управления потоками данных на этапе доставки"
        correct: true
        explanation: "Брокер сообщений масштабирует потоки событий, а авторизацию можно реализовать на уровне подписки к топикам."
      - id: e
        text: "Организовать проверку доступа на этапе установления соединения, сохраняя связанные данные для последующего управления подписками"
        correct: false
        explanation: "Аналогично middleware, не фильтрует события динамически и не масштабирует."
    explanation: "Брокер сообщений (Kafka, RabbitMQ) позволяет горизонтально масштабировать подписки, а авторизация реализуется через отдельные топики или фильтрацию в подписке."
    recommendation: |
      Повторить реализацию подписок в GraphQL, роль брокеров сообщений для масштабирования.

