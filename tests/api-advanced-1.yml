  - id: q15
    text: "Какой подход лучше всего упростит работу с вложенными данными (пользователь → заказы → товары) и ускорит запросы, учитывая проблемы глубины, избыточности и сложности?"
    type: single
    options:
      - id: a
        text: "Нормализовать структуры данных, создав отдельные конечные точки для каждого уровня вложенности"
        correct: false
        explanation: "Увеличит количество запросов от клиента."
      - id: b
        text: "Реализовать возможность выбора глубины вложений в ответе через параметры запроса"
        correct: true
        explanation: "Клиент сам решает, сколько данных ему нужно (например, ?depth=1 или ?include=orders)."
      - id: c
        text: "Внедрить кэширование на уровне сложных вложений, чтобы сократить задержки при запросах"
        correct: false
        explanation: "Кэширование не решает проблему избыточности."
      - id: d
        text: "Создать одну сложную конечную точку, чтобы клиенты могли получать всю информацию сразу"
        correct: false
        explanation: "Усугубит проблему — всегда будет возвращать полную структуру."
      - id: e
        text: "Добавить JSON-схемы в документацию, чтобы клиенты могли лучше понимать структуру данных"
        correct: false
