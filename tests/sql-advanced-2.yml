  difficulty: medium
  topics: [schema]
  explanation: Для удаления колонки используется ALTER TABLE с DROP COLUMN.
  extended_explanation: |-
    Стандартный синтаксис удаления колонки в SQL:
    ```sql
    ALTER TABLE table_name DROP COLUMN column_name;
    ```
    В данном случае: `ALTER TABLE sessions DROP COLUMN temp_flag`

    ## Что здесь важно по теории
    - DELETE работает со строками, не с колонками
    - DROP COLUMN удаляет колонку и все данные в ней
    - Можно добавить CASCADE для удаления зависимостей
  recommendation: |-
    Повторить команды изменения структуры таблиц.
    Справка: https://postgrespro.ru/docs/postgresql/current/sql-altertable.html
- id: q11
  text: |-
    Какой индекс станет наиболее эффективным для ускорения следующего запроса:

    ```
    SELECT id
    FROM sales
    WHERE customer_id = 42 AND order_date >= DATE '2023-01-01';
    ```
  type: single
  options:
  - id: a
    text: CREATE INDEX idx_sales_cust_date ON sales(customer_id, order_date);
    correct: true
    explanation: Сначала колонка с равенством (customer_id), затем с диапазоном (order_date).
  - id: b
    text: CREATE INDEX idx_sales_date ON sales(order_date);
    correct: false
    explanation: Только по дате — сначала отбор по диапазону, потом фильтр по customer_id.
  - id: c
    text: CREATE INDEX idx_sales_cust ON sales(customer_id);
    correct: false
    explanation: Отфильтрует по customer_id, но потом нужно сканировать все его записи для проверки даты.
  - id: d
    text: CREATE INDEX idx_sales_id ON sales(id);
    correct: false
    explanation: Бесполезен для условий WHERE.
  - id: e
    text: CREATE INDEX idx_sales_date_cust ON sales(order_date, customer_id);
    correct: false
    explanation: 'Менее эффективно: сначала диапазон, потом точное равенство.'
  difficulty: medium
  topics: [indexes]
  explanation: Для условий с равенством и диапазоном эффективнее индекс, где первой идет колонка с равенством.
  extended_explanation: |-
    Запрос содержит:
    - точное равенство по `customer_id`
    - диапазонное условие по `order_date`

    Для максимальной эффективности индекс должен:
    1. Сначала включать колонку с **равенством** (`customer_id`) — быстро найти все строки нужного клиента
    2. Затем включать колонку с **диапазоном** (`order_date`) — эффективно отфильтровать по дате в рамках уже отобранных строк

    Индекс `(order_date, customer_id)` менее эффективен, так как сначала нужно просканировать большой диапазон дат, потом фильтровать по клиенту.
  recommendation: |-
    Повторить создание составных индексов и порядок колонок.
    Справка: https://postgrespro.ru/docs/postgresql/current/indexes-multicolumn.html
- id: q12
  text: Как выдать пользователю reader только права на чтение таблицы invoices?
  type: single
  options:
  - id: a
    text: REVOKE ALL ON invoices FROM reader
    correct: false
    explanation: Отбирает все права, противоположное действие.
  - id: b
    text: GRANT UPDATE ON invoices TO reader
    correct: false
    explanation: Дает право изменять данные.
  - id: c
    text: GRANT INSERT, DELETE ON invoices TO reader
    correct: false
    explanation: Дает право добавлять и удалять строки.
  - id: d
    text: GRANT SELECT ON invoices TO reader
    correct: true
    explanation: SELECT — право на чтение.
  - id: e
    text: GRANT EXECUTE ON invoices TO reader
    correct: false
    explanation: EXECUTE для функций/процедур, не для таблиц.
  difficulty: medium
  topics: [security]
  explanation: Право на чтение в SQL дает команда GRANT SELECT.
  extended_explanation: |-
    Права на чтение в SQL означают возможность выполнять команду `SELECT`. Именно это дает `GRANT SELECT ON invoices TO reader`.

    ## Что здесь важно по теории
    - SELECT — чтение данных
    - INSERT, UPDATE, DELETE — изменение данных
    - EXECUTE — для хранимых процедур
    - REVOKE отбирает права
  recommendation: |-
    Повторить систему привилегий в PostgreSQL.
    Справка: https://postgrespro.ru/docs/postgresql/current/sql-grant.html
- id: q13
  text: 'Дано: таблица sales(product_id, sale_date, amount). Как выбрать продукт(ы), чей объем продаж был хотя бы в одну дату строго больше, чем все продажи любого другого продукта в эту же дату?'
  type: single
  options:
  - id: a
    text: SELECT s1.product_id FROM sales s1 WHERE s1.amount > ANY (SELECT s2.amount FROM sales s2 WHERE s2.product_id = s1.product_id)
    correct: false
    explanation: Сравнивает с продажами того же продукта, а не других.
  - id: b
    text: SELECT product_id FROM sales WHERE amount > ANY (SELECT amount FROM sales)
    correct: false
    explanation: Сравнивает со всеми продажами вообще, а не в ту же дату.
  - id: c
    text: SELECT DISTINCT product_id FROM sales WHERE amount > ALL (SELECT amount FROM sales WHERE product_id <> sales)
    correct: false
    explanation: Синтаксически неверно (сравнение product_id с таблицей sales).
  - id: d
    text: SELECT product_id FROM sales WHERE EXISTS (SELECT 1 FROM sales WHERE amount < amount)
    correct: false
    explanation: Бессмысленное условие amount < amount всегда false.
  - id: e
    text: SELECT s1.product_id FROM sales s1 WHERE s1.amount > ALL (SELECT s2.amount FROM sales s2 WHERE s2.sale_date = s1.sale_date)
    correct: true
    explanation: Проверяет, что в эту же дату сумма больше всех других продаж.
  difficulty: medium
  topics: [queries]
  explanation: Нужно проверить, что в какую-то дату продажи продукта были максимальными среди всех продуктов.
  extended_explanation: |-
    Требуется: продукт(ы), у которых **хотя бы в одну дату** объем продаж был **строго больше, чем все продажи любого другого продукта в эту же дату**.

    Вариант 5 работает так:
    - Для каждой строки `s1` (продажа продукта в дату `sale_date` с суммой `amount`)
    - Подзапрос берет **все продажи всех других продуктов в эту же дату**
    - `> ALL` означает: сумма `s1.amount` больше каждой из этих сумм
    - Если хотя бы для одной даты это выполняется — продукт попадает в результат
  recommendation: |-
    Повторить операторы ANY, ALL и коррелированные подзапросы.
    Справка: https://postgrespro.ru/docs/postgresql/current/functions-subquery.html
- id: q14
  text: Что делает оператор INTERSECT?
  type: single
  options:
  - id: a
    text: Объединяет строки без дубликатов
    correct: false
    explanation: Это UNION.
  - id: b
    text: Возвращает строки, которые есть в обоих подзапросах
    correct: true
    explanation: INTERSECT возвращает пересечение двух запросов.
  - id: c
    text: Создаёт объединение с сохранением всех строк
    correct: false
    explanation: Это UNION ALL.
  - id: d
    text: Возвращает уникальные строки только из первого подзапроса
    correct: false
    explanation: Нет такого оператора.
  - id: e
    text: Удаляет строки, которые есть в одном подзапросе
    correct: false
    explanation: Это EXCEPT/MINUS.
  difficulty: medium
  topics: [queries]
  explanation: INTERSECT возвращает только строки, присутствующие в обоих запросах.
  extended_explanation: |-
    `INTERSECT` — это оператор работы с множествами в SQL. Он возвращает **пересечение** двух запросов: только те строки, которые присутствуют **и в первом, и во втором** результате.

    ## Что здесь важно по теории
    - UNION — объединение без дубликатов
    - UNION ALL — объединение с дубликатами
    - INTERSECT — пересечение
    - EXCEPT — разность (строки из первого, которых нет во втором)
  recommendation: |-
    Повторить операторы UNION, INTERSECT, EXCEPT.
    Справка: https://postgrespro.ru/docs/postgresql/current/queries-union.html
- id: q15
  text: 'Выберите операторы, относящиеся только к DDL:'
  type: single
  options:
  - id: a
    text: RENAME, ALTER, TRUNCATE, DELETE
    correct: false
    explanation: DELETE — это DML.
  - id: b
    text: CREATE, DROP, RENAME, UPDATE
    correct: false
    explanation: UPDATE — это DML.
  - id: c
    text: DROP, ALTER, CREATE, RENAME
    correct: true
    explanation: Все эти операторы изменяют структуру объектов.
  - id: d
    text: INSERT, DROP, DELETE, UPDATE
    correct: false
    explanation: INSERT, DELETE, UPDATE — DML.
  - id: e
    text: SELECT, TRUNCATE, UPDATE, DROP
    correct: false
    explanation: SELECT — DQL, UPDATE — DML.
  difficulty: medium
  topics: [schema]
  explanation: 'DDL (Data Definition Language) — операторы определения данных: CREATE, ALTER, DROP, RENAME, TRUNCATE.'
  extended_explanation: |-
    **DDL (Data Definition Language)** — операторы определения данных, работают со структурой объектов базы данных.

    К DDL относятся:
    - `CREATE` — создать объект
    - `ALTER` — изменить объект
    - `DROP` — удалить объект
    - `TRUNCATE` — очистить таблицу (структура сохраняется)
    - `RENAME` — переименовать объект

    **DML (Data Manipulation Language)** — операторы манипуляции данными: INSERT, UPDATE, DELETE
    **DQL (Data Query Language)** — SELECT
  recommendation: |-
    Повторить классификацию SQL-операторов: DDL, DML, DQL, DCL.
    Справка: https://postgrespro.ru/docs/postgresql/current/sql-commands.html
