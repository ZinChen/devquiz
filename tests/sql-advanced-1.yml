- id: q4
  text: |-
    Вы хотите найти заработную плату отделов, у которых общая заработная плата не превышает 700 000 рублей, в таблице Salaries. Какая ошибка допущена в запросе?

    ```
    SELECT department_id, SUM(salary) AS total_salary FROM Salaries
    HAVING total_salary <= 700000 GROUP BY department_id;

    Salaries
    | salary_id     | Integer |
    | employee_id   | Integer |
    | department_id | Integer |
    | salary        | Double  |
    ```
  type: single
  options:
  - id: a
    text: Используется total_salary <= 700000 вместо SUM(salary) <= 700000
    correct: false
  - id: b
    text: HAVING total_salary <= 700000 стоит перед GROUP BY, а не после него
    correct: true
  - id: c
    text: Используется HAVING вместо WHERE
    correct: false
  - id: d
    text: Не должно использоваться GROUP BY
    correct: false
  - id: e
    text: Используется GROUP BY вместо GROUP
    correct: false
  difficulty: medium
  explanation: 'Для всех SQL языков фильтрация по агрегированным значениям выполняется через `HAVING` после группировки, поэтому сначала нужно указать GROUP BY, потом HAVING. Дополнительно: в PostgreSQL ссылка на alias из списка `SELECT` в `HAVING`не допускается, поэтому там нужно явно писать `HAVING SUM(salary) <= 700000`.'
  extended_explanation: |-
    Для всех SQL языков фильтрация по агрегированным значениям выполняется через `HAVING` после группировки, поэтому сначала нужно указать GROUP BY, потом HAVING. Дополнительно: в PostgreSQL ссылка на alias из списка `SELECT` в `HAVING`не допускается, поэтому там нужно явно писать `HAVING SUM(salary) <= 700000`.

    ## Что здесь важно по теории
