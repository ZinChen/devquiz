  text: |-
    У вас есть таблица Orders с миллионом строк и проиндексированным столбцом order_date. Каким образом вы будете оптимизировать производительность запроса, который извлекает информацию о последнем заказе для клиента из таблицы?

    ```
    CREATE INDEX order_index ON Orders(order_date);
    ```
  type: single
  options:
  - id: a
    text: Используя подзапрос, чтобы получить последний order_date для клиента, а затем объединяю результаты с таблицей Orders, чтобы получить полную информацию о заказе
    correct: true
  - id: b
    text: Создаем представление, которое извлекает последнюю информацию о заказах для всех клиентов по поиску в order_date, а затем запрашивает представление для конкретного клиента
    correct: false
  - id: c
    text: Создаем хранимую процедуру с вложенным циклом, которая выполняет полное сканирование таблицы
    correct: false
  - id: d
    text: Используя запрос SELECT * и отфильтрую результаты по order_date
    correct: false
  - id: e
    text: Добавлю дополнительные индексы в другие столбцы в таблице Orders
    correct: false
  difficulty: medium
  explanation: 'Оптимальный подход: сначала подзапросом найти максимальную дату (последний заказ) для конкретного клиента, затем JOIN с исходной таблицей для получения полных данных. Это эффективно использует индекс по order_date.'
  extended_explanation: |-
    Оптимальный подход: сначала подзапросом найти максимальную дату (последний заказ) для конкретного клиента, затем JOIN с исходной таблицей для получения полных данных. Это эффективно использует индекс по order_date.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: подзапросы, индексы, оптимизация запросов.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить как получать последнюю запись через `MAX(...)`, подзапросы и соединение с исходной таблицей.
    Справка: https://postgrespro.ru/docs/postgresql/current/functions-subquery.html
    Справка: https://postgrespro.ru/docs/postgresql/current/indexes-intro.html
- id: q11
  text: Напишите SQL-запрос, который выберет все записи из таблицы Customers, у которых имя (name) начинается на букву 'A' или 'M', и возраст (age) больше 25 лет. Отсортируйте список в порядке убывания возраста.
  type: single
  options:
  - id: a
    text: SELECT * FROM Customers WHERE (name LIKE 'A%' OR name LIKE 'M%') AND age > 25 ORDER BY age DESC
    correct: true
  - id: b
    text: SELECT * FROM Customers WHERE (name LIKE 'A' OR name LIKE 'M') AND age > 25 ORDER BY age DESC
    correct: false
  - id: c
    text: SELECT * FROM Customers WHERE (name LIKE 'A' OR name LIKE 'M' AND age > 25) ORDER BY age DESC
    correct: false
  - id: d
    text: SELECT * FROM Customers WHERE (name LIKE 'A%' OR name LIKE '%M%') AND age > 25 ORDER BY age DESC
    correct: false
  - id: e
    text: SELECT * FROM Customers WHERE (name LIKE 'A%' OR name LIKE 'M%') AND age > 25
    correct: false
  difficulty: medium
  explanation: Для поиска строк, начинающихся с определенных букв, используется оператор LIKE с символом '%'. 'A%' означает строки, начинающиеся с A. Условия должны быть правильно сгруппированы, и нужна сортировка ORDER BY age DESC.
  extended_explanation: |-
    Для поиска строк, начинающихся с определенных букв, используется оператор LIKE с символом '%'. 'A%' означает строки, начинающиеся с A. Условия должны быть правильно сгруппированы, и нужна сортировка ORDER BY age DESC.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: like, where, order by.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить использование `LIKE`, группировку логических условий через скобки и сортировку `ORDER BY ... DESC`.
    Справка: https://postgrespro.ru/docs/postgresql/current/functions-matching.html
    Справка: https://postgrespro.ru/docs/postgresql/current/queries-order.html
- id: q12
  text: Вы даете разрешение или запрет на выполнение определенных операций над объектами базы данных компании. Какие операторы вы используете в данном процессе?
  type: single
  options:
  - id: a
    text: GRANT, REVOKE
    correct: true
  - id: b
    text: INSERT INTO, UPDATE
    correct: false
  - id: c
    text: REPLACE, CALL
    correct: false
  - id: d
    text: COMMIT, ROLLBACK
    correct: false
  - id: e
    text: ALTER, DROP
    correct: false
  difficulty: medium
  explanation: GRANT используется для предоставления прав доступа, REVOKE — для отзыва прав. Это основные операторы управления доступом (DCL — Data Control Language) в SQL.
  extended_explanation: |-
    GRANT используется для предоставления прав доступа, REVOKE — для отзыва прав. Это основные операторы управления доступом (DCL — Data Control Language) в SQL.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: права доступа.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить операторы DCL и базовое управление правами доступа в SQL.
    Справка: https://postgrespro.ru/docs/postgresql/current/sql-grant.html
    Справка: https://postgrespro.ru/docs/postgresql/current/sql-revoke.html
- id: q13
  text: |-
    Какую задачу решает следующий код?

    ```
    SELECT
        product_name,
        price,
        CASE
            WHEN price > 100 THEN 'expensive'
            ELSE 'cheap'
        END AS price_category
    FROM Products
    ORDER BY price DESC;
    ```
  type: single
  options:
  - id: a
    text: Получение данных о дорогих и дешевых товарах, где дорогими считаются товары дороже 100 рублей. При этом отобразится таблица с названием товаров и указанием дорогой он или дешевый, отсортированная по убыванию цены.
    correct: true
  - id: b
    text: Получение информации о цене товара. В результате цена будет отсортирована по убыванию, если цена выше 100, товар имеет метку expensive, если дешевле — cheap.
    correct: false
  - id: c
    text: Получение информации о дорогих и дешевых товарах, где дорогими считаются товары дороже 100 рублей. При этом отобразится сначала список дорогих товаров, затем список дешевых.
    correct: false
  - id: d
    text: Получение информации о дорогих и дешевых товарах, где отобразится название товара и его цена.
    correct: false
  - id: e
    text: Получение информации о дорогих и дешевых товарах, где отобразится только список дорогих товаров.
    correct: false
  difficulty: medium
  explanation: Запрос использует CASE для создания категории price_category ('expensive' для цены > 100, иначе 'cheap'), выбирает product_name, price, price_category и сортирует по убыванию цены.
  extended_explanation: |-
    Запрос использует CASE для создания категории price_category ('expensive' для цены > 100, иначе 'cheap'), выбирает product_name, price, price_category и сортирует по убыванию цены.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: case, select, order by.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить выражение `CASE` в `SELECT` и формирование вычисляемых колонок.
    Справка: https://postgrespro.ru/docs/postgresql/current/functions-conditional.html
    Справка: https://postgrespro.ru/docs/postgresql/current/queries-order.html
- id: q14
  text: Какой запрос вернет 10 уникальных фамилий из таблицы group_A, отсортированных по алфавиту?
  type: single
  options:
  - id: a
    text: SELECT DISTINCT surname FROM group_A ORDER BY surname LIMIT 10;
    correct: true
  - id: b
    text: SELECT surname FROM group_A SORT BY surname DESC LIMIT 10;
    correct: false
  - id: c
    text: SELECT surname FROM group_A ORDER BY surname LIMIT 10;
    correct: false
  - id: d
    text: SELECT DISTINCT surname FROM group_A GROUP BY surname LIMIT 11;
    correct: false
  - id: e
    text: SELECT surname FROM group_A ORDER BY surname LIMIT 10;
    correct: false
  difficulty: medium
  explanation: DISTINCT убирает дубликаты, ORDER BY surname сортирует по возрастанию (по умолчанию ASC), LIMIT 10 ограничивает вывод десятью записями.
  extended_explanation: |-
    DISTINCT убирает дубликаты, ORDER BY surname сортирует по возрастанию (по умолчанию ASC), LIMIT 10 ограничивает вывод десятью записями.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: distinct, order by, limit.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить как комбинируются `DISTINCT`, `ORDER BY` и `LIMIT` в одном запросе.
    Справка: https://postgrespro.ru/docs/postgresql/current/sql-select.html
- id: q15
  text: 'У вас есть две таблицы: workers и salary. Первая содержит уникальный id сотрудника, его фамилию (surname) и должность (position). Во второй таблице указано: id должности, сама должность и соответствующая ей зарплата. Вам нужно узнать, сколько зарабатывает каждый сотрудник. Какой вариант кода сможет решить данную задачу?'
  type: single
  options:
  - id: a
    text: SELECT * FROM workers w JOIN salary s ON w.position = s.position;
    correct: true
  - id: b
    text: SELECT position FROM workers w LEFT JOIN salary s ON w.position = s.position;
    correct: false
  - id: c
    text: SELECT * FROM workers w JOIN salary s ON w.position = s.position; ORDER BY surname LIMIT 10;
    correct: false
  - id: d
    text: SELECT workers FROM workers JOIN salary s ON w.position = s.position;
    correct: false
  - id: e
    text: SELECT * FROM workers w LEFT JOIN salary s ON w.position = s.position; GROUP BY position ORDER BY surname;
    correct: false
  difficulty: medium
  explanation: INNER JOIN (или просто JOIN) workers с salary по полю position вернет все соответствия сотрудников и их зарплат. SELECT * покажет все поля, включая surname и salary.
  extended_explanation: |-
    INNER JOIN (или просто JOIN) workers с salary по полю position вернет все соответствия сотрудников и их зарплат. SELECT * покажет все поля, включая surname и salary.

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: join, inner join, связи между таблицами.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
    Повторить соединение таблиц по общему полю и выбор данных о сотрудниках вместе с их зарплатой.
    Справка: https://postgrespro.ru/docs/postgresql/current/tutorial-join.html
