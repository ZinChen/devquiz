- id: q6
  text: |-
    Найдите имена сотрудников, зарплата которых ниже медианной зарплаты всех сотрудников в таблице Employees.

    ```
    Employees
    | employee_id | Integer |
    | first_name  | String  |
    | last_name   | String  |
    | department  | String  |
    | job_title   | String  |
    | salary      | Integer |
    ```
  type: single
  options:
  - id: a
    text: SELECT first_name, last_name FROM Employees WHERE salary < (SELECT MEDIAN(salary) FROM employees);
    correct: true
  - id: b
    text: SELECT first_name, last_name FROM Employees GROUP BY first_name, last_name HAVING salary < MEDIAN(salary);
    correct: false
  - id: c
    text: SELECT first_name, last_name FROM Employees WHERE (SELECT SUM(salary) / COUNT(*) FROM employees) < salary;
    correct: false
  - id: d
    text: SELECT first_name, last_name FROM Employees WHERE MEDIAN(salary) < salary;
    correct: false
  - id: e
    text: SELECT first_name, last_name FROM Employees WHERE salary < AVG(salary);
    correct: false
  difficulty: medium
  explanation: 'Функция `MEDIAN` есть в Oracle, но так как тест по SQL вцелом, то правильно выбрать ответ с Median. В PostgreSQL встроенной функции `MEDIAN` нет; для медианы используют ordered-set aggregate `percentile_cont(0.5) WITHIN GROUP (ORDER BY salary)` в подзапросе. Пример: "SELECT first_name, last_name FROM Employees WHERE salary < (SELECT percentile_cont(0.5) WITHIN GROUP (ORDER BY salary) FROM Employees);"'
  extended_explanation: |-
    Функция `MEDIAN` есть в Oracle, но так как тест по SQL вцелом, то правильно выбрать ответ с Median. В PostgreSQL встроенной функции `MEDIAN` нет; для медианы используют ordered-set aggregate `percentile_cont(0.5) WITHIN GROUP (ORDER BY salary)` в подзапросе. Пример: "SELECT first_name, last_name FROM Employees WHERE salary < (SELECT percentile_cont(0.5) WITHIN GROUP (ORDER BY salary) FROM Employees);"

    ## Что здесь важно по теории
    В подобных вопросах нужно проверять не только общий смысл ответа, но и точный синтаксис, типы данных, ограничения и особенности PostgreSQL.
    - Ключевые темы вопроса: подзапросы, медиана, агрегатные функции.
    - Неправильные варианты обычно нарушают либо синтаксис SQL, либо правила работы конкретной конструкции в PostgreSQL.
  recommendation: |-
