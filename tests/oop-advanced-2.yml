- id: q1
  text: Что происходит при создании нового объекта в объектно-ориентированной системе? Выберите корректную последовательность действий.
  type: single
  options:
  - id: a
    text: Вызов конструктора → преобразование объекта в класс → выполнение инициализатора по умолчанию
    correct: false
    explanation: 'Некорректная последовательность: объект не преобразуется в класс.'
  - id: b
    text: Разрешение ссылок на методы → выделение памяти → связывание конструктора → возврат объекта
    correct: false
    explanation: Ссылки на методы разрешаются позже, порядок не соответствует реальному.
  - id: c
    text: Определение типа → инициализация по умолчанию → переопределение полей → возврат ссылки
    correct: false
    explanation: Пропущен важный этап выделения памяти до инициализации.
  - id: d
    text: Выделение памяти под объект → вызов конструктора → инициализация полей → возврат ссылки или дескриптора объекта
    correct: true
    explanation: 'Правильная последовательность: память выделяется до вызова конструктора, затем инициализируются поля, возвращается ссылка.'
  - id: e
    text: Инициализация полей → вызов конструктора → выделение памяти → возврат указателя
    correct: false
    explanation: Память должна выделяться до инициализации полей и вызова конструктора.
  difficulty: medium
  explanation: При создании объекта сначала выделяется память, затем вызывается конструктор, инициализируются поля, после чего возвращается ссылка на объект.
  extended_explanation: |-
    Создание объекта в ООП включает следующие этапы:
    1. Выделение памяти под объект (в куче или стеке)
    2. Вызов конструктора (который может инициализировать поля)
    3. Инициализация полей (значениями по умолчанию или явно заданными)
    4. Возврат ссылки (или указателя/дескриптора) на созданный объект

    ## Что здесь важно по теории
    - Порядок важен: нельзя инициализировать поля до выделения памяти
    - Конструктор может выполнять дополнительную логику после инициализации полей
    - В разных языках могут быть нюансы (например, вызов конструктора базового класса)
  recommendation: |-
    Повторить этапы создания объекта в ООП-языках (C++, Java, C#, Python).
    Справка: https://docs.oracle.com/javase/specs/jls/se8/html/jls-12.html
- id: q2
  text: В каком случае корректно реализуется принцип абстракции как средство управления сложностью в объектно-ориентированном программировании?
  type: single
  options:
  - id: a
    text: Абстрактный класс Shape определяет метод draw() без реализации, а конкретные фигуры (Circle, Square) реализуют его по-разному
    correct: false
    explanation: Это пример полиморфизма, а не абстракции как управления сложностью.
  - id: b
    text: Класс User содержит все поля в виде private, и доступ к ним осуществляется только через геттеры и сеттеры
    correct: false
    explanation: Это инкапсуляция данных, а не абстракция поведения.
  - id: c
    text: Методы всех бизнес-объектов объявлены публичными для обеспечения простоты тестирования и интеграции
    correct: false
    explanation: Нарушает принцип сокрытия реализации, усложняет систему.
  - id: d
    text: Класс Logger реализован как синглтон и управляется через глобальную точку доступа
    correct: false
    explanation: Это паттерн синглтон, не связан напрямую с абстракцией.
  - id: e
    text: Класс DatabaseConnector предоставляет метод connect(), но скрывает, какие именно параметры подключения использует и каким образом устанавливается соединение
    correct: true
    explanation: Абстракция скрывает детали реализации, предоставляя простой интерфейс.
  difficulty: medium
  explanation: Абстракция как средство управления сложностью проявляется в сокрытии деталей реализации и предоставлении простого интерфейса.
  extended_explanation: |-
    Абстракция в ООП:
    - Выделяет существенные характеристики объекта
    - Скрывает несущественные детали реализации
    - Позволяет работать с объектом через простой интерфейс

    ## Что здесь важно по теории
    - Абстракция ≠ инкапсуляция (инкапсуляция скрывает данные, абстракция — поведение)
    - Абстракция снижает сложность системы
    - Интерфейсы и абстрактные классы — инструменты абстракции
  recommendation: |-
    Повторить принципы ООП: абстракция, инкапсуляция, наследование, полиморфизм.
    Справка: https://ru.wikipedia.org/wiki/Абстракция_данных
- id: q3
  text: Среди приведенных вариантов ответа выберите тот, который наиболее точно отражает назначение поведенческих паттернов в объектно-ориентированном программировании.
  type: single
  options:
  - id: a
    text: Эти паттерны применяются для управления состоянием объекта, устанавливая строгие ограничения на его методы
    correct: false
    explanation: Это слишком узкое определение, относится к некоторым поведенческим паттернам, но не ко всем.
  - id: b
    text: Поведенческие паттерны описывают, как объекты взаимодействуют и распределяют ответственность между собой внутри программы
    correct: true
    explanation: 'Точное определение: поведенческие паттерны решают задачи взаимодействия и распределения обязанностей.'
  - id: c
    text: Поведенческие паттерны помогают создавать гибкие интерфейсы, позволяя объектам менять свои методы в зависимости от условий
    correct: false
    explanation: Это описание некоторых паттернов (Strategy), но не общее назначение.
  - id: d
    text: Поведенческие паттерны требуют, чтобы все методы были статическими и не зависели от состояния объекта
    correct: false
    explanation: Неверно, поведенческие паттерны работают с состоянием объектов.
  - id: e
    text: Эти паттерны ориентированы на создание структурированных классов с фиксированным набором методов и атрибутов
    correct: false
    explanation: Это ближе к структурным паттернам.
  difficulty: medium
  explanation: Поведенческие паттерны описывают взаимодействие объектов и распределение ответственности между ними.
  extended_explanation: |-
    Поведенческие паттерны (behavioral patterns):
    - Решают задачи коммуникации между объектами
    - Определяют алгоритмы и потоки управления
    - Распределяют обязанности между классами

    ## Что здесь важно по теории
    - Примеры: Observer, Strategy, Command, Iterator, State
    - Отличаются от порождающих (создание объектов) и структурных (структура классов)
    - Упрощают сложные взаимодействия
  recommendation: |-
    Повторить классификацию паттернов GoF: порождающие, структурные, поведенческие.
    Справка: https://refactoring.guru/ru/design-patterns/behavioral-patterns
- id: q4
  text: |-
    Какой из принципов SOLID нарушен в данном коде?

    ```
    1 Класс «Банк»:
       инициализация объекта(имя, баланс):
         объект.имя = имя
         объект.баланс = баланс
       создать_счет(тип_счета):
         если тип_счета == "сберегательный":
           вернуть СберегательныйСчет(объект)
         иначе:
           вернуть ТекущийСчет(объект)

    10 Интерфейс «Счет»:
         метод открыть()

    12 Класс «СберегательныйСчет» реализует «Счет»:
         инициализация объекта(банк):
           объект.банк = банк
         метод открыть():
           вывести "Открыт сберегательный счет"

    17 Класс «ТекущийСчет» реализует «Счет»:
         инициализация объекта(банк):
           объект.банк = банк
         метод открыть():
           вывести "Открыт текущий счет"
    ```
  type: single
  options:
  - id: a
    text: Принцип разделения интерфейса (ISP)
    correct: false
    explanation: Интерфейс Счет минимален (один метод), ISP не нарушен.
  - id: b
    text: Принцип единственной ответственности (SRP)
    correct: false
    explanation: Класс Банк отвечает и за данные, и за создание счетов, но основная проблема не в этом.
  - id: c
    text: Принцип подстановки Барбары Лисков (LSP)
    correct: false
    explanation: Наследники могут заменить базовый интерфейс, LSP не нарушен.
  - id: d
    text: Принцип инверсии зависимостей (DIP)
    correct: false
    explanation: Нет явной зависимости от абстракций в конструкторе, но нарушение OCP более явное.
  - id: e
    text: Принцип открытости/закрытости (OCP)
    correct: true
    explanation: Класс Банк требует модификации при добавлении нового типа счета (нужно менять метод создать_счет).
  difficulty: medium
  explanation: Класс Банк нарушает OCP, так как требует модификации при добавлении новых типов счетов (нужно добавлять новые условия в метод создать_счет).
  extended_explanation: |-
    Принцип открытости/закрытости (OCP):
    - Классы должны быть открыты для расширения, но закрыты для модификации
    - В данном коде при добавлении нового типа счета (например, "депозитный") придется изменять метод создать_счет
    - Это модификация существующего кода, а не расширение

    ## Как исправить
    - Использовать фабричный метод или внедрение зависимости
    - Класс Банк не должен знать о конкретных типах счетов
    - Можно передавать фабрику счетов в конструктор
  recommendation: |-
    Повторить принципы SOLID, особенно Open/Closed Principle.
    Справка: https://ru.wikipedia.org/wiki/Open/closed_principle
- id: q5
  text: Какой модификатор доступа следует использовать, чтобы обеспечить доступность полей и методов класса из самого класса, из производного класса и из других классов в той же сборке, но не из других сборок?
  type: single
  options:
  - id: a
    text: Protected
    correct: false
    explanation: Protected дает доступ только из класса и наследников, но не из других классов в той же сборке.
  - id: b
    text: Protected Internal
    correct: true
    explanation: Protected Internal объединяет доступ protected (для наследников) и internal (внутри сборки).
  - id: c
    text: Public
    correct: false
    explanation: Public дает доступ отовсюду, включая другие сборки.
  - id: d
    text: Public Internal
    correct: false
    explanation: Такого модификатора не существует (public и так шире internal).
  - id: e
    text: Private
    correct: false
    explanation: Private доступен только внутри самого класса.
  difficulty: medium
  explanation: Protected Internal обеспечивает доступ из класса, наследников (даже из других сборок) и из любых классов внутри той же сборки.
  extended_explanation: |-
    Protected Internal в C#:
    - Объединяет protected (доступ из класса и наследников)
    - И internal (доступ из любой точки текущей сборки)
    - Наследники из других сборок имеют доступ (protected)
    - Другие классы внутри сборки имеют доступ (internal)

    ## Что здесь важно по теории
    - В других языках могут быть аналоги (например, package-private + protected в Java нет прямой комбинации)
    - Комбинации модификаторов уточняют область видимости
  recommendation: |-
    Повторить модификаторы доступа в C# и их комбинации.
    Справка: https://learn.microsoft.com/ru-ru/dotnet/csharp/programming-guide/classes-and-structs/access-modifiers
- id: q6
  text: Какое из следующих утверждений наиболее точно отражает принципы работы с абстрактными классами и методами в объектно-ориентированном программировании, учитывая их роль в создании иерархий классов и реализации полиморфизма?
  type: single
  options:
  - id: a
    text: Абстрактные методы в абстрактном классе могут содержать как частичную, так и полную реализацию, предоставляя подклассам возможность переопределять их поведение или использовать исходную реализацию
    correct: false
    explanation: Абстрактные методы по определению не имеют реализации.
  - id: b
    text: Конструкторы в абстрактных классах не предусмотрены, поскольку такие классы предназначены исключительно для задания интерфейса и не могут быть инстанцированы
    correct: false
    explanation: Конструкторы в абстрактных классах есть и могут вызываться из конструкторов наследников.
  - id: c
    text: Абстрактный класс служит основой для других классов, позволяя определять общие характеристики и поведение, но не обязывая их к реализации всех методов в своем теле
    correct: true
    explanation: Абстрактный класс может содержать как абстрактные, так и реализованные методы, наследники обязаны реализовать только абстрактные.
  - id: d
    text: Все методы в абстрактном классе должны быть абстрактными, однако допускается наличие статических методов, которые могут быть реализованы в самом классе
    correct: false
    explanation: В абстрактном классе могут быть обычные методы с реализацией.
  - id: e
    text: Объекты абстрактного класса могут быть созданы напрямую, если в классе присутствует хотя бы один метод с полной реализацией, что позволяет создавать частично определенные экземпляры
    correct: false
    explanation: Абстрактный класс нельзя инстанциировать, даже если есть реализованные методы.
  difficulty: medium
  explanation: Абстрактный класс может содержать как абстрактные методы (без реализации), так и обычные методы с реализацией, наследники обязаны реализовать только абстрактные.
  extended_explanation: |-
    Абстрактный класс:
    - Не может быть инстанциирован напрямую
    - Служит базой для других классов
    - Может содержать абстрактные методы (без реализации)
    - Может содержать обычные методы с реализацией
    - Может содержать поля и конструкторы

    ## Что здесь важно по теории
    - Абстрактные методы должны быть реализованы в неабстрактных наследниках
    - Абстрактный класс ≠ интерфейс (в интерфейсе все методы абстрактны по умолчанию)
    - Конструкторы нужны для инициализации полей при создании объектов наследников
  recommendation: |-
    Повторить понятие абстрактных классов и методов в ООП.
    Справка: https://ru.wikipedia.org/wiki/Абстрактный_класс
- id: q7
  text: В какой из ситуаций ниже корректно применить статические методы класса?
  type: single
  options:
  - id: a
    text: Когда нужно обеспечить доступ к методам без создания объекта
    correct: true
    explanation: Статические методы принадлежат классу и вызываются без создания экземпляра.
  - id: b
    text: Когда необходимо создать экземпляр класса
    correct: false
    explanation: Для создания экземпляра используются конструкторы, не статические методы.
  - id: c
    text: Когда методы класса должны быть частью наследуемого интерфейса
    correct: false
    explanation: Статические методы не наследуются в классическом ООП.
  - id: d
    text: Когда операции требуют доступа к внутренним данным объекта
    correct: false
    explanation: Статические методы не имеют доступа к this и нестатическим полям.
  - id: e
    text: Когда операции зависят от изменяющихся во времени данных, например случайных чисел
    correct: false
    explanation: Это не причина для статики; такие методы могут быть и экземплярными.
  difficulty: medium
  explanation: Статические методы вызываются через имя класса без создания объекта, что удобно для утилитных функций.
  extended_explanation: |-
    Статические методы:
    - Принадлежат классу, а не экземпляру
    - Вызываются через имя класса (ClassName.method())
    - Не имеют доступа к this и нестатическим полям
    - Используются для утилитных функций (математические расчеты, форматирование)

    ## Что здесь важно по теории
    - Статические методы не переопределяются в наследниках
    - Могут быть перегружены (overload), но не переопределены (override)
    - В некоторых языках есть статические классы (только со статическими методами)
  recommendation: |-
    Повторить особенности статических методов и их отличия от экземплярных.
    Справка: https://ru.wikipedia.org/wiki/Метод_(программирование)#Статические_методы
- id: q8
  text: Какие особенности характеризуют наследование на практике в интерпретируемых языках (Python, Ruby, PHP)?
  type: single
  options:
  - id: a
    text: Классы могут наследовать только один другой класс или интерфейс, при попытке наследования нескольких классов возникает ошибка
    correct: false
    explanation: Python поддерживает множественное наследование, Ruby и PHP имеют mixins/трейты.
  - id: b
    text: Поддерживается множественное наследование или его аналоги (через mixins и трейты), позволяющие объединять поведение из нескольких источников
    correct: true
    explanation: Python — множественное наследование, Ruby — модули (mixins), PHP — трейты.
  - id: c
    text: При наследовании в интерпретируемых языках дочерние классы наследуют только публичные методы, а приватные поля и методы остаются недоступными и не переопределяются
    correct: false
    explanation: Это общая черта многих языков, не специфичная для интерпретируемых.
  - id: d
    text: В интерпретируемых языках конструкторы родительских классов вызываются автоматически и не требуют явного указания, что ограничивает контроль над инициализацией
    correct: false
    explanation: В Python конструктор родителя нужно вызывать явно через super().
  - id: e
    text: Дочерний класс при наследовании может изменять методы родительского класса, но обязан сохранять его атрибуты
    correct: false
    explanation: Атрибуты можно переопределять и добавлять новые.
  difficulty: medium
  explanation: Интерпретируемые языки часто поддерживают множественное наследование или его аналоги (mixins, трейты) для объединения поведения.
  extended_explanation: |-
    Особенности наследования в интерпретируемых языках:
    - Python: прямое множественное наследование классов
    - Ruby: модули (mixins) вместо множественного наследования
    - PHP: трейты (traits) для добавления поведения

    ## Что здесь важно по теории
    - Множественное наследование может вызывать проблему ромбовидного наследования
    - Mixins/трейты решают эту проблему, предоставляя механизм повторного использования без иерархии
    - Порядок разрешения методов (MRO) важен в Python
  recommendation: |-
    Повторить особенности наследования в разных языках программирования.
    Справка: https://ru.wikipedia.org/wiki/Наследование_(программирование)
- id: q9
  text: В процессе разработки системы для управления различными типами платежей в интернет-магазине вам нужно реализовать обработку различных форм оплаты. Какой из следующих подходов лучше всего иллюстрирует применение полиморфизма на практике?
  type: single
  options:
  - id: a
    text: Создание базового класса Payment с абстрактным методом processPayment(), который будет реализован в подклассах, позволяя каждому классу иметь свою реализацию обработки платежа
    correct: true
    explanation: 'Это классический пример полиморфизма: единый интерфейс, разные реализации.'
  - id: b
    text: Определение метода processPayment() в классе ShoppingCart, который обрабатывает все типы платежей
    correct: false
    explanation: Нарушает SRP, нет полиморфизма.
  - id: c
    text: Использование единственного класса PaymentProcessor, который содержит все методы для обработки различных типов платежей без разделения на конкретные классы
    correct: false
    explanation: Нет полиморфизма, класс-переключатель.
  - id: d
    text: Создание интерфейса PaymentMethod, который содержит только методы для получения информации о платеже, но не включает их обработку, не используя полиморфизм для обработки платежей
    correct: false
    explanation: Полиморфизм не используется для обработки.
  - id: e
    text: Реализация метода processPayment() в каждом классе CreditCardPayment, PayPalPayment и BitcoinPayment, но без общего базового класса
    correct: false
    explanation: Нет общего интерфейса, нельзя использовать полиморфизм.
  difficulty: medium
  explanation: Полиморфизм позволяет объектам разных классов с одинаковым интерфейсом обрабатываться единообразно.
  extended_explanation: |-
    Полиморфизм через наследование:
    - Базовый класс Payment определяет общий интерфейс
    - Подклассы реализуют метод processPayment() по-своему
    - Код может работать с любым платежом через базовый тип

    ## Что здесь важно по теории
    - Полиморфизм бывает ad-hoc (перегрузка), параметрический (дженерики) и подтипов (наследование)
    - В данном случае — полиморфизм подтипов
    - Позволяет добавлять новые типы платежей без изменения существующего кода
  recommendation: |-
    Повторить понятие полиморфизма и его реализацию через наследование.
    Справка: https://ru.wikipedia.org/wiki/Полиморфизм_(программирование)
- id: q10
  text: Какие факторы могут привести к ухудшению связанности кода в объектно-ориентированном программировании?
  type: single
  options:
  - id: a
    text: Наследование от общего базового класса с последующим переопределением всех методов в каждом подклассе
    correct: false
    explanation: Это не обязательно ухудшает связанность.
  - id: b
    text: Применение паттернов проектирования для ослабления зависимости между компонентами
    correct: false
    explanation: Это улучшает связанность (уменьшает).
  - id: c
    text: Внедрение зависимостей через статические вспомогательные классы, общие для нескольких компонентов
    correct: false
    explanation: Может увеличить связанность, но не главный пример.
  - id: d
    text: Построение системы с минимальным количеством зависимостей между классами для повышения гибкости
    correct: false
    explanation: Это уменьшает связанность.
  - id: e
    text: Жесткое связывание классов через непосредственные вызовы методов и обмен данными напрямую
    correct: true
    explanation: Прямые вызовы и обмен данными создают сильную связанность.
  difficulty: medium
  explanation: Жесткое связывание (прямые вызовы, обмен данными) увеличивает связанность, что ухудшает гибкость и поддержку кода.
  extended_explanation: |-
    Связанность (coupling) — степень зависимости между классами:
    - Высокая связанность (плохо): классы сильно зависят друг от друга
    - Низкая связанность (хорошо): классы слабо зависят, легко заменять и тестировать

    ## Что увеличивает связанность
    - Прямые вызовы методов конкретных классов
    - Обмен данными напрямую
    - Знание внутренней структуры другого класса
    - Глобальные переменные
  recommendation: |-
    Повторить понятия связанности (coupling) и связности (cohesion).
    Справка: https://ru.wikipedia.org/wiki/Связанность_(программирование)
- id: q11
  text: Выберите верное суждение о сериализации с наследованием.
  type: single
  options:
  - id: a
    text: При сериализации с наследованием объекты могут включать в себя методы, унаследованные от дилера
    correct: false
    explanation: Сериализуются данные, а не методы.
  - id: b
    text: Сериализацию с наследованием нельзя использовать, когда один дочерний класс содержит ссылку на объект другого дочернего класса
    correct: false
    explanation: Можно, если поддерживается граф объектов.
  - id: c
    text: В процессе сериализации с наследованием может быть использован механизм виртуальных функций
    correct: true
    explanation: Виртуальные функции могут использоваться для кастомной сериализации.
  - id: d
    text: Виртуальные функции исключают возможность для объектов-наследников переопределить методы базового класса
    correct: false
    explanation: Виртуальные функции как раз позволяют переопределение.
  - id: e
    text: Под сериализацией с наследованием понимается преобразование методов в поток байтов для сохранения информации
    correct: false
    explanation: Сериализуются данные, а не методы.
  difficulty: medium
  explanation: Сериализация сохраняет состояние объекта, а не методы. Виртуальные функции могут использоваться в процессе сериализации для кастомной логики.
  extended_explanation: |-
    Сериализация с наследованием:
    - Сохраняются поля всех уровней иерархии
    - Методы (включая виртуальные) не сериализуются
    - Виртуальные функции могут вызываться в процессе сериализации/десериализации (например, для восстановления связей)

    ## Что здесь важно по теории
    - transient поля не сериализуются
    - Нужно учитывать ссылки на другие объекты (граф объектов)
    - В разных языках свои механизмы (Serializable в Java, ISerializable в C#)
  recommendation: |-
    Повторить понятие сериализации и ее особенности при наследовании.
    Справка: https://ru.wikipedia.org/wiki/Сериализация
- id: q12
  text: Какая из следующих особенностей характерна для объектно-ориентированных языков программирования, таких как Python, Java, C#, JavaScript и PHP?
  type: single
  options:
  - id: a
    text: Программы разделены на модули, но не поддерживают взаимодействие объектов
    correct: false
    explanation: Взаимодействие объектов — основа ООП.
  - id: b
    text: Программирование основано исключительно на функциях и процедурах
    correct: false
    explanation: Это процедурный подход.
  - id: c
    text: Языки не имеют концепции классов и объектов, а работают только с функциями
    correct: false
    explanation: Все перечисленные языки поддерживают классы и объекты.
  - id: d
    text: Поддержка множественного наследования (в т.ч. через миксины/трейты/интерфейсы) и инкапсуляции данных
    correct: true
    explanation: Все языки поддерживают инкапсуляцию и множественное наследование в той или иной форме.
  - id: e
    text: Все данные представляются в виде таблиц и строк
    correct: false
    explanation: Это реляционная модель.
  difficulty: medium
  explanation: ООП-языки поддерживают инкапсуляцию и механизмы множественного наследования (через классы, интерфейсы, миксины, трейты).
  extended_explanation: |-
    Общие черты ООП-языков:
    - Поддержка классов и объектов
    - Инкапсуляция (сокрытие данных)
    - Наследование (одиночное или множественное)
    - Полиморфизм

    ## Различия в реализации
    - Python: множественное наследование классов
    - Java/C#: множественное наследование интерфейсов
    - PHP: трейты
    - JavaScript: прототипное наследование, миксины
  recommendation: |-
    Повторить основные характеристики ООП-языков.
    Справка: https://ru.wikipedia.org/wiki/Объектно-ориентированное_программирование
- id: q13
  text: Какая пара принципов ООП связана с реализацией классов, методов и передачи аргументов между объектами в ходе выполнения программы?
  type: single
  options:
  - id: a
    text: Инкапсуляция и множественное наследование, поскольку они позволяют изолировать состояние объектов и комбинировать поведение из нескольких классов для создания гибкой и переиспользуемой структуры
    correct: false
    explanation: Инкапсуляция связана с сокрытием, множественное наследование — с комбинированием, но не напрямую с передачей аргументов в рантайме.
  - id: b
    text: Интерфейсы и исключения, поскольку интерфейсы задают контракт взаимодействия между объектами, а исключения позволяют управлять потоком выполнения при ошибках в методах
    correct: false
    explanation: Исключения — механизм обработки ошибок, не основной для взаимодействия.
  - id: c
    text: Статические классы и делегаты, поскольку они позволяют централизованно реализовывать поведение и передавать функции как объекты для вызова в нужный момент
    correct: false
    explanation: Слишком узко, не универсально для всех ООП-языков.
  - id: d
    text: Наследование и полиморфизм, поскольку они позволяют создавать и расширять классы с разным поведением при одинаковых методах
    correct: true
    explanation: Именно эти принципы отвечают за то, что методы могут вызываться единообразно, а аргументы передаваться между объектами с общим интерфейсом.
  - id: e
    text: Абстракция и композиция, поскольку они определяют алгоритмы взаимодействия объектов через глобальные переменные
    correct: false
    explanation: Глобальные переменные не относятся к ООП-принципам.
  difficulty: medium
  explanation: Наследование и полиморфизм обеспечивают возможность единообразного вызова методов и передачи аргументов между объектами разных классов.
  extended_explanation: |-
    Наследование и полиморфизм в рантайме:
    - Наследование позволяет создавать иерархии классов
    - Полиморфизм позволяет обращаться к объектам разных классов через общий интерфейс
    - Методы вызываются в зависимости от реального типа объекта
    - Аргументы могут передаваться как объекты базового типа

    ## Пример
    void ProcessPayment(Payment payment) {
        payment.Process(); // Полиморфный вызов
    }
  recommendation: |-
    Повторить основные принципы ООП и их роль в выполнении программы.
    Справка: https://ru.wikipedia.org/wiki/Объектно-ориентированное_программирование#Основные_понятия
- id: q14
  text: Какое из следующих утверждений наиболее комплексно и точно характеризует влияние объектно-ориентированного программирования на проектирование сложных программных систем, учитывая его многоуровневую природу?
  type: single
  options:
  - id: a
    text: ООП не поддерживает параллельное программирование, что делает его менее подходящим для разработки сложных систем с высокой нагрузкой, при этом создавая дополнительные препятствия для масштабируемости
    correct: false
    explanation: ООП не исключает параллельное программирование (Java, C# поддерживают потоки).
  - id: b
    text: ООП требует создания единственного класса, что, на первый взгляд, минимизирует сложности, однако приводит к чрезмерной связанности и неэффективности взаимодействия между множеством компонентов системы
    correct: false
    explanation: Абсурд, ООП как раз множество классов.
  - id: c
    text: ООП ориентировано на статическую типизацию, что может ограничивать его применение в динамических и адаптивных системах, однако в некоторых случаях это способствует повышению стабильности и предсказуемости поведения программ
    correct: false
    explanation: Есть динамические ООП-языки (Python, Ruby).
  - id: d
    text: ООП обеспечивает ясную и логичную организацию кода, значительно облегчая его поддержку и расширение благодаря глубокому внедрению специализированных принципов, что делает его особенно ценным для крупных систем
    correct: true
    explanation: ООП вводит принципы (инкапсуляция, наследование, полиморфизм), которые облегчают поддержку и расширение крупных систем.
  - id: e
    text: ООП упрощает архитектурное проектирование за счет создания неструктурированных и зависимых от глобальных переменных компонентов, что способствует быстрой разработке и не приводит к усложнению последующей поддержки кода
    correct: false
    explanation: ООП структурирует код, а не создает хаос.
  difficulty: medium
  explanation: ООП обеспечивает модульность, переиспользование и облегчает поддержку крупных систем благодаря принципам инкапсуляции, наследования и полиморфизма.
  extended_explanation: |-
    Ценность ООП для сложных систем:
    - Модульность (классы как независимые компоненты)
    - Инкапсуляция (скрытие деталей реализации)
    - Наследование (повторное использование и расширение)
    - Полиморфизм (гибкость взаимодействия)
    - Абстракция (управление сложностью)

    ## Результат
    - Код легче поддерживать
    - Проще добавлять новые функции
    - Меньше побочных эффектов при изменениях
  recommendation: |-
    Повторить преимущества ООП при разработке крупных систем.
    Справка: https://ru.wikipedia.org/wiki/Объектно-ориентированное_программирование#Преимущества
- id: q15
  text: Какой из следующих аспектов наиболее точно и всесторонне описывает ключевые характеристики объектно-ориентированных баз данных (ООБД), учитывая их структуру, управление данными и взаимодействие с объектами?
  type: single
  options:
  - id: a
    text: ООБД хранят данные в табличной форме, используя SQL-запросы и реляционные связи, что ограничивает гибкость в моделировании сложных объектов
    correct: false
    explanation: Это описание реляционных БД, а не ООБД.
  - id: b
    text: ООБД позволяют сохранять данные в виде объектов, содержащих как методы, так и уникальные свойства, что значительно упрощает работу с комплексными данными и их отношениями
    correct: true
    explanation: В ООБД данные хранятся как объекты с атрибутами и методами.
  - id: c
    text: ООБД не используют агрегатные функции для анализа данных, поскольку они полагаются исключительно на встроенные методы и свойства объектов для извлечения информации
    correct: false
    explanation: Агрегатные функции могут быть реализованы через методы.
  - id: d
    text: ООБД поддерживают только один тип отношений между объектами — однонаправленную связь, что усложняет работу с более сложными структурами данных
    correct: false
    explanation: Поддерживаются разные типы связей.
  - id: e
    text: ООБД не поддерживают транзакции и многозадачность в работе с данными, что ограничивает их применение в высоконагруженных системах
    correct: false
    explanation: Многие ООБД поддерживают транзакции.
  difficulty: medium
  explanation: ООБД хранят данные в виде объектов с атрибутами и методами, что упрощает работу со сложными структурами и отношениями.
  extended_explanation: |-
    Объектно-ориентированные БД:
    - Хранят объекты, а не таблицы
    - Объекты могут содержать методы (поведение)
    - Поддерживают сложные отношения (наследование, композиция)
    - Устраняют impedance mismatch между ООП-языком и БД

    ## Что здесь важно по теории
    - Примеры: db4o, ObjectDB, Versant
    - Могут поддерживать транзакции, индексы, запросы
    - Используются для сложных доменных моделей
  recommendation: |-
    Повторить особенности объектно-ориентированных баз данных.
    Справка: https://ru.wikipedia.org/wiki/Объектно-ориентированная_база_данных
