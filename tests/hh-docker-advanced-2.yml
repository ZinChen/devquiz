slug: hh-docker-advanced-2
title: "Docker — продвинутый уровень (часть 2)"
description: "Тест по продвинутым практикам Docker: оптимизация сборки, безопасность, мониторинг, оркестрация и управление конфигурацией."
tags: [docker, devops, hh]
difficulty: advanced
estimated_time: 15

questions:
  - id: q1
    text: "Вы управляете несколькими контейнерами, но вместо использования отдельных Dockerfile для каждого сервиса вы используете монолитный Dockerfile для большого приложения. Каждый раз при сборке образа теряется кэш в CI/CD пайплайне, а общая сборка занимает более 30 минут. Базовый образ обновляется раз в неделю, а слои приложения меняются ежедневно. Выберите верный подход к решению проблемы."
    type: single
    options:
      - id: a
        text: "Разделение Dockerfile на несколько многоступенчатых сборок позволит изолировать изменения в слоях приложения и базового образа, сохраняя кэш для неизмененных частей"
        correct: true
      - id: b
        text: "Уменьшение размера базового образа ускорит загрузку и установку всех пакетов, даст решение проблем потери кэша при ежедневных изменениях в слоях"
        correct: false
      - id: c
        text: "Увеличение частоты обновления базового образа сократит время сборки и решит проблему потери кэша из-за ежедневных изменений в слоях приложения"
        correct: false
      - id: d
        text: "Использование одного общего слоя для всех сервисов уменьшит количество слоев и ускорит сборку, решит проблему потери кэша при ежедневных изменениях"
        correct: false
      - id: e
        text: "Использование флага --no-cache для принудительной пересборки всех слоев и устранит проблемы с кэшем, так как все слои будут пересобраны, что ускорит сборку"
        correct: false
    explanation: "Многоступенчатая сборка позволяет изолировать изменения в слоях приложения от базового образа, сохраняя кэш для неизмененных частей."
    extended_explanation: |
      - Базовый образ обновляется редко → его слой можно закэшировать
      - Код приложения меняется часто → его слой будет часто пересобираться
      - Многоступенчатая сборка разделяет эти этапы, сохраняя кэш базового образа

      ## Что здесь важно по теории
      - Каждая инструкция в Dockerfile создает слой
      - При изменении файла все последующие слои пересобираются
      - Multi-stage позволяет отделить сборку от рантайма
    recommendation: |
      Повторить принципы кэширования слоев в Docker и использование многоступенчатых сборок.
      Справка: https://docs.docker.com/build/building/multi-stage/

  - id: q2
    text: |
      У вас есть Dockerfile для приложения Node.js:

      ```
      FROM node:18
      WORKDIR /app
      COPY package*.json ./
      RUN npm install
      COPY . .
      CMD ["node", "server.js"]

      Вы внесли изменения, чтобы ускорить процесс разработки, минимизировать пересборку слоев и сократить общее время сборки, однако трудность с пересборкой слоев, связанных с установкой зависимостей, осталась нерешенной. При каждом изменении кода пересобираются все слои, включая установку зависимостей, что приводит к увеличению времени сборки.

      Почему внесенные изменения НЕ приводят к результату?
      ```
    type: single
    options:
      - id: a
        text: "Разделение процесса копирования на два этапа с использованием COPY package*.json / и затем остального кода не приводит к решению проблемы из-за того, что COPY .. перезаписывает слои с установленными зависимостями"
        correct: false
      - id: b
        text: "Установка глобальных зависимостей с флагом -g приводит к глобальной установке пакетов, но не влияет на порядок и кеширование слоев при изменении кода"
        correct: false
      - id: c
        text: "Перемещение COPY .. перед RUN npm install не помогает, потому что это вызывает пересборку всех слоев, включая установку зависимостей, при каждом изменении кода"
        correct: true
      - id: d
        text: "Обновление образа node:18 перед каждой сборкой не устраняет проблему кеширования слоев, связанных с установкой зависимостей"
        correct: false
      - id: e
        text: "Использование multi-stage builds не решает проблему кеширования зависимостей, так как это не влияет на порядок инструкций в Dockerfile"
        correct: false
    explanation: "Если скопировать весь код до установки зависимостей, любое изменение кода инвалидирует слой COPY, и RUN npm install будет выполняться при каждой сборке."
    extended_explanation: |
      - Docker кэширует слои последовательно
      - При изменении слоя все последующие пересобираются
      - COPY . . меняется при любом изменении кода → RUN npm install пересобирается всегда

      ## Что здесь важно по теории
      - Сначала копируем только файлы зависимостей (package*.json)
      - Устанавливаем зависимости
      - Только потом копируем остальной код
      - Так слой с зависимостями пересобирается только при изменении package.json
    recommendation: |
      Повторить порядок инструкций в Dockerfile для оптимального кэширования.
      Справка: https://docs.docker.com/build/cache/

  - id: q3
    text: "Вы разрабатываете приложение, состоящее из трех сервисов: frontend, backend и database. В Docker Compose файле для каждого сервиса назначена своя собственная сеть, а не общая. После запуска через Docker Compose frontend не может подключиться к backend, и в логах frontend появляются ошибки соединения. Почему это происходит?"
    type: single
    options:
      - id: a
        text: "Сервисы запущены в отдельных сетевых пространствах, что препятствует их взаимодействию друг с другом"
        correct: true
      - id: b
        text: "Bridge-сеть в Docker Compose не поддерживает DNS-резолиннг, что делает невозможным взаимодействие сервисов"
        correct: false
      - id: c
        text: "Отсутствие секции depends_on приводит к случайному порядку запуска контейнеров, что блокирует их сетевое взаимодействие"
        correct: false
      - id: d
        text: "Отсутствие настройки volumes вызывает потерю данных, но не влияет на сетевое взаимодействие между контейнерами"
        correct: false
      - id: e
        text: "Отсутствие healthcheck приводит к попытке подключения frontend к backend до полной готовности последних"
        correct: false
    explanation: "Контейнеры в разных пользовательских сетях изолированы друг от друга и не могут взаимодействовать напрямую."
    extended_explanation: |
      - Docker создает изолированные сетевые пространства
      - Контейнеры видят только контейнеры в своей сети
      - Для взаимодействия нужно поместить сервисы в общую сеть

      ## Что здесь важно по теории
      - По умолчанию Compose создает общую сеть для всех сервисов
      - При явном указании разных сетей они изолируются
      - DNS-имена сервисов работают только в пределах одной сети
    recommendation: |
      Повторить конфигурацию сетей в Docker Compose.
      Справка: https://docs.docker.com/compose/networking/

  - id: q4
    text: "Вы разрабатываете приложение с несколькими контейнерами, где некоторые из них должны быть доступны из внешней сети, а другие — только внутри кластера. После настройки сети вы заметили, что внутренние контейнеры по-прежнему могут выходить в интернет, нарушая требования безопасности. Какую ошибку вы могли допустить при настройке сети?"
    type: single
    options:
      - id: a
        text: "Для контейнеров использовали параметр --network=host, что автоматически даёт доступ во внешнюю сеть"
        correct: false
      - id: b
        text: "Все контейнеры настроены с доступом в bridge-сеть, что делает их доступными из интернета"
        correct: false
      - id: c
        text: "Перепутали IP-адреса контейнеров, из-за чего внутренние сервисы стали доступны извне"
        correct: false
      - id: d
        text: "Для внутренних контейнеров не настроили изоляцию с помощью пользовательской сети с ограничениями доступа"
        correct: true
      - id: e
        text: "Отсутствие настройки volumes приводит к тому, что контейнеры используют одну сеть без ограничения доступа"
        correct: false
    explanation: "Для полной изоляции внутренних контейнеров от внешней сети нужно создавать внутреннюю сеть с опцией --internal."
    extended_explanation: |
      - Обычная bridge-сеть дает контейнерам доступ в интернет через NAT
      - Для изоляции нужно создать сеть с опцией --internal
      - Внутренняя сеть не имеет маршрута во внешний мир

      ## Что здесь важно по теории
      - docker network create --internal internal-net
      - Контейнеры в такой сети не имеют доступа в интернет
      - При этом они могут общаться между собой
    recommendation: |
      Повторить типы сетей в Docker и способы изоляции контейнеров.
      Справка: https://docs.docker.com/network/network-tutorial-standalone/

  - id: q5
    text: "На продакшн-сервере контейнер web-analytics начал демонстрировать нестабильную работу, в недавнее время обновления контейнера не производилось: увеличились задержки в ответах приложения, CPU загружено на 100%. Логи не содержат ошибок, но работа сервиса ощутимо замедлена. При этом: - Контейнер нельзя остановить для диагностики. - Интерактивный доступ внутрь контейнера запрещен по политике безопасности. Какова наиболее вероятная причина проблем и правильный подход к диагностике?"
    type: single
    options:
      - id: a
        text: "Увеличение задержек в ответах связаны с неправильной настройкой сети контейнера, требуется переподключение к виртуальной сети через docker network connect"
        correct: false
      - id: b
        text: "Рост задержек происходит из-за того, что контейнер исчерпал лимиты открытых файловых дескрипторов, необходимо увеличить параметр ulimit через перезапуск контейнера"
        correct: false
      - id: c
        text: "Плохо написанный код вызывает высокую нагрузку на CPU, для ликвидации проблемы требуется переписать код"
        correct: false
      - id: d
        text: "Высокая нагрузка вызвана 'зависящими' процессами внутри контейнера, их надо выявить с помощью анализа активных процессов через docker top и мониторинг ресурсов через docker stats"
        correct: true
      - id: e
        text: "Операционная система хоста стала источником проблемы сильного роста задержек, необходимо немедленно перезагрузить сервер и перезапустить все контейнеры заново"
        correct: false
    explanation: "docker stats показывает потребление ресурсов, docker top — процессы внутри контейнера. Это позволяет диагностировать проблему без входа в контейнер."
    extended_explanation: |
      - Контейнер нельзя остановить и нельзя войти внутрь
      - docker stats дает метрики CPU/памяти в реальном времени
      - docker top показывает процессы с их PID и потреблением
      - Это позволяет найти процесс, грузящий CPU

      ## Что здесь важно по теории
      - docker stats --no-stream показывает разовый срез
      - docker top <container> показывает процессы как ps
      - Без входа в контейнер можно получить полную картину
    recommendation: |
      Повторить команды для диагностики контейнеров без доступа внутрь.
      Справка: https://docs.docker.com/engine/reference/commandline/stats/

  - id: q6
    text: "Контейнер запущен в пользовательском пространстве имён (userns-remap), но при этом всё ещё может изменять состояние ядра Linux (например, менять параметры ядра через sysctl). Как это возможно?"
    type: single
    options:
      - id: a
        text: "Контейнер использует хостовый cgroup (–cgroups=host)"
        correct: false
      - id: b
        text: "Применена политика –security-opt apparmor=unconfined"
        correct: false
      - id: c
        text: "Использован –network host, который дает доступ к управлению сетью и ядром"
        correct: false
      - id: d
        text: "Параметр –privileged был применён частично, что оставило некоторые возможности"
        correct: false
      - id: e
        text: "Контейнер запущен с параметром –cap-add=CAP_SYS_ADMIN"
        correct: true
    explanation: "CAP_SYS_ADMIN — очень мощная capability, которая дает контейнеру множество привилегий, включая изменение параметров ядра, даже при включенном userns-remap."
    extended_explanation: |
      - userns-remap изолирует на уровне пользователей
      - capabilities управляют привилегиями на уровне ядра
      - CAP_SYS_ADMIN позволяет менять sysctl, монтировать ФС и многое другое

      ## Что здесь важно по теории
      - По умолчанию контейнеры получают ограниченный набор capabilities
      - --cap-add=CAP_SYS_ADMIN дает почти root-права в контейнере
      - userns-remap не отключает capabilities
    recommendation: |
      Повторить Linux capabilities и их влияние на безопасность контейнеров.
      Справка: https://docs.docker.com/engine/security/userns-remap/

  - id: q7
    text: "Ваше приложение работает с контейнерами, использующими тома Docker для временных файлов. В логах вы заметили следующее: 1. Некоторые контейнеры теряют доступ к томам после перезапуска. 2. Периодически появляются сообщения об ошибках доступа к файлам. 3. При сборке новых контейнеров старые временные файлы остаются в томах и приводят к увеличению их размера. Что могло стать причиной этой ситуации?"
    type: single
    options:
      - id: a
        text: "Отсутствие автоматической очистки содержимого тома при завершении работы контейнера"
        correct: true
      - id: b
        text: "Использование одного тома для временных и постоянных данных"
        correct: false
      - id: c
        text: "Несовместимость версий Docker CLI с настроенной конфигурацией томов"
        correct: false
      - id: d
        text: "Контейнеры используют одни и те же тома, что приводит к конфликтам при создании/изменении файлов"
        correct: false
      - id: e
        text: "Использование локальных томов вместо временных томов для временных данных"
        correct: false
    explanation: "Обычные тома не очищаются автоматически при остановке контейнера. Для временных данных лучше использовать tmpfs монтирования."
    extended_explanation: |
      - Обычные тома (volumes) сохраняются после остановки контейнера
      - Это объясняет накопление старых файлов
      - Проблемы с доступом могут быть из-за прав на старые файлы
      - Для временных данных лучше использовать tmpfs (очищаются при остановке)

      ## Что здесь важно по теории
      - tmpfs монтирование хранится в памяти, очищается при остановке
      - --rm при запуске удаляет контейнер и его слои, но не тома
      - docker volume prune удаляет неиспользуемые тома
    recommendation: |
      Повторить типы томов в Docker и их жизненный цикл.
      Справка: https://docs.docker.com/storage/volumes/

  - id: q8
    text: "Вы развернули приложение в кластере Docker с 5 контейнерами и хотите вместе с коллегой настроить систему мониторинга, чтобы выявлять потенциальные проблемы производительности в реальном времени. Вам необходимо отобразить статистику использования CPU, памяти и сетевого трафика для каждого контейнера в виде графиков, доступных для анализа, коллега попробовал это сделать. Какие действия предпринял коллега, если данные о каждом контейнере отображаются в виде графиков использования CPU, памяти и сетевого трафика в реальном времени, и вы можете легко отслеживать потенциальные проблемы?"
    type: single
    options:
      - id: a
        text: "Использовал Docker Logs для мониторинга состояния CPU и памяти каждого контейнера, а затем настроил визуализацию с помощью Grafana, чтобы создать графики и таблицы"
        correct: false
      - id: b
        text: "Установил и настроил Prometheus с cAdvisor для сбора метрик, а затем использовал Grafana для создания графиков и дашбордов"
        correct: true
      - id: c
        text: "Установил Kibana и подключил его к Docker для анализа метрик, включая CPU и память, и создал динамические дашборды, отображающие статистику по контейнерам"
        correct: false
      - id: d
        text: "Использовал команду docker stats для получения данных в реальном времени и экспортировал их в Excel, а затем построил графики для отображения использования ресурсов контейнеров"
        correct: false
      - id: e
        text: "Настроил Docker Compose для запуска контейнеров с логами на стандартный вывод и использовал инструменты для визуализации данных в реальном времени, подключив их к Kibana"
        correct: false
    explanation: "cAdvisor собирает метрики контейнеров, Prometheus хранит, Grafana визуализирует — это стандартный стек для мониторинга Docker в реальном времени."
    extended_explanation: |
      - cAdvisor (Container Advisor) собирает метрики CPU, памяти, сети, диска
      - Prometheus забирает метрики из cAdvisor и хранит их
      - Grafana строит графики и дашборды на основе данных из Prometheus

      ## Что здесь важно по теории
      - docker stats дает только текущий срез, не историю
      - Prometheus позволяет хранить метрики и делать алерты
      - Grafana дает доступные дашборды для всей команды
    recommendation: |
      Повторить стек мониторинга контейнеров: cAdvisor, Prometheus, Grafana.
      Справка: https://prometheus.io/docs/guides/cadvisor/

  - id: q9
    text: "Ваш CI/CD пайплайн использует Docker для развертывания микросервисного приложения. За счет чего Docker упрощает управление зависимостями в таком пайплайне?"
    type: single
    options:
      - id: a
        text: "Позволяет использовать общую базу зависимости для всех приложений, работающих в контейнерах"
        correct: false
      - id: b
        text: "Включает все необходимые компоненты приложения в образ, минимизируя внешние зависимости"
        correct: true
      - id: c
        text: "Устраняет необходимость описывать зависимости в конфигурационных файлах, таких как Dockerfile"
        correct: false
      - id: d
        text: "Обеспечивает автоматическое обнаружение и связь между зависимыми контейнерами в рамках пайплайна"
        correct: false
      - id: e
        text: "Автоматически обновляет зависимости в контейнерах при каждом запуске сборки или развертывании"
        correct: false
    explanation: "Docker упаковывает все необходимые компоненты в образ, что делает окружение воспроизводимым и независимым от хост-системы."
    extended_explanation: |
      - Образ содержит код, runtime, библиотеки, системные пакеты
      - Сборка и тестирование происходят в одинаковом окружении
      - Пайплайн не зависит от состояния агента сборки

      ## Что здесь важно по теории
      - "На моей машине работает" больше не проблема
      - Образы версионируются, можно откатиться
      - Зависимости фиксируются в Dockerfile
    recommendation: |
      Повторить преимущества Docker в CI/CD пайплайнах.
      Справка: https://docs.docker.com/ci-cd/

  - id: q10
    text: "Что безопаснее: использование инструкции USER в Dockerfile или параметра -u <user> при запуске контейнера?"
    type: single
    options:
      - id: a
        text: "-u <user> при запуске, так как это позволяет гибко менять пользователя без изменения Dockerfile"
        correct: false
      - id: b
        text: "USER в Dockerfile, так как это обеспечивает безопасность на этапе сборки и предотвращает запуск контейнера от root"
        correct: true
      - id: c
        text: "-u <user> при запуске, так как это повышает производительность контейнера"
        correct: false
      - id: d
        text: "USER в Dockerfile, так как это упрощает управление контейнерами и снижает вероятность ошибок"
        correct: false
      - id: e
        text: "USER в Dockerfile, так как это позволяет избежать необходимости указывать пользователя при каждом запуске"
        correct: false
    explanation: "USER в Dockerfile гарантирует, что и сборка, и запуск выполняются от непривилегированного пользователя, что повышает безопасность."
    extended_explanation: |
      - USER влияет на все последующие инструкции (RUN, CMD, ENTRYPOINT)
      - Если образ собран от root, в нем могут остаться root-файлы
      - -u при запуске переопределяет только запуск, не сборку

      ## Что здесь важно по теории
      - Запуск от root в контейнере — плохая практика
      - Лучше создать пользователя в Dockerfile и переключиться на него
      - -u полезно для временного переопределения
    recommendation: |
      Повторить best practices по безопасности Dockerfile.
      Справка: https://docs.docker.com/develop/develop-images/dockerfile_best-practices/#user

  - id: q11
    text: "На сервере, где развернуто 15 Docker-контейнеров, вы столкнулись с аномалиями: 1. Один контейнер потребляет в 4 раза больше CPU и памяти, чем обычно. 2. Несколько контейнеров начинают отправлять и принимать данные через нестандартные порты. 3. Контейнеры неожиданно обращаются к ресурсам хоста, к которым ранее не имели доступа. Выявите причину этих аномалий."
    type: single
    options:
      - id: a
        text: "Разрешение выполнения необновленных бинарных файлов в контейнерах, что может привести к их эксплуатации"
        correct: false
      - id: b
        text: "Отсутствие настройки CPU и memory limits, что могло вызвать перерасход ресурсов"
        correct: false
      - id: c
        text: "Запуск контейнеров с параметром —privileged, что позволяет им получить полный доступ к хосту"
        correct: true
      - id: d
        text: "Создание пользовательской сети Docker без ограничения взаимодействия между контейнерами"
        correct: false
      - id: e
        text: "Запуск контейнеров без ограничений в cap_add и cap_drop, что может дать им дополнительные права"
        correct: false
    explanation: "--privileged дает контейнеру все привилегии и доступ ко всем устройствам хоста, что объясняет все три аномалии."
    extended_explanation: |
      - --privileged отключает почти все ограничения Docker
      - Контейнер может использовать все ресурсы без лимитов
      - Может открывать любые порты на хосте
      - Имеет доступ к устройствам, файловой системе хоста

      ## Что здесь важно по теории
      - --privileged — крайняя мера, опасна для продакшена
      - Лучше добавлять только нужные capabilities
      - Всегда ставить лимиты ресурсов
    recommendation: |
      Повторить опасности запуска контейнеров с --privileged.
      Справка: https://docs.docker.com/engine/reference/run/#runtime-privilege-and-linux-capabilities

  - id: q12
    text: "Почему overlay-сеть в Docker лучше подходит для связи контейнеров на разных хостах?"
    type: single
    options:
      - id: a
        text: "Оптимизирована для связи контейнеров между разными хостами, снижая задержки"
        correct: true
      - id: b
        text: "Автоматически масштабирует все сетевые ресурсы по мере возрастания нагрузки"
        correct: false
      - id: c
        text: "Обеспечивает полную изоляцию контейнеров, блокируя любой внешний трафик"
        correct: false
      - id: d
        text: "Использует частичное сжатие трафика, за счет этого уменьшает нагрузку на сеть"
        correct: false
      - id: e
        text: "Позволяет контейнерам использовать IP-адреса хоста, сильно ускоряя к ним доступ"
        correct: false
    explanation: "Overlay-сети создают виртуальную сеть поверх физических сетей хостов, оптимизируя взаимодействие контейнеров на разных хостах."
    extended_explanation: |
      - Overlay использует VXLAN для инкапсуляции трафика
      - Контейнеры на разных хостах видят друг друга как в одной сети
      - Docker Swarm оптимизирует маршрутизацию для снижения задержек

      ## Что здесь важно по теории
      - Overlay требует Docker Swarm или стороннего ключа
      - Позволяет использовать service discovery по имени сервиса
      - Поддерживает балансировку нагрузки между репликами
    recommendation: |
      Повторить типы сетей в Docker Swarm.
      Справка: https://docs.docker.com/network/overlay/

  - id: q13
    text: "Вы запускаете приложение, которое обрабатывает данные в реальном времени, но замечаете значительное замедление при увеличении нагрузки. При анализе выясняется, что контейнеры перегружены из-за большого количества запросов, а распределение нагрузки между ними недостаточно эффективно. Это приводит к задержкам в обработке данных и ухудшению пользовательского опыта. Как можно оптимизировать производительность контейнера без изменения кода приложения?"
    type: single
    options:
      - id: a
        text: "Использовать overlay-сеть для взаимодействия между контейнерами"
        correct: false
      - id: b
        text: "Переместить контейнер на хост с более мощным оборудованием"
        correct: false
      - id: c
        text: "Настроить логирование на минимальный уровень для уменьшения нагрузки"
        correct: false
      - id: d
        text: "Увеличить количество доступной памяти для контейнера"
        correct: false
      - id: e
        text: "Добавить дополнительные реплики для распределения нагрузки"
        correct: true
    explanation: "Добавление реплик распределяет нагрузку между несколькими экземплярами контейнера, что не требует изменения кода."
    extended_explanation: |
      - Проблема: приложение не справляется с ростом нагрузки
      - Решение: горизонтальное масштабирование (больше реплик)
      - Балансировщик распределяет запросы между репликами

      ## Что здесь важно по теории
      - Не требует изменения кода, только настройки оркестратора
      - Docker Swarm: docker service scale service=5
      - Важно, чтобы приложение было stateless
    recommendation: |
      Повторить горизонтальное масштабирование в Docker Swarm/Kubernetes.
      Справка: https://docs.docker.com/engine/swarm/swarm-tutorial/

  - id: q14
    text: "Для чего используют монтирования секретов в контейнер с правами ro (только для чтения)?"
    type: single
    options:
      - id: a
        text: "Чтобы уменьшить объем памяти, занимаемый конкретным контейнером"
        correct: false
      - id: b
        text: "Чтобы запретить изменение секретов в процессе выполнения контейнера"
        correct: true
      - id: c
        text: "Чтобы обеспечить совместимость во время выполнения с legacy-приложениями"
        correct: false
      - id: d
        text: "Чтобы автоматически архивировать все секреты после окончания использования"
        correct: false
      - id: e
        text: "Чтобы скрыть секреты от других процессов, запущенных на данном хосте"
        correct: false
    explanation: "Read-only монтирование предотвращает изменение секретов внутри контейнера, что повышает безопасность."
    extended_explanation: |
      - Секреты должны оставаться неизменными
      - Read-only гарантирует, что приложение не испортит секреты
      - Даже при компрометации контейнера секреты нельзя изменить

      ## Что здесь важно по теории
      - В Docker Swarm секреты монтируются в /run/secrets/
      - По умолчанию они уже read-only
      - При ручном монтировании стоит добавлять :ro
    recommendation: |
      Повторить управление секретами в Docker.
      Справка: https://docs.docker.com/engine/swarm/secrets/
