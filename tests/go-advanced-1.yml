  extended_explanation: В Go тесты могут находиться в том же пакете, что и тестируемый код, и иметь доступ к неэкспортируемым полям. Однако если тесты вынесены в отдельный пакет (что рекомендуется для чистоты), то доступ закрыт. В этом случае следует тестировать через публичные методы, проверяя корректность результата, а не внутренние поля.
  recommendation: Тестировать поведение объекта через его публичные методы. Если состояние не видно, значит оно не должно проверяться напрямую.
- id: q7
  text: Реализуется gRPC сервис, который принимает от клиента поток данных о позициях на складе, а после завершения передачи возвращает итоговый отчёт. Какой тип вызова gRPC наиболее корректен?
  type: single
  options:
  - id: a
    text: Unary RPC
    correct: false
    explanation: Клиент отправляет одно сообщение, а здесь нужен поток.
  - id: b
    text: Broadcast RPC
    correct: false
    explanation: Такого типа в gRPC нет.
  - id: c
    text: Bidirectional Streaming RPC
    correct: false
    explanation: Сервер возвращает только один ответ, а не поток.
  - id: d
    text: Server Streaming RPC
    correct: false
    explanation: Сервер отправляет поток, клиент — одно сообщение, здесь наоборот.
  - id: e
    text: Client Streaming RPC
    correct: true
    explanation: Клиент передаёт поток сообщений, сервер возвращает один ответ.
  difficulty: medium
  topics: [go]
  explanation: Client streaming RPC позволяет клиенту отправить несколько сообщений, а серверу — вернуть один ответ после обработки всего потока.
  extended_explanation: |-
    gRPC определяет четыре типа вызовов:
    - Unary: один запрос → один ответ
    - Server streaming: один запрос → поток ответов
    - Client streaming: поток запросов → один ответ
    - Bidirectional streaming: поток запросов ↔ поток ответов
  recommendation: |-
    Повторить типы RPC в gRPC: unary, server streaming, client streaming, bidirectional streaming.
    Справка: https://grpc.io/docs/what-is-grpc/core-concepts/
- id: q8
  text: В сервисе обработки платежей на Go необходимо реализовать таймаут для каждого запроса к внешнему API, а также передавать информацию о текущем пользователе между слоями приложения. Какой способ использования context наиболее корректен?
  type: single
  options:
  - id: a
    text: Использовать один общий context для всех запросов с глобальным таймаутом, информацию о пользователе передавать через отдельный параметр функций
    correct: false
    explanation: Глобальный контекст с единым таймаутом не позволяет гибко управлять временем выполнения разных запросов и не является идиоматичным подходом в Go.
  - id: b
    text: Создавать context с таймаутом для каждого запроса и передавать дальше, информацию о пользователе передавать в context через WithValue
    correct: false
    explanation: Технически это работает, но документация Go рекомендует использовать context.WithValue только для сквозных данных (trace ID, request ID), а не для передачи обязательных параметров бизнес-логики, таких как информация о пользователе.
  - id: c
    text: Создавать context с таймаутом для каждого запроса и передавать дальше, информацию о пользователе передавать через отдельный параметр функций
    correct: true
    explanation: Таймаут управляется через context — это стандартный подход. Информация о пользователе передаётся явным параметром, что соответствует принципу явных зависимостей и рекомендациям Go по использованию context.
  - id: d
    text: Использовать один общий context для всех запросов с глобальным таймаутом, информацию о пользователе передавать в context через WithValue
    correct: false
    explanation: 'Сочетает два недостатка: глобальный таймаут негибок, а передача пользователя через WithValue не рекомендуется для данных доменной логики.'
  - id: e
    text: Не использовать context, реализовать таймаут через time.After, информацию о пользователе передавать через отдельный параметр функций
    correct: false
    explanation: time.After не предоставляет механизма отмены операций и не интегрируется с отменой по сигналу, что делает код менее надёжным.
  difficulty: medium
  topics: [go]
  explanation: Каждый запрос должен иметь свой context с таймаутом, но через context следует передавать только сквозные данные (отмена, deadline, trace ID), а не параметры бизнес-логики.
  extended_explanation: |-
    Правильный подход разделяет ответственность:
    1. Таймаут и отмена — через context.WithTimeout, который передаётся первым аргументом во все функции, выполняющие I/O.
    2. Информация о пользователе — как явный параметр функции, что делает код более понятным, типобезопасным и тестируемым.

    Согласно официальной документации Go, context.WithValue следует использовать только для данных, которые проходят через границы процессов и API, но не вместо передачи обязательных параметров функций.

    ## Что здесь важно по теории
    - context не должен использоваться как хранилище всех данных запроса.
    - Явные параметры делают зависимости функции очевидными.
    - Для данных, которые нужны только для логирования или трассировки (trace ID, request ID), допустимо использовать context.WithValue.
  recommendation: |-
    Использовать context.WithTimeout для каждого запроса, а для передачи информации о пользователе предпочитать явные параметры функций.
    Справка: https://go.dev/blog/context
