    explanation: Увеличивает потребление памяти, не решает проблему аллокаций.
  - id: c
    text: Использовать один общий большой преалицированный буфер для всех файлов
    correct: false
    explanation: Требует синхронизации, что снижает производительность, и небезопасно.
  - id: d
    text: Заменить буферы на срезы строк
    correct: false
    explanation: Строки иммутабельны, для буферов всё равно нужны аллокации.
  - id: e
    text: Создавать временный буфер на экспериментально подобранное количество файлов
    correct: false
    explanation: Негибко, не адаптируется под реальную нагрузку.
  difficulty: medium
  topics: [go]
  explanation: sync.Pool позволяет переиспользовать временные объекты, уменьшая аллокации и нагрузку на сборщик мусора.
  extended_explanation: "`sync.Pool` хранит временные объекты, которые можно извлекать и возвращать. При высокой нагрузке пул расширяется, при простое — очищается. Это идеально для буферов, которые часто создаются и уничтожаются."
  recommendation: |-
    Использовать sync.Pool для объектов с высокой частотой аллокаций (буферы, временные структуры).
    Справка: https://pkg.go.dev/sync#Pool
- id: q10
  text: Нужно реализовать универсальную функцию поиска элемента в срезе, возвращающую индекс первого вхождения. Функция должна работать с любыми типами, поддерживающими сравнение на равенство, в Go 1.18+. Какой подход наиболее корректен?
  type: single
  options:
  - id: a
    text: Использовать дженерик-функцию с ограничением any и проверять тип через reflect
    correct: false
    explanation: reflect избыточен и медленнее, чем comparable.
  - id: b
    text: Использовать пустой интерфейс (interface{}) и выполнять приведение типов
    correct: false
    explanation: Нет type safety, возможны паники.
  - id: c
    text: Использовать дженерик-функцию с ограничением типа comparable
    correct: true
    explanation: comparable — встроенное ограничение для типов, поддерживающих ==.
  - id: d
    text: Создать интерфейс Equal с методом Equal и требовать его реализации
    correct: false
    explanation: Избыточно для базовых типов.
  - id: e
    text: Создать отдельные функции для каждого типа данных
    correct: false
    explanation: Дублирование кода.
  difficulty: medium
  topics: [go]
  explanation: Ограничение comparable позволяет использовать оператор == и гарантирует безопасность типов на этапе компиляции.
  extended_explanation: |-
    Пример реализации:
    ```go
    func Index[T comparable](slice []T, value T) int {
        for i, v := range slice {
            if v == value {
                return i
            }
        }
        return -1
    }
    ```
    Такой код работает с int, string, и любыми другими comparable типами без потери производительности.
  recommendation: |-
    Использовать дженерики с ограничением comparable для функций, работающих с типами, поддерживающими равенство.
    Справка: https://go.dev/doc/tutorial/generics
- id: q11
  text: Какое утверждение о связи между goroutine, M (OS thread) и P (processor) в Go является верным?
  type: single
  options:
  - id: a
    text: Каждая goroutine всегда выполняется на отдельном потоке ОС
    correct: false
    explanation: Множество goroutine мультиплексируются на меньшее количество M.
  - id: b
    text: М и P — это одно и то же в Go
    correct: false
    explanation: M — поток ОС, P — логический процессор.
  - id: c
    text: Goroutine могут выполняться только на главном потоке программы
    correct: false
    explanation: Могут выполняться на любом M.
  - id: d
    text: Goroutine выполняются на M, которые привязаны к P
    correct: true
    explanation: Для выполнения Go-кода M должен быть привязан к P.
  - id: e
    text: Количество goroutine всегда равно количеству P
    correct: false
    explanation: Goroutine может быть значительно больше.
  difficulty: medium
  topics: [go]
  explanation: Goroutine выполняется на M (OS thread), который должен быть привязан к P (логическому процессору), чтобы выполнять Go-код.
  extended_explanation: |-
    В планировщике Go:
    - G — goroutine
    - M — поток ОС (machine)
    - P — процессор (processor), количество P = GOMAXPROCS
    - Для выполнения Go-кода M должен удерживать P
    - Блокирующие системные вызовы позволяют M отпустить P и создать новый M
  recommendation: |-
    Изучить модель GMP (Goroutine, Machine, Processor) в Go.
    Справка: https://go.dev/src/runtime/HACKING.md
- id: q12
  text: Какое утверждение о функции runtime.GOMAXPROCS и переменной окружения GOMAXPROCS является верным?
  type: single
  options:
  - id: a
    text: Устанавливают максимальное количество логических процессоров (P), которые могут быть использованы для выполнения goroutines
    correct: true
    explanation: GOMAXPROCS определяет количество P.
  - id: b
    text: Устанавливают максимальное количество операционных системных потоков (M), которые могут быть использованы программой
    correct: false
    explanation: Количество M может быть больше GOMAXPROCS.
  - id: c
    text: Переменная окружения GOMAXPROCS не влияет, если функция runtime.GOMAXPROCS не вызывалась
    correct: false
    explanation: Переменная окружения действует по умолчанию.
  - id: d
    text: Определяет максимальное количество goroutines, которые могут быть созданы в программе
    correct: false
    explanation: Goroutines не ограничены GOMAXPROCS.
  - id: e
    text: Устанавливает максимальное количество goroutines, которые могут выполняться одновременно
    correct: false
    explanation: GOMAXPROCS определяет количество P, а goroutine может быть больше.
  difficulty: medium
  topics: [go]
  explanation: GOMAXPROCS задаёт количество процессоров (P), которые планировщик может использовать для параллельного выполнения goroutines.
  extended_explanation: |-
    - По умолчанию GOMAXPROCS равно количеству ядер CPU.
    - Увеличение GOMAXPROCS может повысить параллелизм, но не всегда улучшает производительность.
    - Количество потоков ОС (M) может быть больше GOMAXPROCS из-за блокирующих вызовов.
  recommendation: |-
    Повторить, что GOMAXPROCS влияет на параллелизм (количество одновременно работающих P), а не на количество goroutines.
    Справка: https://pkg.go.dev/runtime#GOMAXPROCS
- id: q13
  text: |-
    Какая функция является 'узким местом' и занимает больше всего времени на представленном графе вызовов?

    ```
    min.FindHavlakloops
    0 (0.0%) of 151 (8.0%)

    min.FindLoops
    0 (0.0%) of 151 (8.0%)

    runtime.mapaccess1_fast64
    298 (11.8%) of 345 (13.7%)

    runtime.aeshash64
    47 (1.9%)
    ```
  type: single
  options:
  - id: a
    text: min.FindHavlakloops
    correct: false
    explanation: Собственное время 0%, общее 8%.
  - id: b
    text: min.FindLoops
    correct: false
    explanation: Собственное время 0%, общее 8%.
  - id: c
    text: runtime.mapaccess1_fast64
    correct: true
    explanation: Собственное время 298 (11.8%), общее 345 (13.7%) — наибольшие показатели.
  - id: d
    text: runtime.aeshash64
    correct: false
    explanation: Собственное время 47 (1.9%) — значительно меньше.
  difficulty: medium
  topics: [go]
  explanation: runtime.mapaccess1_fast64 имеет наибольшее собственное (298) и общее (345) время, что указывает на частые обращения к map.
  extended_explanation: |-
    В профиле pprof:
    - self time — время, проведённое непосредственно в функции
    - total time — self time + время дочерних вызовов
    - Функция с наибольшим временем — кандидат на оптимизацию
  recommendation: При профилировании ищите функции с наибольшим self time или total time — это узкие места.
- id: q14
  text: В каком случае использование пакета unsafe может быть оправдано?
  type: single
  options:
  - id: a
    text: Для реализации стандартных коллекций Go
    correct: true
    explanation: Стандартная библиотека Go использует unsafe для низкоуровневой работы с памятью.
  - id: b
    text: Для оптимизации производительности
    correct: false
    explanation: Обычно есть более безопасные способы, unsafe — крайняя мера.
  - id: c
    text: Для синхронизации между группами
    correct: false
    explanation: Не относится к unsafe.
  - id: d
    text: Для обработки ошибок в бизнес-логике
    correct: false
    explanation: Категорически неверно.
  - id: e
    text: Для сериализации данных в JSON
    correct: false
    explanation: Есть безопасные альтернативы.
  difficulty: medium
  topics: [go]
  explanation: unsafe оправдан в стандартной библиотеке и редких случаях, требующих обхода системы типов с гарантией корректности.
  extended_explanation: |-
    Пакет `unsafe` позволяет:
    - работать с памятью напрямую
    - преобразовывать типы указателей
    - нарушать систему типов Go

    Его использование требует глубокого понимания памяти и сборщика мусора. В обычных приложениях он не нужен.
  recommendation: |-
    Избегать unsafe в прикладном коде. Использовать только при необходимости взаимодействия с C или реализации низкоуровневых структур.
    Справка: https://pkg.go.dev/unsafe
- id: q15
  text: Какое утверждение о передаче указателей между Go и C при использовании cgo является верным?
  type: single
  options:
  - id: a
    text: C код может хранить копии Go указателей без необходимости закрепления памяти
    correct: false
    explanation: GC может переместить объект, указатель станет невалидным.
  - id: b
    text: C указатели могут хранить Go указатели после завершения вызова функции Go
    correct: false
    explanation: Объект может быть удалён GC.
  - id: c
    text: Go указатели могут быть переданы в C без каких-либо ограничений
    correct: false
    explanation: Существуют строгие правила cgo.
  - id: d
    text: Go указатели могут быть переданы в C, даже если они указывают на память, содержащую другие Go указатели
    correct: false
    explanation: Это запрещено правилами cgo.
  - id: e
    text: Go указатели, переданные в C, должны указывать на закрепленную (pinned) память Go
    correct: true
    explanation: Закрепление предотвращает перемещение объекта GC во время работы C-кода.
  difficulty: medium
  topics: [go]
  explanation: При передаче Go-указателя в C память должна быть закреплена, чтобы GC не переместил объект во время использования C-кодом.
  extended_explanation: |-
    Правила cgo:
    - Go указатель, переданный в C, не должен указывать на объект, содержащий другие Go
    - C код не должен хранить Go указатели после возврата
    - Для долгоживущих указателей нужно закрепление (runtime.Pin) или выделение памяти через C.malloc
  recommendation: 'Изучить правила передачи указателей в cgo: go.dev/cmd/cgo/#hdr-Passing_pointers'
