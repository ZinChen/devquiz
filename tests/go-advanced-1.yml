- id: q1
  text: |-
    Какой из следующих фрагментов кода содержит ошибку или потенциальную проблему, связанную с работой с map?

    ```
    // Вариант 1
    var m map[string]int
    m["a"] = 1

    // Вариант 2
    m := make(map[string]int)
    m["a"] = 1

    // Вариант 3
    m := map[string]int{"a": 1}
    delete(m, "a")
    fmt.Println(m["a"])

    // Вариант 4
    m := make(map[string]int)
    fmt.Println(m["b"])

    // Вариант 5
    m := map[string]int{"a": 1}
    m["b"] = 2
    ```
  type: single
  options:
  - id: a
    text: Вариант 1
    correct: true
    explanation: Карта объявлена (var m map[string]int), но не инициализирована, её значение nil. Запись в nil-карту вызывает panic во время выполнения.
  - id: b
    text: Вариант 2
    correct: false
    explanation: Корректная инициализация через make, запись допустима.
  - id: c
    text: Вариант 3
    correct: false
    explanation: Удаление элемента из инициализированной карты допустимо, обращение к отсутствующему ключу возвращает zero value.
  - id: d
    text: Вариант 4
    correct: false
    explanation: Чтение из инициализированной карты по отсутствующему ключу безопасно, возвращает zero value.
  - id: e
    text: Вариант 5
    correct: false
    explanation: Добавление элемента в инициализированную карту корректно.
  difficulty: medium
  topics: [go]
  explanation: Вариант 1 объявляет, но не инициализирует карту, что приводит к panic при записи.
  extended_explanation: |-
    В Go карта, объявленная через `var`, имеет значение `nil`. Операции чтения из `nil`-карты безопасны (возвращают zero value), но запись вызывает панику. Инициализация через `make` или литерал выделяет память и позволяет безопасно изменять карту.

    ## Что здесь важно по теории
    - `var m map[K]V` → m == nil
    - `m := make(map[K]V)` → инициализированная карта
    - `m := map[K]V{}` → литерал карты
    - Запись в `nil`-map → panic
  recommendation: |-
    Повторить отличие объявления карты (var m map[K]V) от инициализации (make, литерал). Запись в nil-карту всегда вызывает panic.
    Справка: https://go.dev/blog/maps
- id: q2
