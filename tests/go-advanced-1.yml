    explanation: Нарушает инкапсуляцию ради тестов.
  - id: c
    text: Добавить публичные геттеры для всех полей
    correct: false
    explanation: Избыточно, если геттеры не нужны в API.
  - id: d
    text: Использовать рефлексию для доступа к неэкспортируемым полям в тестах
    correct: false
    explanation: Рефлексия хрупка и нарушает инкапсуляцию.
  - id: e
    text: Писать тесты только для публичных методов
