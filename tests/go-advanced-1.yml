  - id: b
    text: Вариант 1-3, Вариант 2-2, Вариант 3-1
    correct: false
    explanation: Не соответствует фактическому поведению.
  - id: c
    text: Вариант 1-1, Вариант 2-3, Вариант 3-2
    correct: false
    explanation: Вариант 2 не скомпилируется, вариант 3 выполнится корректно.
  - id: d
    text: Вариант 1-2, Вариант 2-3, Вариант 3-1
    correct: false
    explanation: Вариант 1 вызывает панику, а не ошибку компиляции.
  - id: e
    text: Вариант 1-3, Вариант 2-1, Вариант 3-2
    correct: false
    explanation: Вариант 2 — ошибка компиляции, вариант 3 — корректное выполнение.
  difficulty: medium
  topics: [go]
  explanation: Вариант 1 — паника (запись в nil-карту). Вариант 2 — ошибка компиляции (make с тремя аргументами). Вариант 3 — корректное выполнение.
  extended_explanation: |-
    - `make(map[K]V)` — корректно, создаёт пустую карту.
    - `make(map[K]V, hint)` — корректно, задаёт подсказку ёмкости.
    - `make(map[K]V, 0, 0)` — ошибка компиляции, так как make для map принимает максимум два аргумента.
  recommendation: |-
    Повторить синтаксис make для map: make(map[K]V, capacity) — только два аргумента, третий недопустим.
    Справка: https://go.dev/ref/spec#Making_slices_maps_and_channels
- id: q3
  text: |-
    Проанализируйте код WebSocket-сервера и определите, какая проблема безопасности присутствует.

    ```
    var upgrader = websocket.Upgrader{}

    func handleWebSocket(w http.ResponseWriter, r *http.Request) {
        conn, err := upgrader.Upgrade(w, r, nil)
        if err != nil {
            log.Println("Ошибка при установке WebSocket соединения:", err)
            return
        }
        defer conn.Close()
        for {
            _, message, err := conn.ReadMessage()
            if err != nil {
                log.Println("Ошибка при чтении сообщения:", err)
                break
            }
            // Нет ограничения на размер сообщения
            err = conn.WriteMessage(websocket.TextMessage, message)
            if err != nil {
                log.Println("Ошибка при отправке сообщения:", err)
                break
            }
        }
    }
    ```
  type: single
  options:
  - id: a
    text: Проблема в отсутствии проверки источника подключения, что делает приложение уязвимым для CSRF-атак
    correct: false
    explanation: CSRF-атаки возможны, но явная проблема в коде — отсутствие ограничения размера сообщения.
  - id: b
    text: Проблема в том, что соединение не защищено TLS, что делает данные уязвимыми для перехвата
    correct: false
    explanation: В коде используется ListenAndServeTLS, соединение защищено.
  - id: c
    text: Проблема в том, что отсутствует валидация входящих сообщений, что может привести к инъекциям
    correct: false
    explanation: Валидация отсутствует, но это не основная явная проблема.
  - id: d
    text: Проблема в том, что отсутствует ограничение на размер входящих сообщений, что допускает DoS-атаки
    correct: true
    explanation: В коде явно указано 'Нет ограничения на размер сообщения', что позволяет злоумышленнику отправить огромное сообщение и вызвать исчерпание памяти.
  - id: e
    text: Проблема только в размере буфера WebSocket, что может привести к DoS-атакам
    correct: false
    explanation: Проблема именно в отсутствии ограничения максимального размера сообщения, а не в размере внутреннего буфера.
  difficulty: medium
  topics: [go, security]
  explanation: Отсутствие ограничения на размер сообщения позволяет злоумышленнику исчерпать память сервера (DoS-атака).
  extended_explanation: WebSocket-соединения должны иметь ограничение на максимальный размер сообщения. В gorilla/websocket для этого используется `SetReadLimit`. Без этого лимита клиент может отправить сообщение размером в несколько гигабайт, и сервер попытается прочитать его целиком, что приведёт к падению.
  recommendation: |-
    Всегда устанавливать ограничение на максимальный размер сообщения для WebSocket и HTTP-серверов.
    Справка: https://pkg.go.dev/github.com/gorilla/websocket#Conn.SetReadLimit
