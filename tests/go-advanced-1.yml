  - id: b
    text: Моки не позволяют выявить ошибки, связанные с особенностями работы реальной базы данных и поведением транзакций
    correct: true
    explanation: Моки имитируют поведение, но не воспроизводят ограничения, deadlock'и, уровень изоляции и диалекты SQL.
  - id: c
