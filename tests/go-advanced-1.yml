  extended_explanation: В архитектуре с одним агрегатором все акторы отправляют данные в одну точку. При увеличении числа отправителей очередь сообщений у агрегатора растёт, что приводит к увеличению задержек. Решение — горизонтальное масштабирование агрегаторов или использование брокеров сообщений.
  recommendation: При росте числа отправителей рассмотреть шардирование агрегаторов или использование очередей.
