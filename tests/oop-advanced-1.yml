- id: q13
  text: Какой набор принципов ООП лежит в основе ситуации, когда разработчик описывает структуру поведения для набора объектов, не задавая его конкретную реализацию, но ожидая, что она будет добавлена в специализированных классах?
  type: single
  options:
  - id: a
    text: Принцип абстракции и полиморфизма, который позволяет создавать интерфейсы для различных типов объектов и их реализаций
    correct: true
    explanation: 'Правильно: абстракция выделяет общее, полиморфизм позволяет подставлять конкретные реализации.'
  - id: b
    text: Принцип множественного наследования и методов, который позволяет классам наследовать методы от нескольких других классов
    correct: false
    explanation: Не о множественном наследовании речь.
  - id: c
    text: Принцип инкапсуляции и статической типизации, где классы могут скрывать свои данные, но все типы должны быть определены заранее
    correct: false
    explanation: Инкапсуляция не об этом.
  - id: d
    text: Принцип единственной ответственности и наследования, где классы имеют только одну задачу и могут расширять функциональность через наследование
    correct: false
    explanation: Не про описание поведения без реализации.
  - id: e
    text: Принцип композиции и делегирования, позволяющий создавать сложные объекты за счет комбинирования простых объектов
    correct: false
    explanation: Это про композицию, не про абстрактное поведение.
  difficulty: medium
  explanation: Абстракция позволяет выделить общий интерфейс, а полиморфизм — работать с разными реализациями через этот интерфейс.
  extended_explanation: |-
    Описанная ситуация — классическое использование:
    - **Абстрактного класса** с абстрактными методами
    - **Интерфейса**, объявляющего методы
    Конкретная реализация добавляется в наследниках.

    ## Что здесь важно по теории
    - Абстракция скрывает детали реализации
    - Полиморфизм позволяет единообразно работать с разными объектами
    - Это основа для многих паттернов (Strategy, Template Method)
  recommendation: |-
    Повторить принципы абстракции и полиморфизма.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Абстракция_(программирование)
    - https://ru.wikipedia.org/wiki/Полиморфизм_(информатика)
- id: q14
  text: Какое из следующих описаний наиболее всесторонне и многогранно отражает сущность объектно-ориентированного программирования (ООП) с учетом его ключевых принципов и подходов?
  type: single
  options:
  - id: a
