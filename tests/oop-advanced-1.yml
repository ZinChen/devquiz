  - id: b
    text: ООП фокусируется на статической типизации и жестком использовании базовых типов данных
    correct: false
    explanation: Не обязательно статическая типизация.
  - id: c
    text: ООП основывается на использовании только процедурных подходов к программированию, что, несмотря на кажущуюся гибкость
    correct: false
    explanation: Неверно, ООП противопоставляется процедурному.
  - id: d
    text: ООП предполагает создание сложных объектов, которые не только объединяют данные и методы, но и обеспечивают реализацию сложных принципов
    correct: true
    explanation: 'Правильно: данные + методы + принципы (инкапсуляция, наследование, полиморфизм).'
  - id: e
    text: ООП включает в себя использование множества механизмов наследования
    correct: false
    explanation: Наследование — только один из принципов.
  difficulty: medium
  explanation: 'ООП — это подход, объединяющий данные и методы в объекты и базирующийся на четырех основных принципах: инкапсуляция, наследование, полиморфизм, абстракция.'
  extended_explanation: |-
    Полное определение ООП включает:
    1. **Объекты** — сущности, объединяющие состояние (данные) и поведение (методы)
    2. **Инкапсуляция** — скрытие внутренней реализации
    3. **Наследование** — создание иерархий "is-a"
    4. **Полиморфизм** — единый интерфейс для разных типов
    5. **Абстракция** — выделение существенных характеристик

    ## Что здесь важно по теории
    - ООП — это не просто синтаксис классов, а методология
    - Разные языки реализуют принципы по-своему
    - Цель ООП — управление сложностью
  recommendation: |-
    Повторить базовые концепции ООП.
