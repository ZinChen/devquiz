- id: q1
  text: Какой из следующих вариантов наиболее полно и точно отражает концепцию наследования в объектно-ориентированном программировании?
  type: single
  options:
  - id: a
    text: Наследование требует от дочерних классов полного дублирования методов и атрибутов родительского класса для достижения согласованности в реализации, что может привести к избыточности кода
    correct: false
    explanation: Неверно. Наследование как раз позволяет избежать дублирования, заимствуя реализацию.
  - id: b
    text: Наследование предполагает возможность передачи только статических методов и атрибутов между классами, исключая динамические аспекты и полиморфизм из данного процесса
    correct: false
    explanation: Неверно. Наследование работает и с динамическими методами, и является основой для полиморфизма.
  - id: c
    text: Наследование предоставляет дочерним классам возможность не только заимствовать и переопределять методы родительского класса, но и расширять функциональность
    correct: true
    explanation: 'Правильно. Это полное определение наследования: заимствование (reuse), переопределение (polymorphism), расширение (extension).'
  - id: d
    text: Наследование позволяет создавать иерархию классов, где дочерние классы могут наследовать методы и свойства родителя, но при этом ограничивает возможность переопределения их поведения, обеспечивая строгую типизацию
    correct: false
    explanation: Неверно. Наследование не ограничивает переопределение (если метод не объявлен как final/sealed).
  - id: e
    text: Наследование подразумевает использование принципов композиции для передачи данных между объектами, что ведет к уменьшению сложности и улучшению читаемости кода, избегая многократного использования одного и того же кода
    correct: false
    explanation: Неверно. Это описание композиции, а не наследования.
  difficulty: medium
  explanation: Наследование позволяет дочерним классам использовать код родителя (заимствование), изменять его поведение (переопределение) и добавлять новый (расширение).
  extended_explanation: |-
    Наследование решает три задачи:
    1. **Заимствование (reuse)** — дочерний класс автоматически получает все не-private члены родителя
    2. **Переопределение (override)** — дочерний класс может изменить поведение унаследованного метода (полиморфизм)
    3. **Расширение (extension)** — дочерний класс может добавлять новые методы и поля

    ## Что здесь важно по теории
    - Наследование создаёт отношение "IS-A" (является)
    - Полиморфизм позволяет работать с объектами разных классов через единый интерфейс
    - Композиция (отношение "HAS-A") часто предпочтительнее наследования
  recommendation: |-
    Повторить основные принципы ООП: наследование, инкапсуляцию, полиморфизм и абстракцию.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Объектно-ориентированное_программирование
    - https://ru.wikipedia.org/wiki/Наследование_(программирование)
- id: q2
  text: В каком из следующих случаев принцип инкапсуляции применяется корректно и эффективно с точки зрения архитектуры объектно-ориентированной системы?
  type: single
  options:
  - id: a
    text: Класс User имеет private поле email и публичный геттер отдает значение по ссылке
    correct: false
    explanation: 'Нарушение: отдача по ссылке позволяет внешнему коду изменить объект в обход сеттера.'
  - id: b
    text: Класс Logger реализует статические методы логирования, доступные из любого места программы без создания экземпляра
    correct: false
    explanation: Это не про инкапсуляцию данных, а про организацию доступа.
  - id: c
    text: В классе Vehicle все поля private, но для каждого из них создан отдельный публичный геттер и сеттер без какой-либо проверки или ограничения
    correct: false
    explanation: Это не инкапсуляция, а просто открытые поля через методы. Нет контроля.
  - id: d
    text: Класс Account предоставляет публичные методы withdraw() и deposit(), а доступ к балансу осуществляется исключительно внутри этих методов, без прямого изменения извне
    correct: true
    explanation: 'Правильно: состояние скрыто, изменение только через методы с бизнес-логикой.'
  - id: e
    text: Класс UserProfile хранит поля email и password как private, а доступ к ним осуществляется через открытые геттеры и сеттеры, которые напрямую возвращают и изменяют значения
    correct: false
    explanation: Нет инкапсуляции поведения, только данных.
  difficulty: medium
  explanation: Инкапсуляция — это не просто private поля, а контроль доступа к ним через методы, которые могут содержать логику.
  extended_explanation: |-
    В классе Account:
    - Баланс скрыт (нет публичного поля или геттера)
    - Изменение баланса только через методы `withdraw` и `deposit`
    - Эти методы могут содержать проверки (достаточно ли средств, неотрицательная сумма и т.д.)

    ## Что здесь важно по теории
    - Инкапсуляция = скрытие данных + контроль доступа
    - Геттеры и сеттеры без логики — это не инкапсуляция, а просто синтаксический сахар
    - Отдача по ссылке нарушает инкапсуляцию
  recommendation: |-
    Повторить суть инкапсуляции: скрытие данных и контроль доступа через методы.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Инкапсуляция_(программирование)
    - https://ru.wikipedia.org/wiki/Модификатор_доступа
- id: q3
  text: Среди приведенных вариантов ответа выберите тот, который наиболее точно отображает смысл работы поведенческих паттернов в ООП.
  type: single
  options:
  - id: a
    text: С помощью поведенческого паттерна возможно создать фиксированную двунаправленную связь между объектами и их методами
    correct: false
    explanation: Слишком узко, не отражает сути.
  - id: b
    text: Поведенческий паттерн создает четкий алгоритм, который становится фиксированным для работы одного класса и его объектов
    correct: false
    explanation: Поведенческие паттерны как раз добавляют гибкость, а не фиксируют алгоритм.
  - id: c
    text: С помощью поведенческих паттернов происходит настройка работы метода класса как алгоритма, а также связывание объекта с методом
    correct: true
    explanation: 'Правильно: поведенческие паттерны управляют алгоритмами и взаимодействием объектов.'
  - id: d
    text: Поведенческие паттерны помогают распределить логику поведения между классами так, чтобы каждый класс был сосредоточен на одной задаче
    correct: false
    explanation: Это больше про принцип единственной ответственности.
  - id: e
    text: Поведенческие паттерны дают возможность настроить работу между объектами одного класса, тем самым обеспечивая связанность
    correct: false
    explanation: Они работают между объектами разных классов и ослабляют связанность.
  difficulty: medium
  explanation: Поведенческие паттерны сосредоточены на алгоритмах и взаимодействии объектов, распределяя обязанности между ними.
  extended_explanation: |-
    Поведенческие паттерны (Chain of Responsibility, Command, Strategy, Observer и др.):
    - Описывают способы связи между объектами
    - Позволяют гибко настраивать алгоритмы
    - Динамически определяют поведение во время выполнения

    ## Что здесь важно по теории
    - Порождающие паттерны — создание объектов
    - Структурные паттерны — композиция объектов
    - Поведенческие паттерны — взаимодействие и распределение обязанностей
  recommendation: |-
    Повторить классификацию паттернов GoF: порождающие, структурные, поведенческие.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Шаблон_проектирования
    - https://refactoring.guru/ru/design-patterns/behavioral-patterns
- id: q4
  text: |-
    Какой из принципов SOLID нарушен в данном коде?

    ```
    1. Класс «Прямоугольник»:
       - инициализация объекта (высота, ширина):
         - объект.высота = высота
         - объект.ширина = ширина
       - задать ширину (ширина):
         - объект.ширина = ширина
       - задать высоту (высота):
         - объект.высота = высота

    2. Класс «Квадрат» («Прямоугольник»):
       - инициализация объекта (размер):
         - объект(прямоугольник).высота = размер
         - объект(прямоугольник).ширина = размер
       - задать ширину (ширина):
         - объект(прямоугольник).высота = ширина
         - объект(прямоугольник).ширина = ширина
    ```
  type: single
  options:
  - id: a
    text: Принцип открытости/закрытости (OCP)
    correct: false
    explanation: Не OCP, код не требует модификации для добавления новых фигур.
  - id: b
    text: Принцип единственной ответственности (SRP)
    correct: false
    explanation: Каждый класс отвечает за одну фигуру.
  - id: c
    text: Принцип разделения интерфейса (ISP)
    correct: false
    explanation: Нет интерфейсов с лишними методами.
  - id: d
    text: Принцип инверсии зависимостей (DIP)
    correct: false
    explanation: Зависимости от конкретных классов, но это не главное нарушение.
  - id: e
    text: Принцип подстановки Барбары Лисков (LSP)
    correct: true
    explanation: Квадрат не может подменять прямоугольник, так как меняет поведение методов.
  difficulty: medium
  explanation: 'Классическое нарушение LSP: наследник (Квадрат) изменяет поведение родителя (Прямоугольник) так, что объекты наследника нельзя использовать вместо объектов родителя.'
  extended_explanation: |-
    Клиентский код, ожидающий Прямоугольник, может:
    - установить ширину = 5, высоту = 10
    - ожидать, что высота останется 10
    Но для Квадрата установка ширины меняет и высоту, нарушая ожидания.

    ## Что здесь важно по теории
    - LSP: функции, использующие базовый тип, должны работать и с его подтипами
    - Наследование должно сохранять поведение (инварианты, предусловия, постусловия)
    - Квадрат не является прямоугольником в контексте изменяемых фигур
  recommendation: |-
    Повторить принцип подстановки Лисков (LSP) и проблему квадрата-прямоугольника.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Принцип_подстановки_Барбары_Лисков
    - https://ru.wikipedia.org/wiki/SOLID_(объектно-ориентированное_программирование)
- id: q5
  text: Какой модификатор доступа следует использовать, чтобы обеспечить доступность полей и методов класса из самого класса, из производного класса и из других классов в той же сборке, но не из других сборок?
  type: single
  options:
  - id: a
    text: Public
    correct: false
    explanation: Доступно отовсюду, включая другие сборки.
  - id: b
    text: Private
    correct: false
    explanation: Только внутри самого класса.
  - id: c
    text: Protected Internal
    correct: true
    explanation: Объединяет protected (доступ наследникам) и internal (доступ в сборке).
  - id: d
    text: Protected
    correct: false
    explanation: Доступно в классе и наследникам, но не другим классам в сборке.
  - id: e
    text: Public Internal
    correct: false
    explanation: Такого модификатора нет в C#.
  difficulty: medium
  explanation: Protected Internal обеспечивает доступ из класса-наследника (protected) и из любого места в текущей сборке (internal).
  extended_explanation: |-
    - **protected**: класс + наследники (даже в другой сборке)
    - **internal**: класс + любое место в той же сборке
    - **protected internal**: объединение этих множеств

    ## Что здесь важно по теории
    - В C# 7.2 появился `private protected` (доступ из наследников в той же сборке)
    - `protected internal` — более широкая видимость, чем каждый по отдельности
  recommendation: |-
    Повторить модификаторы доступа в C#: private, protected, internal, protected internal, private protected, public.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Модификатор_доступа
    - https://learn.microsoft.com/ru-ru/dotnet/csharp/language-reference/keywords/protected-internal
- id: q6
  text: Если несколько интерфейсов, реализованных абстрактным классом, содержат одинаковые методы...
  type: single
  options:
  - id: a
    text: Конфликт возникнет в некоторых языках программирования, где запрещено неявное множественное наследование
    correct: false
    explanation: Интерфейсы не создают конфликта, даже при множественном наследовании.
  - id: b
    text: 'Это не вызывает конфликта: компилятор создаст адаптеры для методов, чтобы избежать конфликта'
    correct: false
    explanation: Компилятор не создает адаптеры, метод реализуется один раз.
  - id: c
    text: 'Это вызовет конфликт: в абстрактном классе возникнет ошибка компиляции из-за конфликта имен методов'
    correct: false
    explanation: Конфликта нет, так как сигнатуры совпадают.
  - id: d
    text: 'Это не вызывает конфликта: абстрактный класс автоматически наследует реализацию метода из первого интерфейса и игнорирует остальные'
    correct: false
    explanation: Интерфейсы не содержат реализации (в классическом понимании).
  - id: e
    text: 'Это не вызывает конфликта: класс предоставляет единственную реализацию этого метода, и она будет удовлетворять обоим интерфейсам'
    correct: true
    explanation: 'Правильно: один метод реализует оба интерфейса.'
  difficulty: medium
  explanation: Если методы в интерфейсах имеют одинаковую сигнатуру, то одна реализация в классе удовлетворяет требованиям всех интерфейсов.
  extended_explanation: |-
    Интерфейсы определяют только контракт (сигнатуру). Если два интерфейса требуют метод `void Print()`, то:
    - Для класса это один и тот же метод
    - Одна реализация `Print()` удовлетворяет обоим интерфейсам

    ## Что здесь важно по теории
    - В Java 8+ и C# 8+ интерфейсы могут иметь default-реализации, но это не меняет правила
    - Конфликт возник бы, если бы методы имели одинаковую сигнатуру, но разные возвращаемые типы (невозможно)
  recommendation: |-
    Повторить реализацию интерфейсов в Java и C#.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Интерфейс_(объектно-ориентированное_программирование)
    - https://ru.wikipedia.org/wiki/Полиморфизм_(информатика)
- id: q7
  text: Вам нужно разработать приложение для интернет-магазина. Класс `Order` содержит методы для добавления товаров и расчёта общей стоимости. Все заказы облагаются налогом по единому правилу. Как следует организовать расчет налога, чтобы соблюсти принципы объектно-ориентированного проектирования?
  type: single
  options:
  - id: a
    text: Создать отдельный класс `TaxCalculator`, который будет принимать объект `Order` и возвращать сумму налога
    correct: true
    explanation: 'Правильно: выделение отдельной ответственности (SRP).'
  - id: b
    text: Добавить метод `calculate_tax()` в классе `Order` как статический, чтобы не требовалось создавать экземпляр
    correct: false
    explanation: Нарушает SRP, привязывает логику налога к заказу.
  - id: c
    text: Вызвать расчёт налога прямо в конструкторе `Order`, чтобы налог рассчитывался при создании объекта
    correct: false
    explanation: Конструктор не должен содержать бизнес-логику.
  - id: d
    text: Сделать метод `calculate_tax()` приватным в классе `Order`, чтобы ограничить его доступ из других компонентов
    correct: false
    explanation: Всё равно оставляет логику внутри Order.
  - id: e
    text: Реализовать метод `calculate_tax()` в каждом конкретном подклассе заказа, даже если логика одинакова
    correct: false
    explanation: Дублирование кода (нарушение DRY).
  difficulty: medium
  explanation: Расчет налога — отдельная ответственность, не связанная напрямую с управлением заказом. Лучше вынести в отдельный класс.
  extended_explanation: |-
    - Класс `Order` отвечает за состав заказа и общую стоимость
    - Класс `TaxCalculator` отвечает за расчет налога
    - При изменении налоговых правил меняется только `TaxCalculator`
    - Легко тестировать и подменять реализации

    ## Что здесь важно по теории
    - SRP: у класса должна быть только одна причина для изменения
    - Выделение стратегий расчета в отдельные классы — паттерн Strategy
    - Композиция предпочтительнее наследования для изменения поведения
  recommendation: |-
    Повторить принцип единственной ответственности (SRP).
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Принцип_единственной_обязанности
    - https://ru.wikipedia.org/wiki/SOLID_(объектно-ориентированное_программирование)
- id: q8
  text: Вы разрабатываете модуль для управления уведомлениями. Уведомления могут отправляться по электронной почте, в SMS или в push-формате. У всех уведомлений должен быть метод отправить(). Некоторые типы уведомлений (например, email) поддерживают вложения. Как следует организовать классы, чтобы соблюсти принципы наследования, масштабируемости и минимальной связанности?
  type: single
  options:
  - id: a
    text: Создать общий интерфейс Notifiable с методом отправить() и дополнительный интерфейс Attachable, который реализует только те классы, где поддерживаются вложения
    correct: true
    explanation: 'Правильно: соблюдает ISP и позволяет расширять.'
  - id: b
    text: Создать класс EmailNotification с полной реализацией и от него унаследовать SmsNotification и PushNotification
    correct: false
    explanation: 'Нарушает семантику: SMS не является Email.'
  - id: c
    text: Реализовать абстрактный класс Notification, включающий методы отправить() и прикрепить_файл(), даже если вложения нужны не для всех форматов
    correct: false
    explanation: 'Нарушает ISP: классы вынуждены реализовывать ненужные методы.'
  - id: d
    text: Сделать интерфейс Notifiable с методами отправить() и прикрепить_файл(), и все классы должны реализовать оба метода
    correct: false
    explanation: Явное нарушение ISP.
  - id: e
    text: Объединить всю логику отправки в один универсальный класс NotificationHandler, переключаясь между типами уведомлений по флагу
    correct: false
    explanation: Нарушает SRP и OCP.
  difficulty: medium
  explanation: Клиенты не должны зависеть от методов, которые они не используют. Email поддерживает вложения, а SMS и Push — нет.
  extended_explanation: |-
    - **Notifiable**: обязательный метод `отправить()` для всех
    - **Attachable**: опциональный метод для тех, кто поддерживает вложения
    - Класс `EmailNotification` реализует оба интерфейса
    - Классы `SmsNotification` и `PushNotification` реализуют только `Notifiable`

    ## Что здесь важно по теории
    - Толстые интерфейсы (fat interfaces) — зло
    - Лучше несколько специализированных интерфейсов, чем один универсальный
    - Композиция интерфейсов дает гибкость
  recommendation: |-
    Повторить принцип разделения интерфейса (ISP).
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Принцип_разделения_интерфейса
    - https://ru.wikipedia.org/wiki/SOLID_(объектно-ориентированное_программирование)
- id: q9
  text: В процессе разработки системы для управления различными типами платежей в интернет-магазине вам нужно реализовать обработку различных форм оплаты. Какой из следующих подходов лучше всего иллюстрирует применение полиморфизма на практике?
  type: single
  options:
  - id: a
    text: Создание интерфейса PaymentMethod, который содержит только методы для получения информации о платеже, но не включает их обработку, не используя полиморфизм для обработки платежей
    correct: false
    explanation: Нет полиморфизма в обработке.
  - id: b
    text: Определение метода processPayment() в классе ShoppingCart, который обрабатывает все типы платежей
    correct: false
    explanation: Нарушение SRP, нет полиморфизма.
  - id: c
    text: Реализация метода processPayment() в каждом классе CreditCardPayment, PayPalPayment и BitcoinPayment, но без общего базового класса
    correct: false
    explanation: Нет общего типа, нельзя работать единообразно.
  - id: d
    text: Использование единственного класса PaymentProcessor, который содержит все методы для обработки различных типов платежей без разделения на конкретные классы
    correct: false
    explanation: Отсутствие полиморфизма, нарушение OCP.
  - id: e
    text: Создание базового класса Payment с абстрактным методом processPayment(), который будет реализован в подклассах, позволяя каждому классу иметь свою реализацию обработки платежа
    correct: true
    explanation: Классический полиморфизм через наследование.
  difficulty: medium
  explanation: Полиморфизм позволяет работать с разными типами объектов через единый интерфейс (базовый класс).
  extended_explanation: |-
    1. Базовый класс `Payment` объявляет абстрактный метод `processPayment()`
    2. Подклассы предоставляют свои реализации
    3. Клиентский код может вызывать `processPayment()` у любого наследника, не зная его типа

    ## Что здесь важно по теории
    - Полиморфизм = один интерфейс, множество реализаций
    - Достигается через наследование и интерфейсы
    - Позволяет писать гибкий, расширяемый код
  recommendation: |-
    Повторить механизмы полиморфизма: переопределение методов, абстрактные классы, интерфейсы.
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Полиморфизм_(информатика)
    - https://ru.wikipedia.org/wiki/Объектно-ориентированное_программирование
- id: q10
  text: Какие факторы могут привести к ухудшению связанности кода в объектно-ориентированном программировании?
  type: single
  options:
  - id: a
    text: Внедрение зависимостей через статические вспомогательные классы, общие для нескольких компонентов
    correct: false
    explanation: Это проблема тестируемости, но не прямой фактор связанности.
  - id: b
    text: Наследование от общего базового класса с последующим переопределением всех методов в каждом подклассе
    correct: false
    explanation: Это не ухудшает связанность, это нормальное использование наследования.
  - id: c
    text: Жесткое связывание классов через непосредственные вызовы методов и обмен данными напрямую
    correct: true
    explanation: Прямые вызовы создают высокую связанность.
  - id: d
    text: Построение системы с минимальным количеством зависимостей между классами для повышения гибкости
    correct: false
    explanation: Это улучшает связанность (делает её слабее).
  - id: e
    text: Применение паттернов проектирования для ослабления зависимости между компонентами
    correct: false
    explanation: Паттерны ослабляют связанность.
  difficulty: medium
  explanation: Жесткое связывание (high coupling) возникает, когда классы знают детали реализации друг друга и напрямую зависят от конкретных классов.
  extended_explanation: |-
    Факторы, ухудшающие связанность:
    - Прямые вызовы конкретных методов
    - Обмен данными напрямую, а не через абстракции
    - Знание внутренней структуры других классов

    ## Что здесь важно по теории
    - Слабая связанность (low coupling) — цель хорошего дизайна
    - Достигается через интерфейсы, абстракции, внедрение зависимостей
    - Сильная связанность усложняет тестирование и модификацию
  recommendation: |-
    Повторить понятия связанности (coupling) и связности (cohesion).
    Русскоязычные ресурсы:
    - https://ru.wikipedia.org/wiki/Зацепление_(программирование)
    - https://ru.wikipedia.org/wiki/SOLID_(объектно-ориентированное_программирование)
- id: q11
  text: Какой из следующих вариантов наиболее точно описывает процесс сериализации объекта в ООП?
  type: single
  options:
  - id: a
    text: Преобразование объекта в массив для удобного хранения в памяти и равномерного распределения памяти между частями объекта
    correct: false
    explanation: Неверно, это не суть сериализации.
  - id: b
    text: Преобразование объекта в числовой код для быстрой обработки в процессоре
    correct: false
    explanation: Неверно.
  - id: c
    text: Преобразование объекта в поток байтов или текстовый формат для последующей передачи или сохранения
    correct: true
    explanation: Правильное определение сериализации.
  - id: d
    text: Преобразование объекта в другой класс для изменения его функциональности с сохранением базовых функций и методов
    correct: false
