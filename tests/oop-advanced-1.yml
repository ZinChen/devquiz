    - https://ru.wikipedia.org/wiki/Объектно-ориентированное_программирование
    - https://ru.wikipedia.org/wiki/Инкапсуляция_(программирование)
- id: q15
  text: Какое из следующих утверждений наиболее точно описывает ключевые особенности объектно-ориентированных баз данных (ООБД) и их преимущества по сравнению с реляционными базами данных?
  type: single
  options:
  - id: a
    text: ООБД поддерживают наследование и полиморфизм, что ограничивает их использование в сложных системах, но делает их более предпочтительными для проектирования гибких приложений
    correct: false
    explanation: 'Противоречие: наследование и полиморфизм не ограничивают использование, а расширяют возможности.'
  - id: b
    text: ООБД позволяют непосредственно хранить сложные объекты и их связи, что улучшает производительность и снижает необходимость в преобразовании данных, однако могут требовать большего объема памяти
    correct: true
    explanation: 'Правильно: объекты хранятся напрямую, минуя ORM-преобразования, но с возможным увеличением объема.'
  - id: c
    text: ООБД предоставляют возможности работы только с определенными языками программирования, что ограничивает выбор разработчиков и может препятствовать интеграции с другими системами
    correct: false
    explanation: 'Не совсем точно: есть стандарты и реализации для разных языков.'
  - id: d
    text: ООБД используют только текстовые форматы для хранения данных, что упрощает взаимодействие с другими типами баз данных и обновляет от проблем совместимости
    correct: false
    explanation: 'Неверно: ООБД могут хранить данные в бинарном виде, не только в текстовом.'
  - id: e
    text: ООБД ориентированы исключительно на хранение простых типов данных и не поддерживают сложные структуры, что делает их менее гибкими для работы с современными приложениями, но более быстрыми
    correct: false
    explanation: 'Неверно: ООБД как раз ориентированы на сложные объекты и структуры.'
  difficulty: medium
  explanation: ООБД хранят объекты напрямую, в том же виде, что и в языке программирования, что устраняет необходимость в преобразовании объектно-реляционного отображения (ORM).
  extended_explanation: |-
    Объектно-ориентированные базы данных (ООБД) имеют следующие ключевые особенности:

    1. **Прямое хранение объектов** — объекты сохраняются в том же виде, в котором существуют в памяти программы, без разбиения на таблицы
    2. **Поддержка ООП-концепций** — наследование, полиморфизм, инкапсуляция на уровне БД
    3. **Навигационный доступ** — возможность переходить по ссылкам между объектами (как в графах)

    **Преимущества перед реляционными БД:**
    - Устранение несоответствия импеданса (impedance mismatch) — не нужно преобразовывать объекты в таблицы и обратно
    - Более высокая производительность для сложных объектов и графовых структур
    - Естественная модель для ООП-приложений

    **Недостатки:**
    - Меньшая стандартизация по сравнению с SQL
    - Отсутствие мощных декларативных языков запросов (как SQL)
    - Потенциально больший объем памяти из-за хранения метаданных

    ## Что здесь важно по теории
    - Реляционные БД хранят данные в таблицах, ООБД — как объекты
    - Для работы с реляционными БД из ООП-языков требуются ORM (Hibernate, Entity Framework)
    - ООБД лучше подходят для сложных доменных моделей с глубокими графами объектов
    - Современные гибридные подходы: объектно-реляционное отображение (PostgreSQL с JSON/JSONB), NoSQL-базы данных (MongoDB)
