  difficulty: medium
  explanation: Сериализация — преобразование объекта в формат для хранения или передачи с возможностью восстановления.
  extended_explanation: |-
    Сериализация нужна для:
    - Сохранения объекта в файл/БД
    - Передачи по сети (в микросервисах, RPC)
    - Кэширования
    Форматы: бинарный, JSON, XML, YAML.

    ## Что здесь важно по теории
    - Обратный процесс — десериализация
    - Не все данные объекта могут сериализоваться (например, открытые файлы, соединения)
    - transient/serialVersionUID в Java, [Serializable] в C#
