- id: q12
  text: Инженер-химик разрабатывает новый катализатор для промышленного процесса. Чтобы оценить его влияние на выход продукта, он проводит эксперимент, в котором измеряет выход продукта до и после внедрения катализатора в 15 идентичных реакторах. Распределение изменений в выходе продукта не является нормальным. При анализе данных с помощью критерия Вилкоксона для парных сравнений инженер обнаруживает, что медиана изменения выхода продукта равна нулю, но p-значение критерия оказывается статистически значимым (p < 0.05). Какое из следующих объяснений наиболее правдоподобно объясняет эту ситуацию в контексте промышленного процесса?
  type: single
  options:
  - id: a
    text: Хотя медиана изменения равна нулю, катализатор, возможно, снизил вариабельность выхода продукта между реакторами, что и обнаружил критерий Вилкоксона
    correct: false
    explanation: Критерий Уилкоксона проверяет не вариабельность, а симметричность распределения разностей.
  - id: b
    text: Критерий Вилкоксона неприменим, так как медиана изменения равна нулю, следовательно, катализатор не оказывает влияния
    correct: false
    explanation: Медиана может быть нулевой, но разности могут быть асимметричны по величине.
  - id: c
    text: Исследователь допустил ошибку при расчете p-значения; при нулевой медиане p-значение должно быть близким к 1
    correct: false
    explanation: Нулевая медиана не гарантирует p≈1.
  - id: d
    text: Статистическая значимость обусловлена большим размером выборки; даже незначительное влияние катализатора может быть обнаружено с достаточным количеством реакторов
    correct: false
    explanation: Размер выборки мал (n=15), и медиана равна нулю.
  - id: e
    text: Результаты указывают на то, что катализатор увеличивает выход продукта в одних реакторах и уменьшает в других, при этом эффекты сбалансированы, что и приводит к нулевой медиане
    correct: true
    explanation: Уилкоксон учитывает не только знак, но и величину разностей, поэтому асимметрия может дать значимость при нулевой медиане.
  difficulty: medium
  explanation: Критерий Уилкоксона может показать значимость, если положительные разности по модулю больше отрицательных, даже при нулевой медиане.
  extended_explanation: |-
    Медиана разностей равна нулю, если количество положительных и отрицательных разностей одинаково.
    Но если положительные разности систематически больше по величине, критерий Уилкоксона обнаружит значимое смещение.
  recommendation: |-
    Повторить, что критерий Уилкоксона основан на рангах абсолютных разностей и их знаках, а не только на медиане.
    Справка: https://ru.wikipedia.org/wiki/Критерий_Уилкоксона
- id: q13
  text: |-
    Что вернёт запрос?

    ```
    select region, count(*)
    from clients
    group by region
    having count(*) > 10
    ```
  type: single
  options:
  - id: a
    text: Только регионы с более чем 10 клиентами
    correct: true
    explanation: HAVING фильтрует группы по условию count(*) > 10.
  - id: b
    text: Только регионы с NULL
    correct: false
    explanation: Условие не связано с NULL.
  - id: c
    text: Только 10 первых клиентов
    correct: false
    explanation: Нет LIMIT и ORDER BY.
  - id: d
    text: Все регионы без фильтрации
    correct: false
    explanation: HAVING применяется.
  - id: e
    text: Ошибка из-за HAVING
    correct: false
    explanation: Синтаксис корректен.
  difficulty: medium
  explanation: HAVING применяется после GROUP BY и фильтрует группы.
  extended_explanation: Запрос группирует клиентов по регионам, затем оставляет только те регионы, где количество клиентов больше 10.
  recommendation: |-
    Повторить разницу между WHERE и HAVING.
    Справка: https://postgrespro.ru/docs/postgresql/current/queries-table-expressions.html#QUERIES-GROUP
- id: q14
  text: |-
    В чем потенциальная проблема этого запроса?

    ```
    select count(*)
    from orders o
    join order_items i on o.id = i.order_id
    ```
  type: single
  options:
  - id: a
    text: JOIN не нужен при подсчёте заказов
    correct: false
    explanation: JOIN может быть нужен для связи, но не для простого подсчёта.
  - id: b
    text: COUNT(*) требует DISTINCT по умолчанию
    correct: false
    explanation: COUNT(*) считает все строки.
  - id: c
    text: Таблицы нужно объединить через подзапрос
    correct: false
    explanation: JOIN допустим.
  - id: d
    text: COUNT(*) может посчитать дубликаты
    correct: true
    explanation: Один заказ с несколькими позициями даст несколько строк в результате JOIN.
  - id: e
    text: Нельзя использовать JOIN без LIMIT
    correct: false
    explanation: LIMIT не обязателен.
  difficulty: medium
  explanation: При JOIN один заказ может иметь несколько позиций, поэтому количество строк в результате больше количества заказов.
  extended_explanation: Для подсчёта уникальных заказов нужно использовать COUNT(DISTINCT o.id), если таблица order_items содержит несколько записей на заказ.
  recommendation: |-
    Повторить влияние JOIN на кардинальность результата.
    Справка: https://postgrespro.ru/docs/postgresql/current/tutorial-join.html
- id: q15
  text: Когда BRIN-индекс предпочтительнее B-Tree, несмотря на его меньшую точность?
  type: single
  options:
  - id: a
    text: Когда выполняется поиск по точным строковым значениям
    correct: false
    explanation: B-Tree лучше подходит.
  - id: b
    text: Когда таблица содержит большие объёмы данных, отсортированных по индексу
    correct: true
    explanation: BRIN эффективен для больших таблиц с естественным порядком (например, временные ряды).
  - id: c
    text: Когда индекс используется для join'ов
    correct: false
    explanation: Для join'ов точнее B-Tree.
  - id: d
    text: Когда данные хранятся в jsonb
    correct: false
    explanation: Для jsonb нужен GIN.
  - id: e
    text: Когда нужно обеспечить уникальность значений
    correct: false
    explanation: Уникальность обеспечивает B-Tree.
  difficulty: medium
  explanation: BRIN (Block Range Index) эффективен для очень больших таблиц с данными, имеющими физический порядок.
  extended_explanation: |-
    BRIN занимает мало места и быстро отсекает большие диапазоны блоков, но допускает ложные срабатывания.
    Используется для архивных данных, логов, временных рядов.
  recommendation: |-
    Повторить типы индексов PostgreSQL: B-tree, BRIN, GIN, GiST.
    Справка: https://postgrespro.ru/docs/postgresql/current/brin.html
