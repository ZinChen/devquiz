  options:
  - id: a
    text: Уменьшится на 1.3%
    correct: true
    explanation: Суммарное изменение -0.013, что соответствует -1.3%.
  - id: b
    text: Увеличится на 0.05%
    correct: false
    explanation: Неверный расчёт.
  - id: c
    text: Увеличится на 2.2%
    correct: false
    explanation: Слишком большое положительное изменение.
  - id: d
    text: Уменьшится на 2.2%
    correct: false
    explanation: Слишком большое отрицательное изменение.
  - id: e
    text: Уменьшится на 0.35%
    correct: false
    explanation: Не соответствует сумме вкладов.
  difficulty: medium
  explanation: Изменение Y равно сумме произведений коэффициентов на относительные изменения факторов.
  extended_explanation: |-
    Коэффициенты показывают, на сколько единиц изменится Y при изменении X на единицу.
    При процентных изменениях умножаем коэффициент на относительное изменение (в долях).
  recommendation: |-
