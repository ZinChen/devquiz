- id: q9
  text: Менеджер по маркетингу хочет оценить эффективность новой рекламной кампании. До начала кампании средний объем продаж продукта составлял 1000 единиц в месяц. После проведения кампании в течение 3 месяцев, менеджер собрал данные об объемах продаж за эти месяцы и хочет определить, оказала ли кампания статистически значимое влияние на продажи. Какие нулевую и альтернативную гипотезы следует сформулировать для проверки, оказала ли рекламная кампания влияние на объемы продаж?
  type: single
  options:
  - id: a
    text: 'Нулевая гипотеза: новая рекламная кампания не оказала влияния на средний объем продаж продукта. Альтернативная гипотеза: новая рекламная кампания оказала влияние на средний объем продаж продукта'
    correct: true
    explanation: 'Корректная двусторонняя формулировка: проверяется наличие любого влияния (увеличения или уменьшения).'
  - id: b
    text: 'Нулевая гипотеза: новая рекламная кампания привела к увеличению продаж продукта. Альтернативная гипотеза: новая рекламная кампания не привела к увеличению продаж продукта'
    correct: false
    explanation: Нулевая гипотеза обычно формулируется как отсутствие эффекта, а не его наличие.
  - id: c
    text: 'Нулевая гипотеза: средний объем продаж продукта после рекламной кампании равен нулю. Альтернативная гипотеза: средний объем продаж продукта после рекламной кампаний больше нуля'
    correct: false
    explanation: Сравнение с нулём не имеет смысла, так как продажи не могут быть нулевыми в среднем.
  - id: d
    text: 'Нулевая гипотеза: средний объем продаж продукта до рекламной кампании равен среднему объему продаж продукта после рекламной кампании. Альтернативная гипотеза: средний объем продаж продукта до рекламной кампании меньше среднего объема продаж продукта после рекламной кампании'
    correct: false
    explanation: Это односторонняя проверка только на увеличение, тогда как вопрос требует проверки наличия любого влияния.
  - id: e
    text: 'Нулевая гипотеза: средний объем продаж продукта после рекламной кампании равен 1000 единицам. Альтернативная гипотеза: средний объем продаж продукта после рекламной кампании меньше 1000 единиц'
    correct: false
    explanation: Альтернатива направлена только на уменьшение, что не соответствует цели.
  difficulty: medium
  explanation: Нулевая гипотеза утверждает отсутствие эффекта (средний объём продаж не изменился). Альтернативная гипотеза утверждает наличие любого изменения (увеличения или уменьшения).
  extended_explanation: |-
    В задаче проверяется влияние рекламной кампании на продажи без предположения о направлении эффекта.
    Поэтому:
    - H₀: μ = 1000 (или μ_after = μ_before) — кампания не изменила средний объём продаж.
    - H₁: μ ≠ 1000 — кампания повлияла на средний объём продаж.
    Это двусторонняя проверка гипотезы. Использование односторонней альтернативы (только увеличение или только уменьшение) было бы уместно лишь в случае, если ожидается строго определённый эффект.
    В данном случае проверяется эффективность кампании, поэтому ожидается увеличение продаж.
    Правильная формулировка: H₀: μ_after = 1000 (или μ_before = μ_after), H₁: μ_after > 1000.
  recommendation: |-
    Повторить формулировку гипотез: нулевая гипотеза (H₀) всегда формулируется как отсутствие эффекта, разницы или влияния.
    Альтернативная гипотеза (H₁) может быть двусторонней (наличие любого влияния) или односторонней (направленное влияние).
    В данном случае, поскольку заранее неизвестно, приведёт ли кампания к росту или падению продаж, корректно использовать двустороннюю альтернативу.
    Справка: https://ru.wikipedia.org/wiki/Статистическая_гипотеза
- id: q10
  text: |-
