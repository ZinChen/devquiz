  text: |-
    Наблюдение за районом осуществляется тремя радиолокационными станциями (РЛС). В район наблюдений попал объект, который обнаруживается любой радиолокационной станцией с вероятностью 0,2. Найти вероятность того, что их будет не менее двух с помощью биномиального закона распределения.

    ```
    n = 3, p = 0.2, q = 0.8
    P(X=2) = C₃²·0.2²·0.8 = 3·0.04·0.8 = 0.096
    P(X=3) = 0.2³ = 0.008
    P(X≥2) = 0.096 + 0.008 = 0.104
    ```
  type: single
  options:
