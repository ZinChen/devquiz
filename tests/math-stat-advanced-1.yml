    ```
    Часы обучения: 2,3,4,5,6
    Производительность: 20,25,30,35,40
    y = 10 + 5x → r = 1
    ```
  type: single
  options:
  - id: a
    text: '0.75'
    correct: false
    explanation: Меньше 1.
  - id: b
    text: '1'
    correct: true
    explanation: Идеальная линейная зависимость с положительным наклоном.
  - id: c
    text: '0.5'
    correct: false
    explanation: Слишком мало.
  - id: d
    text: '0.85'
    correct: false
    explanation: Не соответствует идеальной зависимости.
  - id: e
    text: '0.95'
    correct: false
    explanation: Близко, но не точно 1.
  difficulty: medium
  explanation: Данные лежат строго на прямой линии y = 10 + 5x, поэтому r = 1.
  extended_explanation: |-
    Коэффициент корреляции Пирсона равен ±1, если точки лежат на прямой с ненулевым наклоном.
    Здесь зависимость линейная и возрастающая, значит r=1.
  recommendation: |-
    Повторить определение коэффициента корреляции Пирсона и его свойства.
