    text: '0.088'
    correct: false
    explanation: Меньше правильного значения.
  - id: b
    text: '0.008'
    correct: false
    explanation: Это только P(X=3).
  - id: c
    text: '0.104'
    correct: true
    explanation: Сумма вероятностей 2 и 3 обнаружений.
  - id: d
    text: '0.384'
    correct: false
