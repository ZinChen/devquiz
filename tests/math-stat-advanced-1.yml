- id: q7
  text: |-
    Для определения процента вкладов, не превышающих 100000 руб., произведена повторная выборка 900 лицевых счетов. Среди них оказалось 30% вкладов не более 100000 каждый. С какой доверительной вероятностью можно утверждать, что процент таких вкладов в данной кассе будет отличаться от найденного не более чем на 2%?

    ```
    n = 900, w = 0.3, Δ = 0.02
    σ_w = √(w(1-w)/n) = √(0.21/900) ≈ 0.015275
    z = Δ / σ_w ≈ 1.309
    P = 2Φ(z) - 1 ≈ 2·0.9049 - 1 = 0.8098
    ```
  type: single
  options:
  - id: a
    text: '0.8098'
    correct: true
    explanation: Соответствует z ≈ 1.309.
  - id: b
    text: '0.7653'
    correct: false
    explanation: Меньше правильной вероятности.
  - id: c
    text: '0.4049'
    correct: false
    explanation: Слишком мало.
  - id: d
    text: '0.1902'
    correct: false
    explanation: Не соответствует расчёту.
  - id: e
    text: '0.5951'
    correct: false
    explanation: Другая вероятность.
  difficulty: medium
  explanation: Предельная ошибка Δ = z·σ_w, отсюда находим z, а затем доверительную вероятность.
  extended_explanation: |-
    Доверительная вероятность для доли при повторной выборке определяется через стандартное отклонение выборочной доли.
    Для z=1.309 вероятность составляет 0.8098.
  recommendation: |-
    Повторить расчёт доверительной вероятности через предельную ошибку для доли.
    Справка: https://ru.wikipedia.org/wiki/Доверительный_интервал
