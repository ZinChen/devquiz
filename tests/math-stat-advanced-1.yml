- id: q1
  text: |-
    В проекте разработки программного обеспечения среднее время завершения задачи составляет 20 дней с дисперсией 25 дней. Какова вероятность (в целых процентах) того, что задача будет завершена за менее чем 15 дней?

    ```
    μ = 20, σ² = 25 → σ = 5
    z = (15 - 20)/5 = -1
    P(T < 15) = Φ(-1) ≈ 0.1587 → 16%
    ```
  type: single
  options:
  - id: a
    text: 16%
    correct: true
    explanation: Φ(-1) ≈ 0.1587, что соответствует 16% при округлении до целых процентов.
  - id: b
    text: 24%
    correct: false
    explanation: Это значение соответствует другой вероятности.
  - id: c
    text: 5%
    correct: false
    explanation: Слишком мало для z = -1.
  - id: d
    text: 9%
    correct: false
    explanation: Не соответствует вычисленному значению.
  - id: e
    text: 30%
    correct: false
    explanation: Это значение больше, чем 16%.
  difficulty: medium
  explanation: Сначала находим z-оценку, затем по таблице нормального распределения определяем вероятность.
  extended_explanation: |-
    Вероятность того, что нормальная случайная величина меньше заданного значения, вычисляется через функцию распределения Φ.
    Для z = -1 значение Φ(-1) = 1 - Φ(1) ≈ 0.1587, что при переводе в проценты даёт 15.87% и округляется до 16%.
  recommendation: |-
    Повторить стандартизацию нормальной случайной величины и использование таблиц нормального распределения.
    Справка: https://ru.wikipedia.org/wiki/Нормальное_распределение
- id: q2
  text: |-
    Доход населения в условной стране X моделируется логнормальным распределением с параметрами μ = 2 и σ = 0.5 (в логарифмическом масштабе). Чему примерно равно математическое ожидание дохода в исходной шкале?

    ```
    E[X] = e^{μ + σ²/2} = e^{2 + (0.5)²/2} = e^{2 + 0.125} = e^{2.125}
    ```
  type: single
  options:
  - id: a
    text: 2 + 0.5
    correct: false
    explanation: Это просто сумма, не связанная с формулой матожидания логнормального распределения.
  - id: b
    text: e^2
    correct: false
    explanation: Не учитывает σ²/2.
  - id: c
    text: e^2 + 0.5/2
    correct: false
    explanation: Неправильная запись; отсутствует экспонента от суммы.
  - id: d
    text: e^{½ ln 2}
    correct: false
    explanation: Это √2, не соответствует формуле.
  - id: e
    text: e^{2·0.5}
    correct: false
    explanation: Это e^1, неверно.
  difficulty: medium
  explanation: Матожидание логнормальной величины X = e^Y, где Y ~ N(μ, σ²), равно e^{μ + σ²/2}.
  extended_explanation: |-
    Для логнормального распределения важно помнить, что параметры относятся к логарифму случайной величины.
    Математическое ожидание в исходной шкале всегда больше, чем exp(μ), из-за добавки σ²/2.
  recommendation: |-
    Повторить формулу матожидания для логнормального распределения: E[X] = exp(μ + σ²/2).
    Справка: https://ru.wikipedia.org/wiki/Логарифмически_нормальное_распределение
- id: q3
  text: |-
    На производственном предприятии необходимо оценить уровень дефектов в партии продукции. Известно, что партия состоит из 10,000 изделий. Какой размер выборки (с округлением до целого) будет наиболее оптимальным для достижения 95% уровня доверия и 5% допустимой ошибки?

    ```
    n₀ = (z²·p(1-p))/e² = (1.96²·0.25)/0.0025 ≈ 384.16
    n = n₀ / (1 + (n₀-1)/N) ≈ 384.16 / (1 + 383.16/10000) ≈ 370
    ```
  type: single
  options:
  - id: a
    text: '435'
    correct: false
    explanation: Превышает оптимальный объём с поправкой на популяцию.
  - id: b
    text: '620'
    correct: false
    explanation: Слишком велик для данной точности.
  - id: c
    text: '290'
    correct: false
    explanation: Меньше необходимого для 95% доверия и 5% ошибки.
  - id: d
    text: '230'
    correct: false
    explanation: Недостаточен для заданной точности.
  - id: e
    text: '370'
    correct: true
    explanation: Получено по формуле с поправкой на конечную популяцию.
  difficulty: medium
  explanation: Сначала рассчитывается объём для бесконечной популяции, затем применяется поправка для N=10000.
  extended_explanation: |-
    При оценке доли максимальная вариация достигается при p=0.5, что даёт наибольший необходимый объём выборки.
    Формула с поправкой на конечную популяцию (n = n₀/(1+(n₀-1)/N)) используется, когда выборка составляет значительную долю от популяции.
  recommendation: |-
