name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rubocop:
    name: Rubocop
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - name: Run Rubocop
        run: bundle exec rubocop --format github

  rspec:
    name: RSpec (models, services, requests)
    needs: rubocop
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devquiz_test
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/devquiz_test

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Load DB schema
        run: bundle exec rails db:schema:load

      - name: Run RSpec (unit + requests)
        run: bundle exec rspec spec/models spec/services spec/requests

  e2e:
    name: E2E (system tests)
    needs: rubocop
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devquiz_test
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/devquiz_test

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq && sudo apt-get install -y google-chrome-stable

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Load DB schema
        run: bundle exec rails db:schema:load

      - name: Run system specs
        run: bundle exec rspec spec/system

  deploy:
    name: Deploy to Render
    needs: [rspec, e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: curl -fsSX POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
