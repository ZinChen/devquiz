name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Быстрые unit/request тесты — без браузера
  rspec:
    name: RSpec (models, services, requests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devquiz_test
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/devquiz_test

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Load DB schema
        run: bundle exec rails db:schema:load

      - name: Run RSpec (unit + requests)
        run: bundle exec rspec spec/models spec/services spec/requests

  # E2E тесты — с headless Chrome и сборкой фронта
  e2e:
    name: E2E (system tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devquiz_test
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost/devquiz_test

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: app
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Load DB schema
        run: bundle exec rails db:schema:load

      - name: Run system specs
        run: bundle exec rspec spec/system
