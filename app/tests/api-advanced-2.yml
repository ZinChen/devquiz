slug: api-advanced-2
title: "API — безопасность и архитектура"
description: "Продвинутые вопросы по безопасности API: SOAP, OAuth 2.0, JWT, ETag, GraphQL, кэширование, DDoS."
tags: [api, security, hh]
difficulty: advanced
estimated_time: 20

questions:
  - id: q1
    text: "Какие особенности SOAP делают его предпочтительным в сценариях, где требуется строгое соблюдение стандартов безопасности и целостности данных?"
    type: single
    options:
      - id: a
        text: "REST лучше справляется с передачей больших объемов данных, чем SOAP, который не требует строгой схемы данных"
        correct: false
      - id: b
        text: "SOAP требует меньших затрат на реализацию, что делает его предпочтительным для систем банка"
        correct: false
      - id: c
        text: "SOAP обеспечивает встроенную поддержку для WS-Security, что делает его идеальным для банковских приложений"
        correct: true
      - id: d
        text: "REST поддерживает более сложные схемы аутентификации, что делает его более безопасным, чем SOAP"
        correct: false
      - id: e
        text: "SOAP использует текстовый формат JSON, что облегчает его внедрение в мобильные приложения"
        correct: false
    explanation: "SOAP со встроенной поддержкой WS-Security обеспечивает шифрование, цифровую подпись и безопасность на уровне протокола."
    extended_explanation: |
      WS-Security — это стандарт, который обеспечивает:
      - Шифрование сообщений
      - Цифровую подпись
      - Безопасность на уровне протокола, а не приложения

      В банковских системах и других сценариях со строгими требованиями к безопасности это ключевое преимущество.

      ## Что здесь важно по теории
      - SOAP — протокол, REST — архитектурный стиль
      - WS-Security встроен в спецификацию SOAP
      - REST требует реализации безопасности отдельно (JWT, OAuth2, HTTPS)
    recommendation: |
      Повторить различия между SOAP и REST, особенно встроенные механизмы безопасности SOAP (WS-Security).
      Справка: https://www.w3.org/TR/soap12/

  - id: q2
    text: "Вы документируете RESTful API с помощью Swagger и хотите проверить, как ваше приложение взаимодействует с различными эндпоинтами API. Документация должна включать интерактивное тестирование всех эндпоинтов. Вы хотите предоставить разработчикам возможность тестировать API без использования сторонних инструментов, таких как Postman. Какую последовательность действий следует выполнить в Swagger, чтобы предоставить интерактивную документацию с возможностью тестирования эндпоинтов?"
    type: single
    options:
      - id: a
        text: "Создать коллекцию запросов в Postman и экспортировать их для тестирования"
        correct: false
      - id: b
        text: "Добавить примеры запросов вручную в виде текстового описания к каждому эндпоинту"
        correct: false
      - id: c
        text: "Использовать вкладку 'Authorization' в Swagger для генерации токенов доступа к API"
        correct: false
      - id: d
        text: "Настроить Mock-server для тестирования всех эндпоинтов API"
        correct: false
      - id: e
        text: "Настроить спецификацию OpenAPI и включить Swagger UI для автоматического отображения эндпоинтов и их тестирования"
        correct: true
    explanation: "Swagger UI на основе спецификации OpenAPI автоматически создает интерактивную документацию с возможностью тестирования эндпоинтов."
    extended_explanation: |
      Swagger UI:
      - Читает спецификацию OpenAPI (YAML/JSON)
      - Генерирует HTML-документацию с кнопкой "Try it out"
      - Позволяет отправлять реальные запросы прямо из браузера

      ## Что здесь важно по теории
      - OpenAPI — спецификация описания REST API
      - Swagger UI — инструмент визуализации и тестирования
      - Не требует Postman или других внешних инструментов
    recommendation: |
      Повторить возможности Swagger UI и формата OpenAPI для интерактивной документации.
      Справка: https://swagger.io/docs/specification/about/

  - id: q3
    text: "При разработке защищенного API вы рассматриваете использование Basic Authentication или OAuth 2.0. Какое ключевое преимущество OAuth 2.0 будет для вас самым значимым по сравнению с Basic Authentication в контексте безопасности и управления доступом?"
    type: single
    options:
      - id: a
        text: "Предоставляет ограниченный доступ к ресурсам через токены без передачи пароля пользователя"
        correct: true
      - id: b
        text: "Использует сессионные токены вместо постоянной передачи учётных данных"
        correct: false
      - id: c
        text: "Упрощает настройку без необходимости дополнительных серверных модулей контроля доступа"
        correct: false
      - id: d
        text: "Автоматически обновляет токены при истечении их срока действия"
        correct: false
      - id: e
        text: "Облегчает внедрение многофакторной аутентификации"
        correct: false
    explanation: "OAuth 2.0 позволяет приложениям получать доступ к ресурсам от имени пользователя без передачи пароля, используя токены с ограниченными правами."
    extended_explanation: |
      Basic Authentication:
      - Передаёт пароль с каждым запросом
      - Высокий риск перехвата учётных данных

      OAuth 2.0:
      - Использует токены доступа с ограниченными правами (scopes)
      - Пароль передаётся только один раз при получении токена
      - Токены можно отозвать без смены пароля
    recommendation: |
      Повторить принципы OAuth 2.0, особенно концепцию токенов с ограниченными правами (scopes).
      Справка: https://oauth.net/2/

  - id: q4
    text: "Вы создаете мобильное приложение, которое должно обращаться к вашему API от имени пользователя. Требуется обеспечить безопасный доступ и возможность отозвать доступ в любое время. Какова связь с фактором безопасности и управления доступом при выборе метода аутентификации для такой функциональности?"
    type: single
    options:
      - id: a
        text: "OAuth 2.0 позволяет предоставлять ограниченный доступ к ресурсам без передачи учетных данных пользователя"
        correct: true
      - id: b
        text: "Basic Authentication обеспечивает простой механизм передачи учетных данных, упрощая настройку доступа"
        correct: false
      - id: c
        text: "OpenID Connect фокусируется на аутентификации пользователей, обеспечивая безопасный вход и управление сессиями"
        correct: false
      - id: d
        text: "API ключи предоставляют централизованный контроль над доступом и позволяют легко отозвать права"
        correct: false
      - id: e
        text: "JWT позволяет использовать долгосрочные токены для постоянного доступа без необходимости обновления"
        correct: false
    explanation: "OAuth 2.0 позволяет мобильному приложению получить токен с ограниченными правами, который можно отозвать без изменения пароля пользователя."
    extended_explanation: |
      Для мобильного приложения критически важно:
      1. Не хранить пароль пользователя на устройстве
      2. Иметь возможность отозвать доступ при компрометации
      3. Использовать токены с минимальными необходимыми правами

      OAuth 2.0 решает все эти задачи через токены доступа и refresh-токены.
    recommendation: |
      Повторить сценарии использования OAuth 2.0 для мобильных приложений и механизмы отзыва токенов.
      Справка: https://datatracker.ietf.org/doc/html/rfc6749

  - id: q5
    text: "Ваш API обрабатывает запросы на обновление ресурса. Клиент отправляет запрос с некорректным синтаксисом в теле (например, отсутствует обязательное поле) и идентификатором ресурса, которого нет в системе. Сервер должен выбрать приоритетную ошибку, чтобы корректно уведомить клиента о причине отказа. Почему в этой ситуации сервер должен использовать код 400 для обработки ошибки?"
    type: single
    options:
      - id: a
        text: "Сначала необходимо исправить синтаксис запроса, прежде чем сервер сможет проверить существование указанного ресурса"
        correct: true
      - id: b
        text: "Синтаксическая ошибка в теле запроса делает невозможным дальнейшую обработку, включая проверку существования ресурса"
        correct: false
      - id: c
        text: "Обработка данных в запросе предшествует проверке существования ресурса, делая эту ошибку первоочередной"
        correct: false
      - id: d
        text: "Синтаксическая ошибка нарушает структуру запроса, что делает проверку ресурса нерелевантной"
        correct: false
      - id: e
        text: "Код указывает клиенту на проблему с самим запросом, требующую исправления перед дальнейшей обработкой"
        correct: false
    explanation: "Валидация синтаксиса запроса выполняется до проверки существования ресурса, поэтому приоритет имеет 400 Bad Request."
    extended_explanation: |
      Порядок обработки запроса:
      1. Проверка синтаксиса (наличие обязательных полей, корректность формата)
      2. Аутентификация/авторизация
      3. Проверка существования ресурса (если требуется)
      4. Выполнение операции

      Если запрос синтаксически некорректен, сервер не может перейти к шагу 3.
    recommendation: |
      Повторить семантику HTTP статусов и порядок валидации запросов.
      Справка: https://developer.mozilla.org/ru/docs/Web/HTTP/Status/400

  - id: q6
    text: "Ваша микросервисная система обрабатывает заказы в режиме реального времени. Разные узлы могут одновременно обновлять одни и те же заказы. При этом клиенты порой дублируют запросы PUT или PATCH, пытаясь гарантированно применить изменения, а также повторяют запросы после таймаутов. Вам нужно обеспечить идентичность и избежать «гонок», из-за которых один узел может перезаписать изменения другого, нарушая согласованность данных. Какой подход к CRUD-операциям позволит эффективно поддерживать идентичность и управление конкурентными обновлениями в распределенной среде?"
    type: single
    options:
      - id: a
        text: "Отключить частичное обновление (PATCH) и всегда создавать новые ресурсы при изменении, избегая одновременных операций над одним заказом"
        correct: false
      - id: b
        text: "Применять PUT с условными заголовками, чтобы при конфликте версий сервер отклонял повторные запросы или запросы с устаревшими данными"
        correct: true
      - id: c
        text: "Хранить все изменения в очереди и выполнять их последовательно на одном узле, исключая параллельную обработку"
        correct: false
      - id: d
        text: "Разрешать клиентам отправлять дубликаты запросов POST для актуализации информации, полагаясь на уникальный ключ в теле запроса"
        correct: false
      - id: e
        text: "Использовать простые PUT-запросы без версии ресурса, позволяя любому узлу перезаписывать поля независимо от текущего состояния"
        correct: false
    explanation: "Условные заголовки (If-Match с ETag) позволяют серверу отклонять обновления, если ресурс был изменен с момента последнего чтения клиентом."
    extended_explanation: |
      Оптимистичная блокировка:
      - Клиент получает ресурс с ETag
      - При обновлении отправляет If-Match: <ETag>
      - Если ресурс изменился, сервер возвращает 412 Precondition Failed
      - Клиент разрешает конфликт (повторно получает и применяет изменения)

      Это стандартный подход для REST API.
    recommendation: |
      Повторить механизмы оптимистичной блокировки (optimistic locking) в HTTP: If-Match, ETag.
      Справка: https://developer.mozilla.org/ru/docs/Web/HTTP/Headers/If-Match

  - id: q7
    text: "Некоторые пользователи вашего API получают некорректные или устаревшие данные при запросах методом GET. Требуется выявить закономерности, которые приводят к этой проблеме, и определить возможные причины получения неверных данных. Что может вызывать в GET во время настройки сервера возвращение устаревших данных?"
    type: single
    options:
      - id: a
        text: "Применение метода GET только для авторизованных пользователей"
        correct: false
      - id: b
        text: "Превышение лимита запросов, блокирующее обновления данных"
        correct: false
      - id: c
        text: "Использование уникального URI для каждого GET-запроса"
        correct: false
      - id: d
        text: "Ошибка при отправке заголовка Content-Type"
        correct: false
      - id: e
        text: "Кэширование ответов, которое не обновляется при изменении данных"
        correct: true
    explanation: "Некорректная настройка кэширования (отсутствие инвалидации) приводит к тому, что клиенты получают устаревшие версии ресурсов."
    extended_explanation: |
      Проблемы кэширования:
      - Отсутствие Cache-Control с указанием max-age
      - Отсутствие ETag для проверки актуальности
      - Кэширование на промежуточных прокси без механизмов инвалидации

      Решение: использовать ETag, Last-Modified, Cache-Control: no-cache для чувствительных данных.
    recommendation: |
      Повторить механизмы кэширования в HTTP: Cache-Control, ETag, Last-Modified.
      Справка: https://developer.mozilla.org/ru/docs/Web/HTTP/Caching

  - id: q8
    text: "Ваш API позволяет удалять заказы клиентов. При удалении заказа дочерние данные (например, связанные товары) не удаляются, что нарушает целостность базы данных. Вам нужно устранить эту проблему. Какой подход вы выберете для сохранения целостности данных при удалении зависимых ресурсов?"
    type: single
    options:
      - id: a
        text: "Переключиться на пометку заказов как удаленных, без их физического удаления"
        correct: false
      - id: b
        text: "Переключить метод DELETE на PATCH, чтобы обновлять статус записей"
        correct: false
      - id: c
        text: "Установить для дочерних записей статус 'без родителя'"
        correct: false
      - id: d
        text: "Реализовать проверку зависимых данных перед удалением"
        correct: false
      - id: e
        text: "Настроить каскадное удаление для связанных ресурсов"
        correct: true
    explanation: "Каскадное удаление (ON DELETE CASCADE) автоматически удаляет дочерние записи при удалении родительской, сохраняя ссылочную целостность."
    extended_explanation: |
      Проблема: при удалении заказа остаются связанные товары → нарушение целостности.

      Решение: каскадное удаление
      ```sql
      ALTER TABLE order_items
      ADD CONSTRAINT fk_order
      FOREIGN KEY (order_id)
      REFERENCES orders(id)
      ON DELETE CASCADE;
      ```

      Альтернативы:
      - ON DELETE SET NULL (если дочерние записи могут существовать без родителя)
      - ON DELETE RESTRICT (блокирует удаление)
    recommendation: |
      Повторить концепции ссылочной целостности и каскадных операций в реляционных базах данных.
      Справка: https://www.postgresql.org/docs/current/ddl-constraints.html#DDL-CONSTRAINTS-FK

  - id: q9
    text: "Ваш API должен поддерживать массовую рассылку уведомлений в реальном времени для десятков тысяч клиентов. Использование прямых WebSocket-соединений вызывает чрезмерную нагрузку на сервер. Вам нужно выбрать правильное решение, которое решает проблему масштабирования и обеспечивает высокую доступность."
    type: single
    options:
      - id: a
        text: "Разделить сервер на несколько экземпляров и использовать балансировщик нагрузки"
        correct: false
      - id: b
        text: "Применить шардирование клиентов на основе их идентификаторов"
        correct: false
      - id: c
        text: "Использовать брокеры сообщений, такие как RabbitMQ или Kafka, для управления уведомлениями"
        correct: true
      - id: d
        text: "Переключиться на SSE, чтобы уменьшить нагрузку от двусторонних соединений"
        correct: false
      - id: e
        text: "Использовать Webhooks вместо WebSocket для масштабируемости"
        correct: false
    explanation: "Брокеры сообщений (Kafka, RabbitMQ) позволяют масштабировать рассылку уведомлений, обеспечивая гарантии доставки и буферизацию при пиковых нагрузках."
    extended_explanation: |
      Брокеры сообщений:
      - Декаплируют сервисы (отправители и получатели не связаны напрямую)
      - Обеспечивают гарантии доставки (at-least-once, exactly-once)
      - Позволяют горизонтально масштабировать потребителей
      - Буферизуют сообщения при пиковых нагрузках

      Для массовой рассылки уведомлений это архитектурное решение, а не просто масштабирование соединений.
    recommendation: |
      Повторить архитектуру event-driven систем и роль брокеров сообщений.
      Справка: https://www.rabbitmq.com/

  - id: q10
    text: "Вы внедряете автоматическую генерацию спецификаций OpenAPI в 3 окружения: dev, staging и production. Возникла необходимость регулярно синхронизировать документацию в промежуточном окружении (staging), чтобы QA-команда всегда имела актуальные сведения о новых методах и изменениях в API. Приведен список факторов: 1. Автоматическая выгрузка спецификаций OpenAPI из основного репозитория при каждом пуше (commit). 2. Генерация документации только в окружении production по расписанию (cron). 3. Использование pipeline для сборки и проверки документации при каждом пул-реквесте в ветку staging. 4. Интеграция с системой contract testing, которая валидирует соответствие кода актуальной спецификации. 5. Разделение документации: dev-версия для отладки, staging-версия для тестирования, production-версия для внешних пользователей. Какие факторы наиболее эффективно обеспечивают актуальность документации в окружении staging?"
    type: single
    options:
      - id: a
        text: "Факторы 3, 4 и 5"
        correct: false
      - id: b
        text: "Только факторы 2 и 4"
        correct: false
      - id: c
        text: "Только фактор 5"
        correct: false
      - id: d
        text: "Только фактор 1"
        correct: false
      - id: e
        text: "Факторы 1 и 3"
        correct: true
    explanation: "Сочетание автоматической выгрузки спецификации из репозитория (1) и CI/CD pipeline, срабатывающего на изменения в ветке staging (3), обеспечивает актуальность документации в staging."
    extended_explanation: |
      Для актуальности документации в staging необходимо:
      1. Источник истины — репозиторий с кодом (фактор 1)
      2. Автоматическая доставка в staging при изменениях (фактор 3)

      Contract testing (4) важен для качества, но не для актуальности.
      Разделение окружений (5) — хорошая практика, но не автоматизация.
    recommendation: |
      Повторить практики CI/CD для автоматической генерации документации API.
      Справка: https://swagger.io/docs/specification/autogenerating/

  - id: q11
    text: "Ваш API возвращает большие объемы данных в форматах JSON и XML. Вы замечаете, что XML-ответы занимают больше ресурсов на сервере. Необходимо оптимизировать производительность для обработки таких запросов. Какой подход вы выберете для улучшения работы с XML?"
    type: single
    options:
      - id: a
        text: "Переключитесь на использование только JSON, и уменьшите нагрузку на сервер"
        correct: false
      - id: b
        text: "Буду передавать XML-ответы в сжатом формате (gzip)"
        correct: false
      - id: c
        text: "Ограничите размер XML через серверные фильтры"
        correct: false
      - id: d
        text: "Используйте кэширование XML-ответов для часто запрашиваемых данных"
        correct: true
      - id: e
        text: "Конвертируйте все XML-ответы в текстовые файлы для уменьшения нагрузки"
        correct: false
    explanation: "Проблема — высокая ресурсоёмкость обработки и генерации XML на сервере. Кэширование позволяет избежать повторной генерации одних и тех же данных для часто запрашиваемых ресурсов, снижая нагрузку на CPU и время ответа."
    extended_explanation: |
      ## Почему кэширование — правильный ответ
      В условии сделан акцент на том, что XML-ответы **занимают больше ресурсов на сервере**, а не в сети.
      Сжатие (gzip) решает проблему объёма передаваемых данных, но:
      - Не снижает нагрузку на генерацию XML
      - Добавляет серверу работу по сжатию

      Кэширование:
      - Позволяет сохранять уже сгенерированный XML-ответ
      - Исключает повторную сериализацию, выборку из БД и бизнес-логику
      - Снижает нагрузку на CPU и время обработки

      ## Что здесь важно по теории
      - Кэширование уместно для часто запрашиваемых и редко изменяемых данных
      - Заголовки Cache-Control, ETag помогают управлять кэшем
      - Для динамических данных можно использовать кэш на уровне приложения (Redis, in-memory)
    recommendation: |
      Повторить стратегии снижения серверной нагрузки при работе с тяжёлыми форматами: кэширование ответов, оптимизация сериализации.
      Справка: https://developer.mozilla.org/ru/docs/Web/HTTP/Caching

  - id: q12
    text: "Вы настраиваете JWT-аутентификацию для банковского API. Система должна одновременно: 1. Снижать риск компрометации access-токенов. 2. Не заставлять мобильных пользователей часто вводить пароль. 3. Позволять немедленно отзывать токены при обнаружении утечки. Какую конфигурацию сроков действия и сопутствующих механизмов следует использовать?"
    type: single
    options:
      - id: a
        text: "Access-token 1 час + refresh-token 30 дней, без rotation (revocation только по базе при входе)"
        correct: false
      - id: b
        text: "Access-token 60 мин со 'sliding-expiration' (продлевается при каждом запросе) + refresh 30 дней"
        correct: false
      - id: c
        text: "Access-token без exp, но подписанный с учётом IP-адреса клиента; отзыв через IP-белый список"
        correct: false
      - id: d
        text: "Один JWT 12 часов без refresh; при каждом запросе сервер проверяет подпись и exp"
        correct: false
      - id: e
        text: "Access 15 мин + refresh 7 дней с серверным blacklist / rotation каждого refresh-токена"
        correct: true
    explanation: "Короткий access-токен (15 мин) снижает риск компрометации, refresh-токен с rotation позволяет не вводить пароль часто, а blacklist обеспечивает немедленный отзыв."
    extended_explanation: |
      Оптимальная конфигурация:
      - Access token: 15 минут (малое окно уязвимости)
      - Refresh token: 7 дней с rotation (каждое обновление дает новую пару)
      - Серверный blacklist для немедленного отзыва

      Rotation предотвращает долгосрочное использование скомпрометированного refresh-токена.
      Blacklist позволяет отозвать токены до истечения срока.
    recommendation: |
      Повторить best practices JWT: короткое время жизни access-токена, rotation refresh-токенов, механизмы отзыва.
      Справка: https://auth0.com/docs/secure/tokens/refresh-tokens/refresh-token-rotation

  - id: q13
    text: "Вы разрабатываете платформу для онлайн-курсов, где студенты могут получать уведомления о новых лекциях и изменениях в расписании в режиме реального времени. Приложение должно обрабатывать большие объемы соединений, поскольку одновременно может быть подключено несколько тысяч студентов. При этом некоторые события должны быть доставлены только подписчикам, имеющим права доступа к определенному курсу. Какой подход при реализации GraphQL Subscriptions позволит масштабировать потоки событий и обеспечит авторизацию пользователей на уровне отдельных подписок, не дублируя логику в основном коде?"
    type: single
    options:
      - id: a
        text: "Использовать логику проверки авторизации внутри resolver для подписок, чтобы фильтровать данные перед их передачей"
        correct: false
      - id: b
        text: "Настроить использование middleware, которое выполняет проверку прав пользователя перед установлением соединения для подписки"
        correct: false
      - id: c
        text: "Организовать проверку доступа на этапе установления соединения, сохраняя связанные данные для последующего управления подписками"
        correct: false
      - id: d
        text: "Реализовать директивы GraphQL, которые ограничивают доступ к данным подписки на основе пользовательских ролей"
        correct: false
      - id: e
        text: "Включить брокер сообщений, такой как Kafka, для обработки подписок и управления потоками данных на этапе доставки"
        correct: true
    explanation: "Брокер сообщений (Kafka, RabbitMQ) позволяет горизонтально масштабировать обработку событий. Авторизация на уровне отдельных подписок реализуется через ACL брокера или сервис прав."
    extended_explanation: |
      ## Почему брокер сообщений — правильный ответ
      Вопрос требует решения двух задач:
      1. Масштабирование потоков событий на тысячи соединений
      2. Авторизация на уровне отдельных подписок без дублирования логики

      Брокер сообщений:
      - Решает задачу масштабирования (горизонтальное масштабирование потребителей, буферизация)
      - Позволяет вынести авторизацию в инфраструктурный слой:
        - ACL брокера (например, права на чтение топика `course-123-events`)
        - Или через отдельный сервис авторизации

      ## Что здесь важно по теории
      - GraphQL Subscriptions в production требуют брокера сообщений
      - Авторизация должна быть отделена от бизнес-логики подписок
    recommendation: |
      Повторить архитектуру масштабируемых GraphQL Subscriptions: использование брокеров сообщений (Kafka, RabbitMQ) для управления потоками.
      Справка: https://www.apollographql.com/docs/graphql-subscriptions/
      Справка: https://kafka.apache.org/documentation/

  - id: q14
    text: "Ваш API несколько раз подвергался координированным атакам, при которых злоумышленники отправляли большое количество запросов для исчерпания ресурсов сервера (DDoS). Классические firewall-правила не помогали, потому что атака шла с множества распределенных IP-адресов. Вы решили перенести основную логику защиты на уровень API Gateway. Что вы можете использовать, чтобы защититься от подобных атак?"
    type: single
    options:
      - id: a
        text: "Настроить маршрутизацию всех запросов между несколькими серверами (load balancing)"
        correct: false
      - id: b
        text: "Настроить rate-limiting для ограничения количества запросов от одного клиента за единицу времени"
        correct: true
      - id: c
        text: "Включить кэширование на уровне API Gateway, чтобы уменьшить общий объем обращений к бэкенду"
        correct: false
      - id: d
        text: "Настроить перенаправление запросов в зависимости от географического местоположения клиента"
        correct: false
      - id: e
        text: "Добавить логирование всех запросов для последующего анализа происходящих атак"
        correct: false
    explanation: "Rate-limiting на уровне API Gateway позволяет ограничивать поток запросов по идентификаторам клиента (API-ключ, JWT), а не только по IP, что эффективно при DDoS с распределенных адресов."
    extended_explanation: |
      При атаке с множества IP:
      - Блокировка по IP бесполезна
      - Rate-limiting по API-ключу или пользователю эффективен

      API Gateway позволяет:
      - Применять политики до бэкенда
      - Динамически изменять лимиты
      - Интегрироваться с WAF
    recommendation: |
      Повторить стратегии защиты API: rate limiting, WAF, аномалийное детектирование.
      Справка: https://cloud.google.com/architecture/api-gateway-rate-limiting

  - id: q15
    text: "Ваш API возвращает сложные вложенные структуры данных, такие как «пользователь → заказы → товары». Клиенты часто используют только верхний уровень данных и жалуются на сложность обработки вложенных структур. Избыточность данных увеличивает размер ответа, создавая дополнительные задержки. Какой подход лучше всего упростит работу с вложенными данными и ускорит запросы?"
    type: single
    options:
      - id: a
        text: "Реализовать возможность выбора глубины вложений в ответе через параметры запроса"
        correct: true
      - id: b
        text: "Внедрить кэширование на уровне сложных вложений, чтобы сократить задержки при запросах"
        correct: false
      - id: c
        text: "Добавить JSON-схемы в документацию, чтобы клиенты могли лучше понимать структуру данных"
        correct: false
      - id: d
        text: "Нормализовать структуры данных, создав отдельные конечные точки для каждого уровня вложенности"
        correct: false
      - id: e
        text: "Создать одну сложную конечную точку, чтобы клиенты могли получать всю информацию сразу"
        correct: false
    explanation: "Параметры глубины или fields позволяют клиентам запрашивать только нужные данные, уменьшая размер ответа и время обработки."
    extended_explanation: |
      Решение проблемы over-fetching:
      - Параметр `?depth=1` — только пользователь
      - Параметр `?fields=id,name` — только выбранные поля
      - GraphQL — более гибкое решение

      Преимущества:
      - Уменьшение размера ответа
      - Снижение времени обработки
      - Предсказуемая структура для клиента
    recommendation: |
      Повторить паттерны для борьбы с over-fetching: sparse fieldsets, параметры глубины, GraphQL.
      Справка: https://jsonapi.org/format/#fetching-sparse-fieldsets
