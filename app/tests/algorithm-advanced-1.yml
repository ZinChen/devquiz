      Алгоритм Беллмана-Форда:
      - Работает с графами, содержащими отрицательные веса
      - Не требует неотрицательности весов (в отличие от Дейкстры)
      - Выполняет |V|-1 проходов по всем рёбрам
      - На каждом проходе делает релаксацию (проверку, можно ли улучшить расстояние)

      Особенности:
      - Может обнаруживать циклы отрицательного веса
      - Сложность O(|V|·|E|) — медленнее Дейкстры для положительных весов
      - Гарантирует правильность, если нет циклов отрицательного веса

      ## Что здесь важно по теории
      - Релаксация: if d[u] + w(u,v) < d[v] then d[v] = d[u] + w(u,v)
      - После |V|-1 проходов все расстояния оптимальны
      - Дополнительный проход для обнаружения отрицательных циклов
    recommendation: |
      Повторить алгоритм Беллмана-Форда, его отличия от Дейкстры и работу с отрицательными весами.

